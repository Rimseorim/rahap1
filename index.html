니다.","how":["벽에 손바닥을 짚고 팔꿈치를 편 채 몸을 반대로 돌리세요","이두근이 당기는 느낌으로 30초 유지","3세트"]},{"name":"등척성 컬 홀드","why":"건병증 초기 통증 감소와 건 자극을 동시에 얻습니다.","sets":"45초 유지 · 4세트","cue":"통증 3/10 이하에서 수행합니다.","how":["팔꿈치를 90도 굽힌 채 반대 손으로 저항을 주며 45초 버티세요","4세트"]},{"name":"편심성 덤벨 컬","why":"이두건을 편심성으로 강화합니다. 천천히 내려오는 동작이 핵심입니다.","sets":"15회 · 3세트","cue":"반대 손으로 올리고, 아픈 팔로만 4초에 걸쳐 천천히 내립니다.","how":["덤벨을 반대 손으로 올려준 뒤","아픈 팔로만 4초에 걸쳐 천천히 내려오세요","15회 · 3세트"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"이두건 과부하 회피","body":"수직 프레스의 팔꿈치 굽힘 구간에서 과도한 속도나 반동을 조절해주세요. 이두건병증은 급격한 신장-수축 반복에서 악화됩니다."},{"title":"부하 진행 속도 조절","body":"이두건 통증이 사라진 후 2주는 무게 증가 없이 패턴만 유지하세요. 건 회복은 근육 회복보다 2~4배 느립니다."},{"title":"이 신호 오면 멈추세요","body":"팔꿈치 앞쪽(이두건 부착부)에 날카로운 통증이나 당기는 느낌이 오면 즉시 중단하세요. 건 파열은 전조 신호가 있을 때 예방할 수 있습니다."},{"title":"재발 방지 핵심","body":"클린·스내치의 팔꿈치 전환 구간에서 반동을 최소화하세요. 이두건에 가장 큰 순간 부하가 걸리는 동작입니다."}]}]}}],"danger":{"title":"지금 바로 운동을 멈추세요","reason":"안정 시에도 팔꿈치 통증이 지속되거나 저림이 있으면 인대 손상·신경 압박이 의심됩니다.","action":"정형외과 또는 스포츠의학과 진료를 권장합니다. 통증 위치(안쪽/바깥쪽/앞쪽)와 발생 동작을 기록해 방문하세요."}}]},"press-horizontal":{"id":"press-horizontal","name":"수평 프레스","pain_sites":[{"id":"shoulder","name":"어깨","coming_soon":false,"entry_question":"q1","questions":[{"id":"q1","text":"어깨 통증이 느껴지나요?","sub":"오버헤드 프레스 중 찝히거나 쉬는 중에도 아픈 경우 포함","choices":[{"id":"c1","text":"네, 통증이 있어요","next":"q:q2"},{"id":"c2","text":"아니요, 통증 없이 동작이 안 돼요","next":"q:q3"}]},{"id":"q2","text":"팔을 90도 들고 안쪽으로 비틀 때 아프면서, 팔에 힘이 빠지나요?","sub":"팔을 앞으로 들어 손바닥이 바닥을 향하게 비틀어보세요. 힘을 줘도 팔이 떨어지면 Drop Arm입니다.","choices":[{"id":"c1","text":"아프고 팔이 힘없이 떨어져요 (Drop Arm)","next":"danger"},{"id":"c2","text":"아프지만 힘은 유지돼요","next":"cause:cause-dp"}]},{"id":"q3","text":"룸바락(Lumbar Lock) 검사: 벽에 허리를 붙이고 팔을 들면 양쪽 엄지가 벽에 닿나요?","sub":"벽에 등·허리를 딱 붙이고, 팔꿈치를 편 채 양팔을 들어 엄지가 벽에 닿는지 확인하세요.","choices":[{"id":"c1","text":"네, 양쪽 모두 닿아요","next":"q:q4"},{"id":"c2","text":"팔이 안 닿거나 팔꿈치가 구부러져요","next":"cause:cause-case1"},{"id":"c3","text":"허리가 벽에서 떨어져요","next":"cause:cause-case2"},{"id":"c4","text":"어깨뼈(견갑골)가 날개처럼 튀어나와요","next":"cause:cause-case4"}]},{"id":"q4","text":"Apley's Scratch 검사: 한 팔은 위로, 반대 팔은 아래로 등 뒤에서 양손을 가까이 할 때 어떤가요?","sub":"찝히거나 날카롭게 아프면 DP 상태일 수 있습니다.","choices":[{"id":"c1","text":"한쪽 팔이 많이 제한되고 찝혀요","next":"cause:cause-dp"},{"id":"c2","text":"팔 범위는 어느 정도 되지만 한쪽이 훨씬 뻑뻑해요","next":"cause:cause-case3"},{"id":"c3","text":"대칭으로 잘 돼요","next":"cause:cause-case4"}]}],"tests":[],"danger":{"title":"지금 바로 운동을 멈추세요","reason":"Drop Arm(팔이 힘없이 떨어짐)은 회전근개 파열 신호입니다. 자가 재활을 진행하면 손상이 커질 수 있습니다.","action":"정형외과 또는 스포츠의학과에서 MRI 검사를 권장합니다. 증상 발생 상황(동작·소리·붓기)을 기록해 방문하세요."},"causes":[{"id":"cause-dp","label":"DP 프로세스","tag":"통증 조절","name":"충돌증후군 — 통증 있는 상태 (보호 우선)","description":"어깨를 쓸 때 찝히는 통증이 있으면 구조적 손상 악화를 막고 염증을 가라앉히는 것이 먼저입니다. 오버헤드 동작은 즉시 중단하고 통증 없는 범위의 등척성(버티기) 운동부터 시작합니다.","priority_note":"통증이 완전히 사라진 후 DN 재평가를 거쳐 복귀합니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"월 프레스 (등척성)","why":"통증 없는 등척성 수축으로 어깨 근육을 깨웁니다. 관절 움직임 없이 수행해 염증을 악화시키지 않습니다.","sets":"10초 유지 · 5세트","cue":"팔꿈치 90도 굽혀 벽에 대고 밀어내는 힘만 줍니다. 팔이 움직이면 하는 것이 좋습니다.","how":["벽 앞에 서서 팔꿈치를 90도 굽혀 벽에 대세요","통증이 없는 힘으로 벽을 밀어내며 10초 유지하세요","5세트, 통증 있으면 즉시 중단"]},{"name":"아이소메트릭 밴드 홀드 (내·외회전)","why":"회전근개를 통증 없는 범위에서 등척성으로 자극합니다. 혈류를 증가시켜 조직 회복을 돕습니다.","sets":"10초 유지 · 5세트 (내·외회전 각각)","cue":"약한 밴드로 시작하고 통증이 생기면 즉시 강도를 낮춰주세요.","how":["약한 저항 밴드를 고정점에 연결하세요","팔꿈치 90도 굽힌 채 내회전(배 쪽) 방향으로 10초 버티세요","같은 자세로 외회전(바깥) 방향도 10초 버티세요","각 방향 5세트"]},{"name":"펜듈럼 엑서사이즈","why":"중력을 이용해 어깨 관절 공간을 확보합니다. 능동적 움직임 없이 관절액을 순환시켜 통증을 줄입니다.","sets":"원형 10회 · 전후 10회 · 3세트","cue":"팔에 힘을 완전히 빼고 몸통을 가볍게 흔들어 팔이 추처럼 움직이게 합니다.","how":["테이블에 반대 손을 짚고 상체를 앞으로 숙이세요","아픈 팔의 힘을 완전히 빼고 원형으로 10회 돌리세요","앞뒤로 10회 추 운동하세요","3세트"]},{"name":"슬리퍼 스트레치","why":"후방 관절낭 경직이 충돌증후군의 주요 원인 중 하나입니다. 내회전 가동성을 회복해 어깨 공간을 확보합니다.","sets":"30초 유지 · 3세트","cue":"통증이 아닌 당기는 느낌만 있어야 합니다.","how":["옆으로 누워 아픈 어깨를 아래로 하세요","아래팔을 90도 세우고 반대 손으로 손목을 잡아 바닥 쪽으로 부드럽게 누르세요","30초 유지 · 3세트"]},{"name":"크로스오버 시머트리 활성화","why":"약한 장력 밴드로 어깨 주변 혈류를 증가시킵니다. 통증 발생 범위 이전까지만 실시합니다.","sets":"15회 · 3세트","cue":"통증이 생기는 각도 직전까지만 수행합니다.","how":["약한 밴드를 어깨 높이에 고정하세요","팔꿈치를 붙인 채 바깥으로 당기는 동작을 15회 수행하세요","통증이 생기면 범위를 줄이세요"]},{"name":"푸쉬업 플러스","why":"통증이 줄면 전거근을 활성화합니다. 전거근이 견갑골을 흉곽에 붙여야 어깨 공간이 확보됩니다.","sets":"10회 · 3세트","cue":"팔꿈치를 편 상태에서 등을 추가로 둥글게 밀어내는 마지막 동작이 핵심입니다.","how":["푸쉬업 상단 자세에서 시작하세요","팔꿈치를 편 채 등을 천장 쪽으로 더 밀어내세요 (플러스 동작)","천천히 원위치 · 10회 · 3세트"]},{"name":"Y-레이즈 (엎드려)","why":"하부 승모근을 집중 강화합니다. 상부 승모근이 과활성화되어 있으면 어깨가 올라가 충돌 공간이 줄어듭니다.","sets":"12회 · 3세트","cue":"팔을 들 때 어깨가 귀 쪽으로 올라가지 않도록 견갑골을 아래로 유지합니다.","how":["엎드려 누워 팔을 Y자 방향(대각선 앞)으로 뻗으세요","엄지가 위를 향한 채 팔을 천천히 들어 올리세요","어깨가 올라가지 않도록 주의하며 12회 · 3세트"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"통증 구간 회피 원칙","body":"수평 프레스 복귀 시 팔이 수평 이상 올라가지 않는 범위에서 시작하세요. 충돌이 일어나는 각도를 반복하면 회복이 역행합니다."},{"title":"견갑골 세팅 먼저","body":"모든 어깨 동작 전 견갑골을 뒤·아래로 살짝 당기는 '팩킹' 동작을 넣으세요. 어깨 공간이 확보된 상태에서 팔을 올려야 충돌이 줄어듭니다."},{"title":"이 신호 오면 멈추세요","body":"팔을 올릴 때 60~120도 구간에서 찌릿하거나 걸리는 느낌이 오면 해당 동작을 중단하세요. 통증 구간을 반복하면 회전근개 손상으로 이어질 수 있습니다."},{"title":"재발 방지 핵심","body":"어깨 통증이 사라진 후에도 가슴·앞 어깨 스트레칭을 매일 유지하세요. 전방 경직이 재발하면 충돌증후군도 함께 돌아옵니다."}]}]}},{"id":"cause-case1","label":"Case 1","tag":"가동성 부족","name":"광배근·흉추 경직 (어깨 굴곡 공간 부족)","description":"팔을 머리 위로 들 때 광배근이나 흉추가 굳어 있으면 어깨가 충분히 올라가지 않습니다. 팔꿈치가 구부러지거나 허리가 꺾이는 것은 공간이 부족해 나타나는 보상 패턴입니다. 가동성 확보가 먼저입니다.","priority_note":"광배근 이완 → 흉추 가동성 → 패턴 통합 순으로 진행합니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"밴드 랫 트랙션","why":"철봉에 밴드를 걸고 체중을 실으면 광배근이 직접 이완됩니다. 팔을 올리는 공간이 가장 빠르게 확보되는 방법입니다.","sets":"1분 유지 · 좌우 각 2세트","cue":"몸을 아래로 내리며 광배근이 늘어나는 느낌에 집중합니다.","how":["철봉에 저항 밴드를 걸고 한 손으로 잡으세요","밴드가 당기는 방향으로 몸을 살짝 기울여 체중을 실으세요","겨드랑이 아래·뒤가 당기는 느낌으로 1분 유지하세요","좌우 각 2세트"]},{"name":"네발기기 흉추 회전","why":"흉추 가동성이 회복되면 어깨를 들어올릴 때 요추가 보상하지 않아도 됩니다.","sets":"좌우 각 10회 · 3세트","cue":"요추는 고정하고 흉추(등 중간)만 회전시킵니다.","how":["네 발 자세에서 한 손을 머리 뒤에 얹으세요","그 팔꿈치를 천장 쪽으로 회전시키세요 (등 중간이 돌아야 함)","허리가 따라 돌지 않도록 주의하며 10회 · 3세트"]},{"name":"브렛젤 스트레치 (Brettzel)","why":"흉추 회전과 대퇴직근(고관절 굴곡근)을 동시에 스트레칭합니다. 전신 연결성을 회복해 어깨 들기 동작에 필요한 흉추 공간을 확보합니다.","sets":"좌우 각 45초 · 2세트","cue":"위쪽 어깨를 바닥 쪽으로 부드럽게 눌러 흉추 회전을 극대화합니다.","how":["옆으로 누워 아래 무릎을 90도 굽히세요","위 발목을 잡아 대퇴직근을 스트레칭하세요","위쪽 팔을 뒤로 넘기며 흉추를 회전시키세요","45초 유지 후 반대쪽"]},{"name":"룸바락 어깨 굴곡 연습","why":"광배근·흉추가 풀리면 실제 동작에서 보상 없이 팔을 들 수 있는지 확인합니다.","sets":"10회 · 3세트","cue":"허리를 벽에 붙인 채 팔꿈치를 펴고 엄지가 벽에 닿도록 들어 올립니다.","how":["벽에 등·허리를 밀착하고 팔을 천천히 들어 올리세요","팔꿈치가 구부러지거나 허리가 떨어지면 멈추고 이전 단계를 반복하세요","10회 · 3세트"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"흉추·광배 이완 루틴","body":"수평 프레스 전 폼롤러 흉추 익스텐션 10회 + 광배근 스트레칭 30초를 넣으세요. 이 두 조직이 경직되면 팔을 올릴 공간이 막힙니다."},{"title":"팔 올리기 전 흉추 체크","body":"팔을 머리 위로 올리기 전 가슴을 먼저 세우세요. 흉추가 굽은 상태에서 팔을 올리면 어깨 충돌 공간이 절반으로 줄어듭니다."},{"title":"이 신호 오면 멈추세요","body":"팔을 들어올릴 때 어깨가 귀 쪽으로 올라간다면 광배·흉추 경직이 동작을 막고 있는 것입니다. 무게를 줄이고 가동성 운동을 먼저 하세요."},{"title":"재발 방지 핵심","body":"장시간 앉아있는 날 이후 반드시 흉추 이완을 먼저 하세요. 책상 자세가 광배·흉추 경직을 가장 빠르게 만드는 원인입니다."}]}]}},{"id":"cause-case2","label":"Case 2","tag":"조절 실패","name":"코어-상지 분리 실패 (팔 들 때 허리가 따라감)","description":"팔을 들어올릴 때 허리가 자동으로 따라가면 코어가 팔의 움직임과 분리되지 않는 것입니다. 팔과 몸통을 독립적으로 움직이는 신경근 조절 훈련이 필요합니다.","priority_note":"코어 브레이싱 → 분리 훈련 → 오버헤드 통합 순으로 진행합니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"복압 브레이싱 연습","why":"팔이 머리 위로 올라갈 때 코어가 허리를 고정해야 어깨 공간이 유지됩니다. 브레이싱부터 각인합니다.","sets":"10초 유지 · 10회 · 3세트","cue":"숨을 크게 들이쉬고 배를 360도 방향으로 부풀린 채 멈춥니다.","how":["코로 크게 숨을 들이쉬며 배를 360도 방향으로 부풀리세요","이 상태에서 10초 유지 후 천천히 내쉬세요","10회 · 3세트"]},{"name":"데드 버그 (Dead Bug)","why":"요추를 고정한 채 팔과 다리를 독립적으로 움직이는 분리 패턴을 훈련합니다.","sets":"좌우 교대 10회 · 3세트","cue":"허리가 바닥에서 뜨는 순간 동작을 강도를 낮춰주세요.","how":["바닥에 누워 무릎 90도, 팔을 천장 방향으로 뻗으세요","숨을 내쉬며 허리를 바닥에 붙이세요","오른팔과 왼다리를 동시에 천천히 뻗었다 돌아오세요","좌우 교대 10회 · 3세트"]},{"name":"하프 닐링 촙 앤 리프트","why":"비대칭 코어 안정화 상태에서 팔을 움직여 코어-상지 분리를 훈련합니다.","sets":"좌우 각 10회 · 3세트","cue":"팔이 움직여도 골반이 흔들리지 않아야 합니다.","how":["한쪽 무릎을 바닥에 대고 반하프닐링 자세를 취하세요","밴드 또는 케이블을 대각선 아래에서 위로 당기며 몸통을 회전시키세요","골반이 안정적으로 유지하며 코어를 유지하며 10회 · 3세트"]},{"name":"터키시 겟업 1단계 (암 바)","why":"누운 자세에서 한 팔을 천장으로 뻗어 어깨 동적 안정성을 훈련합니다. 움직이는 동안 어깨 안정화 근육이 반사적으로 작동하도록 훈련합니다.","sets":"좌우 각 5회 · 3세트","cue":"팔꿈치를 완전히 펴고 어깨뼈를 패킹한 채 팔이 천장을 향하도록 유지합니다.","how":["바닥에 누워 한 손에 가벼운 웨이트를 잡고 천장으로 뻗으세요","반대 무릎을 세우고 옆구리로 구르며 앉는 첫 단계를 수행하세요","팔이 천장을 향한 채 유지하며 5회 · 3세트"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"코어 먼저, 팔 나중","body":"수평 프레스 모든 세트에서 코어를 단단히 조인 뒤 팔 동작을 시작하세요. 코어와 상지가 분리되지 않으면 허리가 대신 반응합니다."},{"title":"데드버그 워밍업 삽입","body":"세션 전 데드버그 10회를 넣어 코어-상지 분리 패턴을 먼저 각인하세요. 이 패턴이 익숙해야 무거운 무게에서도 유지됩니다."},{"title":"이 신호 오면 멈추세요","body":"팔을 들 때 허리가 자동으로 젖혀진다면 코어 분리가 아직 안 된 것입니다. 무게를 내리고 패턴 연습으로 돌아가세요."},{"title":"재발 방지 핵심","body":"볼륨이 증가할수록 코어 피로가 먼저 오고 분리가 깨집니다. 세트 후반 허리 반응을 항상 모니터링하세요."}]}]}},{"id":"cause-case3","label":"Case 3","tag":"가동성 부족","name":"후방 관절낭 경직 (내회전·수평 내전 제한)","description":"어깨 뒤쪽 주머니(후방 관절낭)가 굳어지면 팔을 등 뒤로 올리는 동작이나 수평으로 내리는 동작이 크게 제한됩니다. Apley's Scratch에서 아래팔이 훨씬 제한되는 패턴입니다.","priority_note":"후방 관절낭 이완 → 가동 범위 확장 → 패턴 통합 순으로 진행합니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"슬리퍼 스트레치","why":"후방 관절낭을 직접 이완합니다. 내회전 가동성이 회복되면 Apley's Scratch 제한이 풀립니다.","sets":"30초 유지 · 3세트","cue":"통증이 아닌 당기는 느낌만 있어야 합니다. 천천히 부드럽게.","how":["옆으로 누워 아픈 어깨를 아래로 하세요","아래팔을 90도 세우고 반대 손으로 손목을 잡아 바닥 쪽으로 부드럽게 누르세요","30초 유지 · 3세트"]},{"name":"인디안 클럽 스윙 (또는 가벼운 덤벨 원형 스윙)","why":"관절 궤도를 따라 부드럽게 움직여 후방 관절낭과 회전근개를 동적으로 이완합니다.","sets":"원형 10회 · 전후 10회 · 3세트","cue":"팔에 힘을 빼고 추처럼 자연스럽게 흔들어 관절 공간을 확보합니다.","how":["가벼운 덤벨(1~2kg)을 손에 들고 팔을 자연스럽게 늘어뜨리세요","원형으로 10회, 앞뒤로 10회 부드럽게 스윙하세요","3세트"]},{"name":"90/90 ER/IR PAILs & RAILs","why":"끝범위에서 등척성 수축 후 이완하면 관절낭이 더 효과적으로 늘어납니다. 단순 스트레칭보다 가동 범위 확장 효과가 큽니다.","sets":"20초 등척성 · 30초 이완 · 3세트","cue":"끝범위에서 20초 버티는 힘이 이완 후 가동 범위를 넓혀줍니다.","how":["옆으로 누워 어깨와 팔꿈치를 90/90 자세로 만드세요","내회전(바닥 쪽) 끝범위에서 반대 방향으로 20초 등척성 저항을 주세요","20초 후 힘을 빼고 30초 추가 이완","3세트"]},{"name":"밴드 외회전 강화","why":"후방 관절낭이 이완되면 회전근개(특히 극하근·소원근)를 강화해 안정성을 확보합니다.","sets":"15회 · 3세트","cue":"팔꿈치를 옆구리에 붙이고 바깥으로만 회전합니다.","how":["밴드를 팔꿈치 높이에 고정하세요","팔꿈치를 옆구리에 붙이고 90도 굽힌 채 바깥으로 당기세요","천천히 돌아오며 15회 · 3세트"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"수평 내전 스트레칭 매일","body":"크로스 바디 어깨 스트레칭 30초를 매일 아침 루틴에 넣으세요. 후방 관절낭이 경직되면 내회전이 막혀 어깨 충돌이 반복됩니다."},{"title":"그립 너비 조정","body":"수평 프레스에서 그립을 조금 넓히면 내회전 요구가 줄어 후방 관절낭 부담이 감소합니다. 통증 없는 너비를 먼저 찾으세요."},{"title":"이 신호 오면 멈추세요","body":"팔꿈치를 몸 앞으로 모을 때 어깨 뒤쪽에 압박감이 오면 후방 관절낭이 아직 열리지 않은 것입니다. 그 이상 내전해주세요."},{"title":"재발 방지 핵심","body":"렉에서 바를 잡기 전 어깨 내회전을 30초 스트레칭하는 습관을 만드세요. 차가운 상태로 어깨를 바로 쓰면 후방 경직이 빠르게 재발합니다."}]}]}},{"id":"cause-case4","label":"Case 4","tag":"근력 부족","name":"전거근·하부 승모근 약화 (견갑골 익상)","description":"팔을 들 때 어깨뼈가 날개처럼 뒤로 튀어나오거나 통제되지 않으면 전거근과 하부 승모근이 충분히 작동하지 않는 것입니다. 견갑골이 제대로 붙어 있어야 팔을 올릴 때 어깨 관절 공간이 확보됩니다.","priority_note":"견갑골 안정화 근육(전거근·하부 승모근)을 먼저 깨워야 합니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"푸쉬업 플러스","why":"전거근을 직접 활성화합니다. 마지막에 등을 추가로 밀어내는 동작에서 전거근이 집중적으로 켜집니다.","sets":"10회 · 3세트","cue":"팔꿈치를 편 상태에서 등을 추가로 둥글게 밀어내는 마지막 동작이 핵심입니다.","how":["푸쉬업 상단 자세에서 시작하세요","팔꿈치를 편 채 등을 천장 쪽으로 더 밀어내세요","천천히 원위치 · 10회 · 3세트"]},{"name":"Y-레이즈 (엎드려)","why":"하부 승모근을 집중 강화합니다. 상부 승모근이 덜 켜지고 하부 승모근이 더 켜지도록 훈련합니다.","sets":"12회 · 3세트","cue":"팔을 들 때 어깨가 귀 쪽으로 올라가지 않도록 견갑골을 아래로 유지합니다.","how":["엎드려 누워 팔을 Y자 방향(대각선 앞)으로 뻗으세요","엄지가 위를 향한 채 팔을 천천히 들어 올리세요","어깨가 올라가지 않도록 주의하며 12회 · 3세트"]},{"name":"월 슬라이드 (폼롤러)","why":"전거근과 하부 승모근의 협응으로 견갑골이 흉곽을 타고 올라가는 정상 견갑상완 리듬을 훈련합니다.","sets":"10회 · 3세트","cue":"팔을 올리는 내내 어깨가 귀에서 멀어지도록 아래로 유지하세요.","how":["벽 앞에 서서 팔꿈치를 구부려 폼롤러를 벽에 대세요","팔꿈치를 펴며 폼롤러를 위로 밀어 올리세요","어깨가 올라가지 않도록 10회 · 3세트"]},{"name":"링 로우 홀드","why":"수평 당기기 자세에서 전거근·하부 승모근의 협응을 강화합니다.","sets":"20초 · 3세트","cue":"가슴을 링에 붙인 자세에서 어깨뼈를 아래·뒤로 당겨 유지합니다.","how":["링을 잡고 가슴을 링 높이로 당겨 20초 유지하세요","어깨가 올라가지 않도록 주의하며 3세트"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"견갑골 세팅 의식화","body":"수평 프레스 모든 세트에서 팔을 올리기 전 견갑골을 뒤·아래로 당기는 동작을 먼저 하세요. 전거근·하부 승모근이 약하면 이 습관이 보상합니다."},{"title":"Y·T·W 보조 운동 유지","body":"세션 후 밴드로 Y·T·W 각 10회를 꾸준히 유지하세요. 이 근육들은 사용하지 않으면 빠르게 다시 약해집니다."},{"title":"이 신호 오면 멈추세요","body":"팔을 올릴 때 어깨가 앞으로 말리거나 견갑골이 날개처럼 튀어나오면 안전한 범위를 벗어난 것입니다. 해당 세트를 종료하세요."},{"title":"재발 방지 핵심","body":"푸시업·딥스·프레스 볼륨이 늘어날수록 전거근·하부 승모근 보강 운동도 함께 늘리세요. 전면 근육 과부하가 견갑 안정화 근육 약화를 만듭니다."}]}]}}]},{"id":"wrist","name":"손목","coming_soon":false,"entry_question":"q1","questions":[{"id":"q1","text":"손목 어느 쪽이 아픈가요?","sub":"바를 밀어 올릴 때 손목 어느 쪽인지 짚어보세요.","choices":[{"id":"c1","text":"손목을 뒤로 꺾을 때 앞쪽 당김","next":"cause:cause-a"},{"id":"c2","text":"손등 또는 팔뚝 바깥쪽 (신전근 쪽)","next":"cause:cause-b"},{"id":"c3","text":"새끼손가락 쪽 또는 안쪽 (굴곡근 쪽)","next":"cause:cause-c"},{"id":"c4","text":"쉬는 중에도 욱신거린다","next":"danger"}]}],"tests":[],"causes":[{"id":"cause-a","label":"원인 A","tag":"가동성 부족","name":"손목 신전 가동성 부족","description":"바를 잡거나 손목을 뒤로 꺾는 자세에서 손목 앞쪽이 당기고 아프다면 손목 신전 가동성이 부족한 것입니다. 관절 가동성을 확보하면 바 그립 자세에서 통증이 줄어듭니다.","priority_note":"가동성 확보가 먼저, 부하는 그 다음입니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"손목 굴곡근 스트레칭","why":"손목 앞쪽(굴곡근)이 짧으면 손목을 뒤로 꺾는 범위가 줄어듭니다. 직접 이완하면 그립 자세가 편해집니다.","sets":"30초 유지 · 3세트","cue":"팔꿈치를 편 채 손바닥을 앞으로 향하게 당깁니다.","how":["한 팔을 앞으로 뻗고 손바닥이 위를 향하게 하세요","반대 손으로 손가락을 아래로 당겨 손목 앞쪽을 늘리세요","30초 유지 후 반대쪽 · 3세트"]},{"name":"손목 원형 가동 운동","why":"손목 관절 전체를 부드럽게 움직여 활액을 순환시키고 가동 범위를 회복합니다.","sets":"양쪽 각 10회 · 2세트","cue":"통증 없는 범위에서 크고 느리게 원을 그립니다.","how":["양손을 맞잡거나 개별로 천천히 원을 그리세요","시계 방향 10회, 반시계 10회 · 2세트"]},{"name":"쿼드루페드 손목 신전 스트레칭","why":"체중을 실어 손목 신전 가동성을 훈련합니다. 실제 그립 자세와 가장 유사한 각도에서 이완합니다.","sets":"30초 유지 · 3세트","cue":"통증이 아닌 당기는 느낌만 있어야 합니다. 체중을 서서히 실으세요.","how":["네 발 자세에서 손가락이 무릎 방향으로 향하도록 손을 뒤집으세요","몸을 살짝 뒤로 밀어 손목에 체중을 실으세요","30초 유지 · 3세트"]},{"name":"손목 신전근 강화 (덤벨 리스트 익스텐션)","why":"신전 가동성과 함께 신전근을 강화하면 그립 자세를 더 안정적으로 유지할 수 있습니다.","sets":"15회 · 3세트","cue":"천천히 올리고 천천히 내립니다. 3초씩.","how":["테이블 끝에 팔뚝을 올리고 손목이 테이블 밖으로 나오게 하세요","가벼운 덤벨(1~2kg)을 잡고 손목을 천천히 들어 올리세요","15회 · 3세트"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"손목 준비 루틴","body":"수평 프레스 전 손목 서클 20회 + 손바닥 바닥 짚고 스트레칭 30초를 넣으세요. 손목이 충분히 열려야 바 그립 시 과부하가 줄어듭니다."},{"title":"그립 조정 전략","body":"바를 잡을 때 손바닥 아래쪽(손바닥과 손가락 경계)으로 쥐세요. 손목이 꺾이지 않아 신전 부담이 줄어듭니다."},{"title":"이 신호 오면 멈추세요","body":"손목 뒤쪽이 당기거나 그립 유지가 어려우면 손목 신전이 한계에 달한 것입니다. 스트랩으로 보조하거나 세트를 줄이세요."},{"title":"재발 방지 핵심","body":"프론트 스쿼트·클린·저크처럼 손목 신전이 많이 필요한 동작을 같은 날 겹치지 마세요. 손목 누적 부하가 빠르게 쌓입니다."}]}]}},{"id":"cause-b","label":"원인 B","tag":"과부하","name":"손목 신전근 건병증 (손등·팔뚝 바깥쪽 통증)","description":"바를 반복적으로 잡고 놓는 동작에서 손목 신전근이 과부하되면 손등이나 팔뚝 바깥쪽이 아픕니다. 갑자기 볼륨이 늘거나 그립 강도가 증가했을 때 흔합니다. 편심성 강화와 충분한 회복이 핵심입니다.","priority_note":"2주 부하를 낮추고 편심성 강화를 병행합니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"손목 신전근 마사지 + 스트레칭","why":"팔뚝 바깥쪽 근육의 긴장을 직접 풀어줍니다.","sets":"60초 마사지 + 30초 스트레칭 · 3세트","cue":"손을 주먹 쥔 채 팔뚝 바깥쪽을 반대 손으로 눌러가며 마사지합니다.","how":["반대 손 엄지로 팔뚝 바깥쪽을 천천히 문지르세요","이후 팔을 앞으로 뻗고 손바닥을 아래로 향해 30초 스트레칭하세요","3세트"]},{"name":"등척성 손목 신전 홀드","why":"건병증 초기에 등척성 수축은 통증을 줄이면서 건을 자극합니다.","sets":"45초 유지 · 4세트","cue":"통증 3/10 이하에서 수행합니다.","how":["테이블에 팔뚝을 올리고 손목이 밖으로 나오게 하세요","손목을 위로 드는 힘을 주며 반대 손으로 저항을 45초 유지하세요","4세트"]},{"name":"편심성 손목 신전 (덤벨)","why":"건병증 재활의 핵심입니다. 천천히 내려오는 편심성 동작에서 건이 강화됩니다.","sets":"15회 · 3세트","cue":"반대 손으로 들어 올리고, 아픈 손으로만 3초에 걸쳐 내립니다.","how":["테이블 끝에 팔뚝을 올리고 가벼운 덤벨을 잡으세요","반대 손으로 손목을 올려준 뒤","아픈 손으로만 3초에 걸쳐 천천히 내려오세요","15회 · 3세트"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"충격 동작 분리","body":"손등·팔뚝 바깥쪽 통증이 있을 때는 수평 프레스과 케틀벨 스윙·박스점프를 같은 날 해주세요. 신전근 건병증은 반복 충격에 민감합니다."},{"title":"그립 강도 줄이기","body":"바를 너무 세게 쥐면 신전근 건에 과부하가 옵니다. 바가 미끄러지지 않을 정도의 최소 그립으로 훈련하세요."},{"title":"이 신호 오면 멈추세요","body":"팔뚝 바깥쪽에 타는 듯한 느낌이나 팔꿈치 바깥쪽 압통이 오면 당일 손목 신전 동작을 모두 중단하세요."},{"title":"재발 방지 핵심","body":"통증이 사라진 후에도 전완 신전근 스트레칭을 매일 유지하세요. 건병증은 완치 후에도 과부하 시 재발률이 높습니다."}]}]}},{"id":"cause-c","label":"원인 C","tag":"과부하","name":"손목 굴곡근 과부하 / TFCC (새끼손가락 쪽 통증)","description":"바를 잡아당기는 동작에서 손목 안쪽(새끼손가락 쪽)이 아프거나 손목을 비틀 때 통증이 있으면 굴곡근 과부하 또는 TFCC(손목 삼각섬유연골 복합체) 문제일 수 있습니다. 부하를 줄이고 손목 회전 가동성을 회복해야 합니다.","priority_note":"새끼손가락 쪽 날카로운 통증은 TFCC 손상일 수 있으므로 심하면 의사 진료를 먼저 받으세요.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"손목 굴곡근 스트레칭","why":"손목 안쪽 굴곡근 긴장을 풀어줍니다.","sets":"30초 · 3세트","cue":"팔꿈치를 편 채 손바닥이 위를 향하게 하고 손가락을 아래로 당깁니다.","how":["팔을 앞으로 뻗고 손바닥이 위를 향하게 하세요","반대 손으로 손가락을 아래로 당겨 30초 유지하세요","3세트"]},{"name":"손목 전완 회내·회외 운동","why":"손목 회전 가동성을 회복합니다. TFCC 기능 회복에 중요합니다.","sets":"15회 · 3세트","cue":"팔꿈치를 옆구리에 붙이고 팔뚝만 회전합니다.","how":["팔꿈치를 90도 굽히고 옆구리에 붙이세요","손바닥이 위·아래를 교대로 향하도록 천천히 회전하세요","15회 · 3세트"]},{"name":"등척성 그립 홀드","why":"그립 근육을 등척성으로 자극해 혈류를 증가시키고 건 회복을 돕습니다.","sets":"30초 유지 · 4세트","cue":"통증 3/10 이하에서 수행합니다.","how":["테니스공이나 핸드그립을 가볍게 쥐고 30초 유지하세요","4세트"]},{"name":"편심성 손목 굴곡 (덤벨)","why":"굴곡근 건을 편심성으로 강화합니다.","sets":"15회 · 3세트","cue":"반대 손으로 들어 올리고, 아픈 손으로만 3초에 걸쳐 내립니다.","how":["테이블 끝에 팔뚝을 올리고 손바닥이 위를 향하게 하세요","반대 손으로 손목을 올려준 뒤 아픈 손으로만 천천히 내려오세요","15회 · 3세트"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"새끼손가락 쪽 부하 분산","body":"수평 프레스에서 그립을 살짝 넓히면 TFCC(손목 새끼손가락 쪽) 부하가 줄어듭니다. 통증 없는 그립 너비를 먼저 찾으세요."},{"title":"회전 동작 주의","body":"손목을 비트는 동작(클린·스내치 전환)이 TFCC에 가장 많은 스트레스를 줍니다. 재활 기간에는 이 동작을 제한하세요."},{"title":"이 신호 오면 멈추세요","body":"새끼손가락 쪽 손목에 찌릿하거나 약해지는 느낌이 오면 즉시 그립을 놓으세요. TFCC 손상은 조기 처치가 중요합니다."},{"title":"재발 방지 핵심","body":"손목 굴곡근 스트레칭(손목 꺾어 30초)을 세션 후 루틴으로 추가하세요. 굴곡근 경직이 TFCC 부하의 주원인입니다."}]}]}}],"danger":{"title":"지금 바로 운동을 멈추세요","reason":"안정 시에도 손목 통증이 지속되거나 저림·붓기가 있으면 인대·연골 손상이 의심됩니다.","action":"정형외과 또는 스포츠의학과 진료를 권장합니다. 통증 위치(엄지 쪽/새끼 쪽/가운데)를 기록해 방문하세요."}},{"id":"lower-back","name":"허리","coming_soon":false,"entry_question":"q1","questions":[{"id":"q1","text":"통증이 언제 느껴지나요?","sub":null,"choices":[{"id":"c1","text":"바를 머리 위로 밀 때","next":"q:q2"},{"id":"c2","text":"내려올 때 또는 내내","next":"q:q2"},{"id":"c3","text":"쉬는 중에도 욱신거린다","next":"danger"}]},{"id":"q2","text":"프레스 중 허리가 뒤로 젖혀지는 편인가요?","sub":"거울이나 영상으로 확인하거나 파트너에게 물어보세요.","choices":[{"id":"c1","text":"네, 뒤로 많이 젖혀져요","next":"test:test-hip-flexor"},{"id":"c2","text":"아니요, 자세는 괜찮아요","next":"cause:cause-c"}]}],"tests":[{"id":"test-hip-flexor","name":"토마스 테스트 (고관절 굴곡근 긴장 확인)","purpose":"장요근이 짧아져 있으면 서 있을 때 골반이 앞으로 기울어 프레스 시 요추 과신전이 심해집니다.","steps":["침대나 박스 끝에 앉으세요","한쪽 무릎을 양손으로 가슴 쪽으로 당기세요","그 상태로 천천히 뒤로 누우세요","반대쪽 다리가 자연스럽게 내려가는지 확인하세요"],"note":"반대쪽 다리가 뜨면 고관절 굴곡근이 짧은 것입니다.","pass_text":"반대쪽 다리가 바닥에 닿아요","fail_text":"반대쪽 다리가 들려요","pass_next":"cause:cause-b","fail_next":"cause:cause-a"}],"danger":{"title":"지금 바로 운동을 멈추세요","reason":"안정 시에도 허리 통증이 지속되거나 다리로 저림·방사통이 있으면 추간판 탈출증 등 구조적 손상이 의심됩니다.","action":"정형외과 또는 스포츠의학과 진료를 권장합니다. 통증 발생 상황(동작·무게·자세)을 기록해 방문하면 진단에 도움이 됩니다."},"causes":[{"id":"cause-a","label":"원인 A","tag":"가동성 부족","name":"고관절 굴곡근 단축 → 요추 과신전","description":"장요근이 짧아지면 서 있을 때부터 골반이 앞으로 기울어 요추가 과신전된 상태가 됩니다. 여기서 프레스까지 추가되면 요추 후관절에 압박이 집중됩니다. 고관절 굴곡근을 먼저 풀어야 합니다.","priority_note":"프레스 전 코치 스트레칭 5분이 가장 효과적인 예방법입니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"로우 런지 스트레칭 (Couch Stretch)","why":"장요근을 직접 늘려줍니다. 고관절 굴곡근이 짧아지면 골반이 앞으로 기울어 요추가 과신전됩니다.","sets":"좌우 각 60초 · 3세트","cue":"골반을 앞으로 밀면서 허리는 곧게 유지합니다. 허리가 젖혀지면 효과가 없습니다.","how":["한 발을 앞에, 반대 무릎을 바닥에 놓는 런지 자세를 취하세요","뒷발 쪽 엉덩이를 앞으로 밀면서 고관절 앞쪽이 당기는 느낌을 찾으세요","허리가 젖혀지지 않도록 복부를 살짝 조이세요","60초 유지 후 반대쪽"]},{"name":"데드 버그 (Dead Bug)","why":"요추를 바닥에 고정한 채 사지를 움직여 코어 안정화를 훈련합니다. 허리 부하 없이 복횡근·다열근을 동시에 강화할 수 있습니다.","sets":"좌우 교대 10회 · 3세트","cue":"허리가 바닥에서 뜨는 순간 동작을 강도를 낮춰주세요.","how":["바닥에 누워 무릎 90도, 팔을 천장 방향으로 뻗으세요","숨을 내쉬며 허리를 바닥에 붙이세요","오른팔과 왼다리를 동시에 천천히 뻗었다 돌아오세요","좌우 교대 10회 · 3세트"]},{"name":"버드 독 (Bird Dog)","why":"네 발 자세에서 대각선 사지를 뻗어 척추 주변 심부 근육을 강화합니다. 골반이 흔들리지 않는 안정성이 목표입니다.","sets":"좌우 교대 10회 · 3세트","cue":"골반이 옆으로 기울지 않도록 속도보다 안정성에 집중합니다.","how":["네 발 자세에서 허리를 중립으로 만드세요","오른팔과 왼다리를 동시에 천천히 뻗으세요","3초 유지 후 천천히 돌아옵니다","좌우 교대 10회 · 3세트"]},{"name":"글루트 브릿지","why":"대둔근을 강화하면 골반 후방경사 힘이 생겨 요추 과신전이 줄어듭니다.","sets":"15회 · 3세트","cue":"최고점에서 엉덩이를 2초 쥐어짜세요.","how":["바닥에 누워 무릎을 세우세요","엉덩이를 들어 무릎·골반·어깨가 일직선이 되게 하세요","2초 유지 후 천천히 내립니다 · 15회 · 3세트"]},{"name":"PVC 오버헤드 프레스 (중립 연습)","why":"PVC로 가장 가벼운 부하에서 허리 중립을 유지하는 프레스 패턴을 각인합니다.","sets":"10회 · 3세트","cue":"밀어 올리는 순간 복부를 살짝 조이세요. 허리가 젖혀지면 강도를 낮춰주세요.","how":["PVC를 쇄골 위에 걸치고 프레스 자세를 취하세요","복압을 만들고 수직으로 밀어 올리세요","허리가 젖혀지면 브레이싱을 더 강하게 하세요","10회 · 3세트"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"아치 깊이 제한","body":"벤치프레스 아치를 과도하게 만들면 요추 과신전이 심해집니다. 발을 벤치 위에 올려 아치를 줄이거나 발을 바닥에 평평하게 두고 시작하세요."},{"title":"힙 플렉서 이완 먼저","body":"벤치 전 피전 스트레칭 60초를 넣으세요. 고관절 굴곡근이 단축되면 누운 자세에서도 허리가 자동으로 과신전됩니다."},{"title":"이 신호 오면 멈추세요","body":"벤치 중 허리에 압박감이 오거나 허리가 들리는 느낌이 오면 아치를 줄이거나 세트를 종료하세요."},{"title":"재발 방지 핵심","body":"컴피티션 스타일 아치는 허리 부담이 큽니다. 재활 기간에는 플랫 백 벤치로 훈련하고 아치는 이후에 점진적으로 회복하세요."}]}]}},{"id":"cause-b","label":"원인 B","tag":"근력 부족","name":"코어 약화 (프레스 시 요추 중립 유지 불가)","description":"고관절 굴곡근은 유연한데 프레스 시 허리가 젖혀진다면 코어가 충분히 버텨주지 못하는 것입니다. 무게가 머리 위로 올라갈수록 중심이 뒤로 쏠려 코어가 더 강하게 버텨야 합니다.","priority_note":"브레이싱 훈련을 먼저 완성한 후 프레스로 복귀합니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"복압 브레이싱 연습","why":"무거운 부하 아래서 허리를 보호하는 핵심은 복압(IAP)입니다. 이것을 의식적으로 만드는 연습부터 시작합니다.","sets":"10초 유지 · 10회 · 3세트","cue":"숨을 크게 들이쉬고 배를 360도 방향으로 부풀린 채 멈춥니다. 배를 집어넣지 마세요.","how":["편하게 서거나 앉으세요","코로 크게 숨을 들이쉬며 배를 360도 방향으로 부풀리세요","이 상태에서 10초 유지 후 천천히 내쉬세요","10회 · 3세트"]},{"name":"데드 버그 (Dead Bug)","why":"요추를 바닥에 고정한 채 사지를 움직여 코어 안정화를 훈련합니다. 허리 부하 없이 복횡근·다열근을 동시에 강화할 수 있습니다.","sets":"좌우 교대 10회 · 3세트","cue":"허리가 바닥에서 뜨는 순간 동작을 강도를 낮춰주세요.","how":["바닥에 누워 무릎 90도, 팔을 천장 방향으로 뻗으세요","숨을 내쉬며 허리를 바닥에 붙이세요","오른팔과 왼다리를 동시에 천천히 뻗었다 돌아오세요","좌우 교대 10회 · 3세트"]},{"name":"플랭크","why":"코어 전체를 정적으로 강화합니다. 척추 안정성의 기반이 됩니다.","sets":"30~45초 · 3세트","cue":"엉덩이가 올라가거나 처지지 않도록 일직선을 유지합니다.","how":["팔꿈치를 어깨 아래에 놓고 전완으로 지지하세요","머리부터 발꿈치까지 일직선을 유지하세요","복부를 조이고 허리가 처지지 않도록 합니다","30~45초 · 3세트"]},{"name":"버드 독 (Bird Dog)","why":"네 발 자세에서 대각선 사지를 뻗어 척추 주변 심부 근육을 강화합니다. 골반이 흔들리지 않는 안정성이 목표입니다.","sets":"좌우 교대 10회 · 3세트","cue":"골반이 옆으로 기울지 않도록 속도보다 안정성에 집중합니다.","how":["네 발 자세에서 허리를 중립으로 만드세요","오른팔과 왼다리를 동시에 천천히 뻗으세요","3초 유지 후 천천히 돌아옵니다","좌우 교대 10회 · 3세트"]},{"name":"PVC 오버헤드 프레스","why":"가장 가벼운 부하에서 브레이싱을 유지하는 프레스 패턴을 각인합니다.","sets":"10회 · 3세트","cue":"밀기 전 복압을 만드는 것이 습관이 되어야 합니다.","how":["PVC로 10회 프레스를 수행하며 브레이싱을 유지하세요","허리 통증 없이 완료 시 다음 단계로"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"코어 브레이싱 벤치에서도","body":"벤치프레스 시 복압을 유지하세요. 누운 자세에서도 코어 활성화 없이 무거운 무게를 들면 허리에 부하가 옵니다."},{"title":"그립 폭 조정","body":"그립이 너무 넓으면 어깨와 허리에 부하가 늘어납니다. 팔꿈치가 90도 약간 안쪽이 되는 너비로 시작하세요."},{"title":"이 신호 오면 멈추세요","body":"벤치 세트 후반에 허리에 압박감이 오면 코어 피로 신호입니다. 세트 수를 줄이세요."},{"title":"재발 방지 핵심","body":"벤치 볼륨이 증가할수록 코어 강화 운동도 함께 늘리세요. 코어가 뒤따라가지 못하는 볼륨 증가가 허리 통증의 주원인입니다."}]}]}},{"id":"cause-c","label":"원인 C","tag":"과부하","name":"과부하/과사용","description":"자세도 좋고 유연성도 있는데 허리가 아프다면 갑자기 프레스 볼륨이나 무게가 증가한 것이 원인입 ow","name":"팔꿈치","coming_soon":false,"entry_question":"q1","questions":[{"id":"q1","text":"팔꿈치 어느 쪽이 아픈가요?","sub":"밀어 올릴 때 팔꿈치 어느 쪽인지 짚어보세요.","choices":[{"id":"c1","text":"바깥쪽 뼈 돌출부 (신전근 쪽)","next":"cause:cause-a"},{"id":"c2","text":"안쪽 뼈 돌출부 (굴곡근 쪽)","next":"cause:cause-b"},{"id":"c3","text":"앞쪽 (팔꿈치 접히는 부분)","next":"cause:cause-c"},{"id":"c4","text":"쉬는 중에도 욱신거린다","next":"danger"}]}],"tests":[],"causes":[{"id":"cause-a","label":"원인 A","tag":"과부하","name":"외측 상과염 (테니스 엘보 — 팔꿈치 바깥쪽)","description":"바를 잡고 당기는 동작에서 팔꿈치 바깥쪽 뼈 돌출부(외측 상과)가 아프면 손목 신전근의 공통 건이 과부하된 것입니다. 로우·프레스에서 흔하며, 편심성 강화가 핵심입니다.","priority_note":"2주 부하를 낮추고 편심성 손목 신전 강화를 병행합니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"팔뚝 바깥쪽 마사지 + 스트레칭","why":"외측 상과에 붙는 신전근 긴장을 풀어 건 부착부 부담을 줄입니다.","sets":"60초 마사지 + 30초 스트레칭 · 3세트","cue":"팔꿈치를 편 채 손목을 아래로 당기면 팔꿈치 바깥쪽이 당깁니다.","how":["반대 손 엄지로 팔뚝 바깥쪽을 천천히 문지르세요 (60초)","팔을 앞으로 뻗고 손바닥을 아래로 향해 손목을 아래로 당겨 30초","3세트"]},{"name":"등척성 손목 신전 홀드","why":"건병증 초기 통증 감소와 건 자극을 동시에 얻습니다.","sets":"45초 유지 · 4세트","cue":"통증 3/10 이하에서 수행합니다.","how":["테이블에 팔뚝을 올리고 손목 신전 자세에서 반대 손으로 저항을 주며 45초 유지하세요","4세트"]},{"name":"타일러 트위스트 (편심성 전완 회외)","why":"외측 상과염에 가장 효과적인 편심성 운동입니다. 전완 회외근과 신전근을 동시에 강화합니다.","sets":"15회 · 3세트","cue":"내릴 때만 아픈 팔로, 3초에 걸쳐 천천히 내립니다.","how":["막대나 가벼운 덤벨을 세로로 잡으세요","반대 손으로 도움받아 올린 뒤 아픈 팔로만 3초에 걸쳐 아래로 회전하세요","15회 · 3세트, 통증 3/10 이하"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"팔꿈치 바깥쪽 이완 루틴","body":"수평 프레스 전 전완 신전근 스트레칭 30초를 루틴에 넣으세요. 테니스 엘보는 준비 없이 그립 동작을 반복할 때 빠르게 악화됩니다."},{"title":"그립 압력 최소화","body":"바를 최소 압력으로 쥐어 신전근 건의 부하를 줄이세요. 세게 쥐는 습관이 외측 상과 통증을 유발합니다."},{"title":"이 신호 오면 멈추세요","body":"팔꿈치 바깥쪽이 운동 중 뜨겁거나 타는 느낌이 오면 해당 동작을 즉시 중단하세요. 건 ext":"danger"},{"id":"c2","text":"가슴 근육이 당기거나 뻐근해요","next":"test:test-pec-length"}]}],"tests":[{"id":"test-pec-length","name":"소흉근 길이 테스트 (도어웨이 스트레치)","purpose":"소흉근이 짧아져 있는지 확인합니다. 짧으면 수평 프레스 시 가슴 전면이 당기고 어깨가 앞으로 말립니다.","steps":["문틀 앞에 서서 양 팔꿈치를 문틀에 댑니다 (팔꿈치 90도, 어깨 높이)","한 발을 앞으로 내딛으며 천천히 앞으로 기울이세요","가슴 앞쪽이 당기는 느낌을 확인하세요"],"note":"당기는 느낌은 정상입니다. 날카로운 통증이 나면 즉시 강도를 낮춰주세요.","pass_text":"양쪽 대칭으로 당겨요 (소흉근 정상)","fail_text":"한쪽이 훨씬 더 당기거나 막혀요","pass_next":"cause:cause-a","fail_next":"cause:cause-b"}],"causes":[{"id":"cause-a","label":"원인 A","tag":"과부하","name":"대흉근 건병증 (하강 시 과부하)","description":"수평 프레스의 하강 구간에서 대흉근이 최대로 늘어나며 편심성 부하를 받습니다. 갑작스러운 무게·볼륨 증가 또는 너무 깊은 하강 범위가 원인입니다. 편심성 강화와 하강 범위 조절로 해결합니다.","priority_note":"하강 범위를 통증 없는 각도로 제한하고 점진적으로 늘려갑니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"폼롤러 대흉근 이완","why":"대흉근 근막 긴장을 직접 풀어 건 부착부 부담을 줄입니다.","sets":"좌우 각 60초 · 2세트","cue":"가장 아픈 지점에서 멈추고 팔을 천천히 회전합니다.","how":["폼롤러를 어깨와 가슴 사이에 세로로 놓고 옆으로 기대세요","팔을 바닥 쪽으로 내려 가슴이 늘어나는 느낌을 찾으세요","60초 유지 후 반대쪽"]},{"name":"도어웨이 대흉근 스트레칭","why":"대흉근 하부·중부를 직접 이완합니다. 건병증 통증이 있는 경우 가볍게만 늘립니다.","sets":"30초 유지 · 3세트","cue":"통증이 아닌 당기는 느낌만 있어야 합니다. 팔 높이를 조절해 통증 없는 각도를 찾으세요.","how":["문틀에 팔꿈치를 대고 앞으로 천천히 기울이세요","가슴 앞쪽이 당기는 느낌으로 30초 유지","팔 높이를 높이면 하부, 낮추면 상부 대흉근이 더 늘어납니다"]},{"name":"등척성 흉근 수축 홀드","why":"건병증 초기에 등척성 수축은 통증을 줄이면서 건을 자극합니다. 움직임 없이 수행해 부착부에 부담을 주지 않습니다.","sets":"45초 유지 · 4세트","cue":"통증 3/10 이하에서 수행합니다.","how":["양손을 가슴 앞에서 마주 대고 강하게 눌러 45초 유지하세요","팔꿈치 높이를 조절해 통증 없는 각도를 찾으세요","4세트"]},{"name":"편심성 푸쉬업 (느린 하강)","why":"대흉근 건병증 재활의 핵심입니다. 하강 구간을 천천히 제어해 건을 강화합니다.","sets":"6~8회 · 3세트","cue":"5초에 걸쳐 천천히 내려옵니다. 올라갈 때는 빠르게.","how":["푸쉬업 자세에서 5초에 걸쳐 천천히 가슴을 바닥으로 내리세요","통증이 생기는 각도 직전에서 멈추고 올라오세요","6~8회 · 3세트"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"하강 깊이 제한","body":"대흉근 건병증은 최하단 스트레치 구간에서 가장 부하가 높습니다. 재활 초기에는 팔꿈치가 어깨 높이가 되는 지점에서 강도를 낮춰주세요."},{"title":"그립 너비 좁히기","body":"그립이 넓을수록 최하단 스트레치가 커집니다. 재활 기간에는 중간 그립(어깨너비)으로 하강 깊이를 제한하세요."},{"title":"이 신호 오면 멈추세요","body":"가슴 근육이 바깥쪽 어깨 부착부에서 날카롭게 당기는 느낌이 오면 즉시 세트를 종료하세요. 건파열 위험 신호입니다."},{"title":"재발 방지 핵심","body":"플라이 동작은 대흉근 건에 가장 큰 스트레치 부하를 줍니다. 건병증이 완전히 회복되기 전까지 플라이는 제한하세요."}]}]}},{"id":"cause-b","label":"원인 B","tag":"과긴장","name":"소흉근 과긴장 (가슴 전면·어깨 전방 당김)","description":"소흉근이 짧아지면 수평 프레스 하강 시 가슴 전면이 당기고 어깨가 앞으로 말려 통증이 생깁니다. 오래 앉아있거나 수평 프레스 볼륨이 많은 경우 흔합니다. 이완 후 전거근을 강화해야 재발을 막을 수 있습니다.","priority_note":"소흉근 이완이 먼저, 전거근 강화는 그 다음입니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"소흉근 스트레칭 (도어웨이)","why":"소흉근을 직접 이완합니다. 팔꿈치를 어깨보다 낮게 대면 소흉근이 더 효과적으로 늘어납니다.","sets":"30초 유지 · 3세트","cue":"팔꿈치를 어깨 높이보다 낮게(약 60~70도) 유지합니다.","how":["문틀에 팔꿈치를 어깨보다 낮게 대세요","앞으로 천천히 기울여 가슴 앞쪽이 당기는 느낌을 찾으세요","30초 유지 · 3세트"]},{"name":"폼롤러 소흉근 이완","why":"소흉근 근막을 직접 풀어줍니다. 갈비뼈 앞쪽(2~5번 갈비연골 부근)을 압박하면 효과적입니다.","sets":"좌우 각 60초 · 2세트","cue":"가장 아픈 지점에서 멈추고 팔을 천천히 원형으로 돌립니다.","how":["폼롤러를 가슴 앞쪽(쇄골 아래 · 갈비뼈 위)에 대고 기대세요","팔을 앞·뒤로 부드럽게 움직이며 60초 이완하세요","좌우 각 2세트"]},{"name":"푸쉬업 플러스","why":"소흉근과 길항 관계인 전거근을 활성화합니다. 전거근이 켜지면 소흉근의 과활성이 억제됩니다.","sets":"10회 · 3세트","cue":"팔꿈치를 편 상태에서 등을 추가로 밀어내는 마지막 동작이 핵심입니다.","how":["푸쉬업 상단 자세에서 시작하세요","팔꿈치를 편 채 등을 천장 쪽으로 더 밀어내세요","천천히 원위치 · 10회 · 3세트"]},{"name":"흉추 폼롤러 익스텐션","why":"소흉근 과긴장은 흉추 굴곡(라운드숄더)과 함께 옵니다. 흉추를 열어주면 소흉근 부담이 줄어듭니다.","sets":"분절당 10회 · 흉추 전체","cue":"허리가 아닌 등 중간(견갑골 아래)에서 꺾이는 느낌을 찾으세요.","how":["폼롤러를 등 중간에 대고 팔짱을 끼세요","천천히 뒤로 젖히며 흉추를 신전시키세요","T4~T10 분절을 5cm씩 이동하며 반복"]},{"name":"케이블 흉근 스트레치 (동적)","why":"이완된 소흉근을 실제 프레스 동작과 유사한 패턴에서 통합합니다.","sets":"15회 · 3세트","cue":"가슴 앞쪽이 당기는 느낌을 유지하며 천천히 움직입니다.","how":["밴드나 케이블을 어깨 높이에 고정하고 잡으세요","팔을 앞으로 모아오며 가슴을 수축하세요","천천히 뒤로 열며 소흉근을 동적으로 스트레칭하세요","15회 · 3세트"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"가슴 앞면 이완 루틴","body":"소흉근 스트레칭(벽 짚고 30초)을 매일 아침 루틴에 넣으세요. 소흉근 과긴장은 어깨 전방 당김의 주원인으로 하루이틀 만에 해소되지 않습니다."},{"title":"흉추 익스텐션 추가","body":"벤치 전 폼롤러 흉추 익스텐션 10회를 넣으세요. 소흉근 긴장과 흉추 경직은 함께 오는 경우가 많습니다."},{"title":"이 신호 오면 멈추세요","body":"벤치프레스 후 어깨 앞쪽이나 가슴 상단이 더 당기면 소흉근이 더 긴장된 것입니다. 해당 세션 후 스트레칭을 즉시 하세요."},{"title":"재발 방지 핵심","body":"푸시업·딥스·벤치를 모두 한 주에 과도하게 넣으면 소흉근 과긴장이 반복됩니다. 프레스 동작 총 볼륨을 관리하세요."}]}]}},{"id":"cause-c","label":"원인 C","tag":"과사용","name":"과사용 (볼륨·빈도 급증)","description":"자세도 좋고 소흉근도 유연한데 가슴이 아프다면 수평 프레스 볼륨이나 빈도가 갑자기 늘어난 것이 원인입니다. 회복 속도보다 자극이 많으면 대흉근 전체에 피로가 쌓입니다.","priority_note":"2주 부하를 낮추고 점진적으로 복귀합니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"도어웨이 대흉근 스트레칭","why":"피로가 쌓인 대흉근을 이완해 회복을 돕습니다.","sets":"30초 유지 · 3세트","cue":"당기는 느낌이지 통증이 아니어야 합니다.","how":["문틀에 팔꿈치를 대고 앞으로 천천히 기울이세요","가슴 앞쪽이 당기는 느낌으로 30초 유지"]},{"name":"등척성 흉근 수축 홀드","why":"부하 없이 혈류를 증가시켜 회복을 돕습니다.","sets":"30초 유지 · 3세트","cue":"통증 2/10 이하에서 수행합니다.","how":["양손을 가슴 앞에서 마주 대고 가볍게 눌러 30초 유지하세요","3세트"]},{"name":"푸쉬업 또는 덤벨 프레스 (1RM 40%)","why":"회복 후 최초 복귀 시 낮은 부하로 가슴 반응을 확인합니다.","sets":"10회 · 3세트","cue":"다음날 가슴 통증이 없어야 무게를 올립니다.","how":["푸쉬업 또는 덤벨로 가슴 통증 여부를 확인하세요","다음날 통증 없으면 무게를 올리세요"]}],"duration":"1주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"프레스 볼륨 감량","body":"가슴 과사용 통증은 즉시 프레스 볼륨을 30% 줄이는 것이 가장 빠른 해결입니다. 무게보다 볼륨(총 세트 수)을 먼저 줄이세요."},{"title":"다양한 각도 분산","body":"항상 같은 각도(플랫)만 반복하면 특정 근육 섬유에 과부하가 옵니다. 인클라인·딥스를 번갈아 사용해 자극 부위를 분산하세요."},{"title":"이 신호 오면 멈추세요","body":"프레스 후 가슴 전체가 뻣뻣하거나 다음날도 회복이 안 되면 과사용 신호입니다. 48시간 완전 휴식 후 재시작하세요."},{"title":"재발 방지 핵심","body":"메트콘과 근력 프레스를 같은 주에 과도하게 조합해주세요. 푸시업·버피·링 딥스가 포함된 WOD 주에는 벤치 세트 수를 줄이세요."}]}]}}],"danger":{"title":"지금 바로 운동을 멈추세요","reason":"'뚝' 소리와 함께 날카로운 통증, 멍, 가슴 근육이 뭉쳐 올라오는 느낌은 대흉근 파열 신호입니다.","action":"즉시 정형외과 또는 응급실 방문을 권장합니다. 파열 정도에 따라 수술 여부가 결정되므로 빠른 진단이 중요합니다."}}]},"row":{"id":"row","name":"로우","pain_sites":[{"id":"lower-back","name":"허리","coming_soon":false,"entry_question":"q1","questions":[{"id":"q1","text":"통증이 언제 느껴지나요?","sub":null,"choices":[{"id":"c1","text":"당기는 동작 중","next":"q:q2"},{"id":"c2","text":"앞으로 숙인 자세를 유지할 때","next":"q:q2"},{"id":"c3","text":"쉬는 중에도 욱신거린다","next":"danger"}]},{"id":"q2","text":"로우 자세에서 허리가 둥글게 말리는 편인가요?","sub":"바벨 로우, 덤벨 로우 등 앞으로 숙인 자세에서 등이 둥글어지는지 확인하세요.","choices":[{"id":"c1","text":"네, 등이 둥글어져요","next":"cause:cause-a"},{"id":"c2","text":"아니요, 자세는 괜찮아요","next":"test:test-hip-flexor"}]}],"tests":[{"id":"test-hip-flexor","name":"토마스 테스트 (고관절 굴곡근 긴장 확인)","purpose":"고관절 굴곡근이 짧으면 앞으로 숙인 로우 자세를 유지하기 어렵고 허리에 보상 부하가 생깁니다.","steps":["침대나 박스 끝에 앉으세요","한쪽 무릎을 양손으로 가슴 쪽으로 당기세요","그 상태로 천천히 뒤로 누우세요","반대쪽 다리가 자연스럽게 내려가는지 확인하세요"],"note":"반대쪽 다리가 뜨면 고관절 굴곡근이 짧은 것입니다.","pass_text":"반대쪽 다리가 바닥에 닿아요","fail_text":"반대쪽 다리가 들려요","pass_next":"cause:cause-c","fail_next":"cause:cause-b"}],"danger":{"title":"지금 바로 운동을 멈추세요","reason":"안정 시에도 허리 통증이 지속되거나 다리로 저림·방사통이 있으면 추간판 탈출증 등 구조적 손상이 의심됩니다.","action":"정형외과 또는 스포츠의학과 진료를 권장합니다. 통증 발생 상황(동작·무게·자세)을 기록해 방문하면 진단에 도움이 됩니다."},"causes":[{"id":"cause-a","label":"원인 A","tag":"기술 오류","name":"요추 굴곡 과부하 (라운드 백)","description":"로우 동작 중 등이 둥글게 말리면 추간판에 전방 압박이 집중됩니다. 자세 유지에 필요한 척추 기립근·코어가 충분히 강하지 않은 것이 원인입니다.","priority_note":"자세를 먼저 잡고 무게는 나중에 올립니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"복압 브레이싱 연습","why":"무거운 부하 아래서 허리를 보호하는 핵심은 복압(IAP)입니다. 이것을 의식적으로 만드는 연습부터 시작합니다.","sets":"10초 유지 · 10회 · 3세트","cue":"숨을 크게 들이쉬고 배를 360도 방향으로 부풀린 채 멈춥니다. 배를 집어넣지 마세요.","how":["편하게 서거나 앉으세요","코로 크게 숨을 들이쉬며 배를 360도 방향으로 부풀리세요","이 상태에서 10초 유지 후 천천히 내쉬세요","10회 · 3세트"]},{"name":"데드 버그 (Dead Bug)","why":"요추를 바닥에 고정한 채 사지를 움직여 코어 안정화를 훈련합니다. 허리 부하 없이 복횡근·다열근을 동시에 강화할 수 있습니다.","sets":"좌우 교대 10회 · 3세트","cue":"허리가 바닥에서 뜨는 순간 동작을 강도를 낮춰주세요.","how":["바닥에 누워 무릎 90도, 팔을 천장 방향으로 뻗으세요","숨을 내쉬며 허리를 바닥에 붙이세요","오른팔과 왼다리를 동시에 천천히 뻗었다 돌아오세요","좌우 교대 10회 · 3세트"]},{"name":"버드 독 (Bird Dog)","why":"네 발 자세에서 대각선 사지를 뻗어 척추 주변 심부 근육을 강화합니다. 골반이 흔들리지 않는 안정성이 목표입니다.","sets":"좌우 교대 10회 · 3세트","cue":"골반이 옆으로 기울지 않도록 속도보다 안정성에 집중합니다.","how":["네 발 자세에서 허리를 중립으로 만드세요","오른팔과 왼다리를 동시에 천천히 뻗으세요","3초 유지 후 천천히 돌아옵니다","좌우 교대 10회 · 3세트"]},{"name":"굿모닝 (맨몸)","why":"척추 기립근과 햄스트링을 강화하며 수평 자세에서 허리 중립을 유지하는 패턴을 각인합니다.","sets":"10회 · 3세트","cue":"허리가 둥글게 말리는 순간 강도를 낮춰주세요.","how":["발을 어깨너비로 서고 손을 머리 뒤에 놓으세요","무릎 살짝 구부리고 엉덩이를 뒤로 밀며 45도까지 숙이세요","허리 중립 유지 · 10회 · 3세트"]},{"name":"PVC 벤트오버 로우","why":"가장 가벼운 부하에서 자세를 확인합니다.","sets":"10회 · 3세트","cue":"당기기 전 브레이싱, 등이 중립인지 확인하세요.","how":["PVC로 벤트오버 로우 10회를 수행하며 등 중립을 확인하세요","등이 둥글면 무릎을 더 구부려 자세를 높이세요"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"로우 자세 셋업 체크","body":"바벨 로우 전 '가슴 세우기 → 복압 → 엉덩이 뒤로 빼기' 순서로 셋업하세요. 허리부터 내려가면 라운드 백이 시작됩니다."},{"title":"무게 복귀 속도 조절","body":"라운드 백으로 통증이 왔다면 최대의 60%로 돌아가 패턴을 먼저 잡으세요. 자세가 무너지는 무게는 아직 내 무게가 아닙니다."},{"title":"이 신호 오면 멈추세요","body":"로우 중 허리가 둥글게 말리는 느낌이 오면 해당 세트를 즉시 종료하세요. 라운드 백 반복은 디스크 손상으로 이어질 수 있습니다."},{"title":"재발 방지 핵심","body":"피로한 세트 후반에 라운드 백이 가장 많이 발생합니다. 세트당 반복수를 줄이고 자세 유지에 집중하세요."}]}]}},{"id":"cause-b","label":"원인 B","tag":"가동성 부족","name":"고관절 굴곡근 단축 (로우 자세 유지 어려움)","description":"고관절 굴곡근이 짧으면 앞으로 숙인 로우 자세에서 골반이 충분히 앞으로 기울지 않아 허리로 보상합니다. 고관절 굴곡근을 이완하면 자세가 개선되고 허리 부하가 줄어듭니다.","priority_note":"로우 전 고관절 굴곡근 스트레칭을 반드시 수행하세요.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"로우 런지 스트레칭 (Couch Stretch)","why":"장요근을 직접 늘려줍니다. 고관절 굴곡근이 짧아지면 골반이 앞으로 기울어 요추가 과신전됩니다.","sets":"좌우 각 60초 · 3세트","cue":"골반을 앞으로 밀면서 허리는 곧게 유지합니다. 허리가 젖혀지면 효과가 없습니다.","how":["한 발을 앞에, 반대 무릎을 바닥에 놓는 런지 자세를 취하세요","뒷발 쪽 엉덩이를 앞으로 밀면서 고관절 앞쪽이 당기는 느낌을 찾으세요","허리가 젖혀지지 않도록 복부를 살짝 조이세요","60초 유지 후 반대쪽"]},{"name":"데드 버그 (Dead Bug)","why":"요추를 바닥에 고정한 채 사지를 움직여 코어 안정화를 훈련합니다. 허리 부하 없이 복횡근·다열근을 동시에 강화할 수 있습니다.","sets":"좌우 교대 10회 · 3세트","cue":"허리가 바닥에서 뜨는 순간 동작을 강도를 낮춰주세요.","how":["바닥에 누워 무릎 90도, 팔을 천장 방향으로 뻗으세요","숨을 내쉬며 허리를 바닥에 붙이세요","오른팔과 왼다리를 동시에 천천히 뻗었다 돌아오세요","좌우 교대 10회 · 3세트"]},{"name":"버드 독 (Bird Dog)","why":"네 발 자세에서 대각선 사지를 뻗어 척추 주변 심부 근육을 강화합니다. 골반이 흔들리지 않는 안정성이 목표입니다.","sets":"좌우 교대 10회 · 3세트","cue":"골반이 옆으로 기울지 않도록 속도보다 안정성에 집중합니다.","how":["네 발 자세에서 허리를 중립으로 만드세요","오른팔과 왼다리를 동시에 천천히 뻗으세요","3초 유지 후 천천히 돌아옵니다","좌우 교대 10회 · 3세트"]},{"name":"플랭크","why":"코어 전체를 정적으로 강화합니다. 척추 안정성의 기반이 됩니다.","sets":"30~45초 · 3세트","cue":"엉덩이가 올라가거나 처지지 않도록 일직선을 유지합니다.","how":["팔꿈치를 어깨 아래에 놓고 전완으로 지지하세요","머리부터 발꿈치까지 일직선을 유지하세요","복부를 조이고 허리가 처지지 않도록 합니다","30~45초 · 3세트"]},{"name":"PVC 벤트오버 로우","why":"이완 후 가벼운 부하에서 자세를 확인합니다.","sets":"10회 · 3세트","cue":"이완 직후 수행해 고관절이 더 잘 접히는지 확인하세요.","how":["코치 스트레칭 직후 PVC 로우 10회를 수행하세요"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"로우 자세 전 굴곡근 이완","body":"피전 스트레칭 60초를 로우 전에 넣으세요. 고관절 굴곡근이 단축되면 앞으로 숙이는 자세 자체가 허리에 부하가 됩니다."},{"title":"상체 각도 제한","body":"재활 초기에는 상체를 45도 이상 기울이지 마세요. 고관절 굴곡근이 회복되면서 점진적으로 더 수평으로 내려가세요."},{"title":"이 신호 오면 멈추세요","body":"앞으로 숙인 자세에서 허리 양쪽이 당기거나 뻣뻣해지면 고관절 굴곡근이 한계에 달한 신호입니다. 세트를 종료하세요."},{"title":"재발 방지 핵심","body":"데드리프트·케틀벨 스윙처럼 앞으로 숙이는 동작이 많은 날에는 로우 볼륨을 줄이세요. 고관절 굴곡근 피로가 누적됩니다."}]}]}},{"id":"cause-c","label":"원인 C","tag":"과부하","name":"과부하/과사용","description":"자세도 좋고 유연성도 있는데 허리가 아프다면 로우 볼륨이나 무게가 급격히 늘어난 것이 원인입니다.","priority_note":"2주 부하를 낮추고 점진적으로 복귀합니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"차일드 포즈","why":"요추를 부드럽게 신장시킵니다.","sets":"60~90초 · 3세트","cue":"허리가 늘어나는 느낌에 집중하세요.","how":["무릎 꿇고 앉아 양손을 앞으로 뻗고 이마를 바닥에 대세요","60~90초 · 3세트"]},{"name":"데드 버그 (Dead Bug)","why":"요추를 바닥에 고정한 채 사지를 움직여 코어 안정화를 훈련합니다. 허리 부하 없이 복횡근·다열근을 동시에 강화할 수 있습니다.","sets":"좌우 교대 10회 · 3세트","cue":"허리가 바닥에서 뜨는 순간 동작을 강도를 낮춰주세요.","how":["바닥에 누워 무릎 90도, 팔을 천장 방향으로 뻗으세요","숨을 내쉬며 허리를 바닥에 붙이세요","오른팔과 왼다리를 동시에 천천히 뻗었다 돌아오세요","좌우 교대 10회 · 3세트"]},{"name":"플랭크","why":"코어 전체를 정적으로 강화합니다. 척추 안정성의 기반이 됩니다.","sets":"30~45초 · 3세트","cue":"엉덩이가 올라가거나 처지지 않도록 일직선을 유지합니다.","how":["팔꿈치를 어깨 아래에 놓고 전완으로 지지하세요","머리부터 발꿈치까지 일직선을 유지하세요","복부를 조이고 허리가 처지지 않도록 합니다","30~45초 · 3세트"]},{"name":"버드 독 (Bird Dog)","why":"네 발 자세에서 대각선 사지를 뻗어 척추 주변 심부 근육을 강화합니다. 골반이 흔들리지 않는 안정성이 목표입니다.","sets":"좌우 교대 10회 · 3세트","cue":"골반이 옆으로 기울지 않도록 속도보다 안정성에 집중합니다.","how":["네 발 자세에서 허리를 중립으로 만드세요","오른팔과 왼다리를 동시에 천천히 뻗으세요","3초 유지 후 천천히 돌아옵니다","좌우 교대 10회 · 3세트"]},{"name":"PVC 로우","why":"낮은 부하에서 허리 회복을 확인합니다.","sets":"10회 · 3세트","cue":"통증 0~1/10에서만 진행합니다.","how":["PVC로 10회 수행하며 허리 통증을 확인하세요"]}],"duration":"1주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"로우 볼륨 감량","body":"과부하 통증 후 이전 볼륨의 60%로 돌아가 2주마다 10~15%씩 올리세요. 로우는 허리 조직을 지속적으로 자극하는 동작이라 빠른 복귀가 위험합니다."},{"title":"데드리프트와 같은 날 금지","body":"로우와 데드리프트를 같은 날 하면 허리 신전근에 과부하가 누적됩니다. 재활 기간에는 두 동작을 다른 날로 분리하세요."},{"title":"이 신호 오면 멈추세요","body":"로우 세션 후 다음날 허리 뻣뻣함이 남아있으면 볼륨을 더 줄이세요. 48시간 회복이 되지 않으면 과부하 상태입니다."},{"title":"재발 방지 핵심","body":"로우 볼륨은 2주마다 10% 이내로만 올리세요. 컴피티션 준비 기간에 풀 볼륨으로 급격히 복귀하는 것이 가장 흔한 재발 원인입니다."}]}]}}]},{"id":"shoulder","name":"어깨","coming_soon":false,"entry_question":"q1","questions":[{"id":"q1","text":"어깨 통증이 느껴지나요?","sub":"로우(당기기) 동작 중 찝히거나 쉬는 중에도 아픈 경우 포함","choices":[{"id":"c1","text":"네, 통증이 있어요","next":"q:q2"},{"id":"c2","text":"아니요, 통증 없이 동작이 안 돼요","next":"q:q3"}]},{"id":"q2","text":"팔을 90도 들고 안쪽으로 비틀 때 아프면서, 팔에 힘이 빠지나요?","sub":"팔을 앞으로 들어 손바닥이 바닥을 향하게 비틀어보세요. 힘을 줘도 팔이 떨어지면 Drop Arm입니다.","choices":[{"id":"c1","text":"아프고 팔이 힘없이 떨어져요 (Drop Arm)","next":"danger"},{"id":"c2","text":"아프지만 힘은 유지돼요","next":"cause:cause-dp"}]},{"id":"q3","text":"룸바락(Lumbar Lock) 검사: 벽에 허리를 붙이고 팔을 들면 양쪽 엄지가 벽에 닿나요?","sub":"벽에 등·허리를 딱 붙이고, 팔꿈치를 편 채 양팔을 들어 엄지가 벽에 닿는지 확인하세요.","choices":[{"id":"c1","text":"네, 양쪽 모두 닿아요","next":"q:q4"},{"id":"c2","text":"팔이 안 닿거나 팔꿈치가 구부러져요","next":"cause:cause-case1"},{"id":"c3","text":"허리가 벽에서 떨어져요","next":"cause:cause-case2"},{"id":"c4","text":"어깨뼈(견갑골)가 날개처럼 튀어나와요","next":"cause:cause-case4"}]},{"id":"q4","text":"Apley's Scratch 검사: 한 팔은 위로, 반대 팔은 아래로 등 뒤에서 양손을 가까이 할 때 어떤가요?","sub":"찝히거나 날카롭게 아프면 DP 상태일 수 있습니다.","choices":[{"id":"c1","text":"한쪽 팔이 많이 제한되고 찝혀요","next":"cause:cause-dp"},{"id":"c2","text":"팔 범위는 어느 정도 되지만 한쪽이 훨씬 뻑뻑해요","next":"cause:cause-case3"},{"id":"c3","text":"대칭으로 잘 돼요","next":"cause:cause-case4"}]}],"tests":[],"danger":{"title":"지금 바로 운동을 멈추세요","reason":"Drop Arm(팔이 힘없이 떨어짐)은 회전근개 파열 신호입니다. 자가 재활을 진행하면 손상이 커질 수 있습니다.","action":"정형외과 또는 스포츠의학과에서 MRI 검사를 권장합니다. 증상 발생 상황(동작·소리·붓기)을 기록해 방문하세요."},"causes":[{"id":"cause-dp","label":"DP 프로세스","tag":"통증 조절","name":"충돌증후군 — 통증 있는 상태 (보호 우선)","description":"어깨를 쓸 때 찝히는 통증이 있으면 구조적 손상 악화를 막고 염증을 가라앉히는 것이 먼저입니다. 오버헤드 동작은 즉시 중단하고 통증 없는 범위의 등척성(버티기) 운동부터 시작합니다.","priority_note":"통증이 완전히 사라진 후 DN 재평가를 거쳐 복귀합니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"월 프레스 (등척성)","why":"통증 없는 등척성 수축으로 어깨 근육을 깨웁니다. 관절 움직임 없이 수행해 염증을 악화시키지 않습니다.","sets":"10초 유지 · 5세트","cue":"팔꿈치 90도 굽혀 벽에 대고 밀어내는 힘만 줍니다. 팔이 움직이면 하는 것이 좋습니다.","how":["벽 앞에 서서 팔꿈치를 90도 굽혀 벽에 대세요","통증이 없는 힘으로 벽을 밀어내며 10초 유지하세요","5세트, 통증 있으면 즉시 중단"]},{"name":"아이소메트릭 밴드 홀드 (내·외회전)","why":"회전근개를 통증 없는 범위에서 등척성으로 자극합니다. 혈류를 증가시켜 조직 회복을 돕습니다.","sets":"10초 유지 · 5세트 (내·외회전 각각)","cue":"약한 밴드로 시작하고 통증이 생기면 즉시 강도를 낮춰주세요.","how":["약한 저항 밴드를 고정점에 연결하세요","팔꿈치 90도 굽힌 채 내회전(배 쪽) 방향으로 10초 버티세요","같은 자세로 외회전(바깥) 방향도 10초 버티세요","각 방향 5세트"]},{"name":"펜듈럼 엑서사이즈","why":"중력을 이용해 어깨 관절 공간을 확보합니다. 능동적 움직임 없이 관절액을 순환시켜 통증을 줄입니다.","sets":"원형 10회 · 전후 10회 · 3세트","cue":"팔에 힘을 완전히 빼고 몸통을 가볍게 흔들어 팔이 추처럼 움직이게 합니다.","how":["테이블에 반대 손을 짚고 상체를 앞으로 숙이세요","아픈 팔의 힘을 완전히 빼고 원형으로 10회 돌리세요","앞뒤로 10회 추 운동하세요","3세트"]},{"name":"슬리퍼 스트레치","why":"후방 관절낭 경직이 충돌증후군의 주요 원인 중 하나입니다. 내회전 가동성을 회복해 어깨 공간을 확보합니다.","sets":"30초 유지 · 3세트","cue":"통증이 아닌 당기는 느낌만 있어야 합니다.","how":["옆으로 누워 아픈 어깨를 아래로 하세요","아래팔을 90도 세우고 반대 손으로 손목을 잡아 바닥 쪽으로 부드럽게 누르세요","30초 유지 · 3세트"]},{"name":"크로스오버 시머트리 활성화","why":"약한 장력 밴드로 어깨 주변 혈류를 증가시킵니다. 통증 발생 범위 이전까지만 실시합니다.","sets":"15회 · 3세트","cue":"통증이 생기는 각도 직전까지만 수행합니다.","how":["약한 밴드를 어깨 높이에 고정하세요","팔꿈치를 붙인 채 바깥으로 당기는 동작을 15회 수행하세요","통증이 생기면 범위를 줄이세요"]},{"name":"푸쉬업 플러스","why":"통증이 줄면 전거근을 활성화합니다. 전거근이 견갑골을 흉곽에 붙여야 어깨 공간이 확보됩니다.","sets":"10회 · 3세트","cue":"팔꿈치를 편 상태에서 등을 추가로 둥글게 밀어내는 마지막 동작이 핵심입니다.","how":["푸쉬업 상단 자세에서 시작하세요","팔꿈치를 편 채 등을 천장 쪽으로 더 밀어내세요 (플러스 동작)","천천히 원위치 · 10회 · 3세트"]},{"name":"Y-레이즈 (엎드려)","why":"하부 승모근을 집중 강화합니다. 상부 승모근이 과활성화되어 있으면 어깨가 올라가 충돌 공간이 줄어듭니다.","sets":"12회 · 3세트","cue":"팔을 들 때 어깨가 귀 쪽으로 올라가지 않도록 견갑골을 아래로 유지합니다.","how":["엎드려 누워 팔을 Y자 방향(대각선 앞)으로 뻗으세요","엄지가 위를 향한 채 팔을 천천히 들어 올리세요","어깨가 올라가지 않도록 주의하며 12회 · 3세트"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"통증 구간 회피 원칙","body":"로우 복귀 시 팔이 수평 이상 올라가지 않는 범위에서 시작하세요. 충돌이 일어나는 각도를 반복하면 회복이 역행합니다."},{"title":"견갑골 세팅 먼저","body":"모든 어깨 동작 전 견갑골을 뒤·아래로 살짝 당기는 '팩킹' 동작을 넣으세요. 어깨 공간이 확보된 상태에서 팔을 올려야 충돌이 줄어듭니다."},{"title":"이 신호 오면 멈추세요","body":"팔을 올릴 때 60~120도 구간에서 찌릿하거나 걸리는 느낌이 오면 해당 동작을 중단하세요. 통증 구간을 반복하면 회전근개 손상으로 이어질 수 있습니다."},{"title":"재발 방지 핵심","body":"어깨 통증이 사라진 후에도 가슴·앞 어깨 스트레칭을 매일 유지하세요. 전방 경직이 재발하면 충돌증후군도 함께 돌아옵니다."}]}]}},{"id":"cause-case1","label":"Case 1","tag":"가동성 부족","name":"광배근·흉추 경직 (어깨 굴곡 공간 부족)","description":"팔을 머리 위로 들 때 광배근이나 흉추가 굳어 있으면 어깨가 충분히 올라가지 않습니다. 팔꿈치가 구부러지거나 허리가 꺾이는 것은 공간이 부족해 나타나는 보상 패턴입니다. 가동성 확보가 먼저입니다.","priority_note":"광배근 이완 → 흉추 가동성 → 패턴 통합 순으로 진행합니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"밴드 랫 트랙션","why":"철봉에 밴드를 걸고 체중을 실으면 광배근이 직접 이완됩니다. 팔을 올리는 공간이 가장 빠르게 확보되는 방법입니다.","sets":"1분 유지 · 좌우 각 2세트","cue":"몸을 아래로 내리며 광배근이 늘어나는 느낌에 집중합니다.","how":["철봉에 저항 밴드를 걸고 한 손으로 잡으세요","밴드가 당기는 방향으로 몸을 살짝 기울여 체중을 실으세요","겨드랑이 아래·뒤가 당기는 느낌으로 1분 유지하세요","좌우 각 2세트"]},{"name":"네발기기 흉추 회전","why":"흉추 가동성이 회복되면 어깨를 들어올릴 때 요추가 보상하지 않아도 됩니다.","sets":"좌우 각 10회 · 3세트","cue":"요추는 고정하고 흉추(등 중간)만 회전시킵니다.","how":["네 발 자세에서 한 손을 머리 뒤에 얹으세요","그 팔꿈치를 천장 쪽으로 회전시키세요 (등 중간이 돌아야 함)","허리가 따라 돌지 않도록 주의하며 10회 · 3세트"]},{"name":"브렛젤 스트레치 (Brettzel)","why":"흉추 회전과 대퇴직근(고관절 굴곡근)을 동시에 스트레칭합니다. 전신 연결성을 회복해 어깨 들기 동작에 필요한 흉추 공간을 확보합니다.","sets":"좌우 각 45초 · 2세트","cue":"위쪽 어깨를 바닥 쪽으로 부드럽게 눌러 흉추 회전을 극대화합니다.","how":["옆으로 누워 아래 무릎을 90도 굽히세요","위 발목을 잡아 대퇴직근을 스트레칭하세요","위쪽 팔을 뒤로 넘기며 흉추를 회전시키세요","45초 유지 후 반대쪽"]},{"name":"룸바락 어깨 굴곡 연습","why":"광배근·흉추가 풀리면 실제 동작에서 보상 없이 팔을 들 수 있는지 확인합니다.","sets":"10회 · 3세트","cue":"허리를 벽에 붙인 채 팔꿈치를 펴고 엄지가 벽에 닿도록 들어 올립니다.","how":["벽에 등·허리를 밀착하고 팔을 천천히 들어 올리세요","팔꿈치가 구부러지거나 허리가 떨어지면 멈추고 이전 단계를 반복하세요","10회 · 3세트"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"흉추·광배 이완 루틴","body":"로우 전 폼롤러 흉추 익스텐션 10회 + 광배근 스트레칭 30초를 넣으세요. 이 두 조직이 경직되면 팔을 올릴 공간이 막힙니다."},{"title":"팔 올리기 전 흉추 체크","body":"팔을 머리 위로 올리기 전 가슴을 먼저 세우세요. 흉추가 굽은 상태에서 팔을 올리면 어깨 충돌 공간이 절반으로 줄어듭니다."},{"title":"이 신호 오면 멈추세요","body":"팔을 들어올릴 때 어깨가 귀 쪽으로 올라간다면 광배·흉추 경직이 동작을 막고 있는 것입니다. 무게를 줄이고 가동성 운동을 먼저 하세요."},{"title":"재발 방지 핵심","body":"장시간 앉아있는 날 이후 반드시 흉추 이완을 먼저 하세요. 책상 자세가 광배·흉추 경직을 가장 빠르게 만드는 원인입니다."}]}]}},{"id":"cause-case2","label":"Case 2","tag":"조절 실패","name":"코어-상지 분리 실패 (팔 들 때 허리가 따라감)","description":"팔을 들어올릴 때 허리가 자동으로 따라가면 코어가 팔의 움직임과 분리되지 않는 것입니다. 팔과 몸통을 독립적으로 움직이는 신경근 조절 훈련이 필요합니다.","priority_note":"코어 브레이싱 → 분리 훈련 → 오버헤드 통합 순으로 진행합니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"복압 브레이싱 연습","why":"팔이 머리 위로 올라갈 때 코어가 허리를 고정해야 어깨 공간이 유지됩니다. 브레이싱부터 각인합니다.","sets":"10초 유지 · 10회 · 3세트","cue":"숨을 크게 들이쉬고 배를 360도 방향으로 부풀린 채 멈춥니다.","how":["코로 크게 숨을 들이쉬며 배를 360도 방향으로 부풀리세요","이 상태에서 10초 유지 후 천천히 내쉬세요","10회 · 3세트"]},{"name":"데드 버그 (Dead Bug)","why":"요추를 고정한 채 팔과 다리를 독립적으로 움직이는 분리 패턴을 훈련합니다.","sets":"좌우 교대 10회 · 3세트","cue":"허리가 바닥에서 뜨는 순간 동작을 강도를 낮춰주세요.","how":["바닥에 누워 무릎 90도, 팔을 천장 방향으로 뻗으세요","숨을 내쉬며 허리를 바닥에 붙이세요","오른팔과 왼다리를 동시에 천천히 뻗었다 돌아오세요","좌우 교대 10회 · 3세트"]},{"name":"하프 닐링 촙 앤 리프트","why":"비대칭 코어 안정화 상태에서 팔을 움직여 코어-상지 분리를 훈련합니다.","sets":"좌우 각 10회 · 3세트","cue":"팔이 움직여도 골반이 흔들리지 않아야 합니다.","how":["한쪽 무릎을 바닥에 대고 반하프닐링 자세를 취하세요","밴드 또는 케이블을 대각선 아래에서 위로 당기며 몸통을 회전시키세요","골반이 안정적으로 유지하며 코어를 유지하며 10회 · 3세트"]},{"name":"터키시 겟업 1단계 (암 바)","why":"누운 자세에서 한 팔을 천장으로 뻗어 어깨 동적 안정성을 훈련합니다. 움직이는 동안 어깨 안정화 근육이 반사적으로 작동하도록 훈련합니다.","sets":"좌우 각 5회 · 3세트","cue":"팔꿈치를 완전히 펴고 어깨뼈를 패킹한 채 팔이 천장을 향하도록 유지합니다.","how":["바닥에 누워 한 손에 가벼운 웨이트를 잡고 천장으로 뻗으세요","반대 무릎을 세우고 옆구리로 구르며 앉는 첫 단계를 수행하세요","팔이 천장을 향한 채 유지하며 5회 · 3세트"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"코어 먼저, 팔 나중","body":"로우 모든 세트에서 코어를 단단히 조인 뒤 팔 동작을 시작하세요. 코어와 상지가 분리되지 않으면 허리가 대신 반응합니다."},{"title":"데드버그 워밍업 삽입","body":"세션 전 데드버그 10회를 넣어 코어-상지 분리 패턴을 먼저 각인하세요. 이 패턴이 익숙해야 무거운 무게에서도 유지됩니다."},{"title":"이 신호 오면 멈추세요","body":"팔을 들 때 허리가 자동으로 젖혀진다면 코어 분리가 아직 안 된 것입니다. 무게를 내리고 패턴 연습으로 돌아가세요."},{"title":"재발 방지 핵심","body":"볼륨이 증가할수록 코어 피로가 먼저 오고 분리가 깨집니다. 세트 후반 허리 반응을 항상 모니터링하세요."}]}]}},{"id":"cause-case3","label":"Case 3","tag":"가동성 부족","name":"후방 관절낭 경직 (내회전·수평 내전 제한)","description":"어깨 뒤쪽 주머니(후방 관절낭)가 굳어지면 팔을 등 뒤로 올리는 동작이나 수평으로 내리는 동작이 크게 제한됩니다. Apley's Scratch에서 아래팔이 훨씬 제한되는 패턴입니다.","priority_note":"후방 관절낭 이완 → 가동 범위 확장 → 패턴 통합 순으로 진행합니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"슬리퍼 스트레치","why":"후방 관절낭을 직접 이완합니다. 내회전 가동성이 회복되면 Apley's Scratch 제한이 풀립니다.","sets":"30초 유지 · 3세트","cue":"통증이 아닌 당기는 느낌만 있어야 합니다. 천천히 부드럽게.","how":["옆으로 누워 아픈 어깨를 아래로 하세요","아래팔을 90도 세우고 반대 손으로 손목을 잡아 바닥 쪽으로 부드럽게 누르세요","30초 유지 · 3세트"]},{"name":"인디안 클럽 스윙 (또는 가벼운 덤벨 원형 스윙)","why":"관절 궤도를 따라 부드럽게 움직여 후방 관절낭과 회전근개를 동적으로 이완합니다.","sets":"원형 10회 · 전후 10회 · 3세트","cue":"팔에 힘을 빼고 추처럼 자연스럽게 흔들어 관절 공간을 확보합니다.","how":["가벼운 덤벨(1~2kg)을 손에 들고 팔을 자연스럽게 늘어뜨리세요","원형으로 10회, 앞뒤로 10회 부드럽게 스윙하세요","3세트"]},{"name":"90/90 ER/IR PAILs & RAILs","why":"끝범위에서 등척성 수축 후 이완하면 관절낭이 더 효과적으로 늘어납니다. 단순 스트레칭보다 가동 범위 확장 효과가 큽니다.","sets":"20초 등척성 · 30초 이완 · 3세트","cue":"끝범위에서 20초 버티는 힘이 이완 후 가동 범위를 넓혀줍니다.","how":["옆으로 누워 어깨와 팔꿈치를 90/90 자세로 만드세요","내회전(바닥 쪽) 끝범위에서 반대 방향으로 20초 등척성 저항을 주세요","20초 후 힘을 빼고 30초 추가 이완","3세트"]},{"name":"밴드 외회전 강화","why":"후방 관절낭이 이완되면 회전근개(특히 극하근·소원근)를 강화해 안정성을 확보합니다.","sets":"15회 · 3세트","cue":"팔꿈치를 옆구리에 붙이고 바깥으로만 회전합니다.","how":["밴드를 팔꿈치 높이에 고정하세요","팔꿈치를 옆구리에 붙이고 90도 굽힌 채 바깥으로 당기세요","천천히 돌아오며 15회 · 3세트"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"수평 내전 스트레칭 매일","body":"크로스 바디 어깨 스트레칭 30초를 매일 아침 루틴에 넣으세요. 후방 관절낭이 경직되면 내회전이 막혀 어깨 충돌이 반복됩니다."},{"title":"그립 너비 조정","body":"로우에서 그립을 조금 넓히면 내회전 요구가 줄어 후방 관절낭 부담이 감소합니다. 통증 없는 너비를 먼저 찾으세요."},{"title":"이 신호 오면 멈추세요","body":"팔꿈치를 몸 앞으로 모을 때 어깨 뒤쪽에 압박감이 오면 후방 관절낭이 아직 열리지 않은 것입니다. 그 이상 내전해주세요."},{"title":"재발 방지 핵심","body":"렉에서 바를 잡기 전 어깨 내회전을 30초 스트레칭하는 습관을 만드세요. 차가운 상태로 어깨를 바로 쓰면 후방 경직이 빠르게 재발합니다."}]}]}},{"id":"cause-case4","label":"Case 4","tag":"근력 부족","name":"전거근·하부 승모근 약화 (견갑골 익상)","description":"팔을 들 때 어깨뼈가 날개처럼 뒤로 튀어나오거나 통제되지 않으면 전거근과 하부 승모근이 충분히 작동하지 않는 것입니다. 견갑골이 제대로 붙어 있어야 팔을 올릴 때 어깨 관절 공간이 확보됩니다.","priority_note":"견갑골 안정화 근육(전거근·하부 승모근)을 먼저 깨워야 합니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"푸쉬업 플러스","why":"전거근을 직접 활성화합니다. 마지막에 등을 추가로 밀어내는 동작에서 전거근이 집중적으로 켜집니다.","sets":"10회 · 3세트","cue":"팔꿈치를 편 상태에서 등을 추가로 둥글게 밀어내는 마지막 동작이 핵심입니다.","how":["푸쉬업 상단 자세에서 시작하세요","팔꿈치를 편 채 등을 천장 쪽으로 더 밀어내세요","천천히 원위치 · 10회 · 3세트"]},{"name":"Y-레이즈 (엎드려)","why":"하부 승모근을 집중 강화합니다. 상부 승모근이 덜 켜지고 하부 승모근이 더 켜지도록 훈련합니다.","sets":"12회 · 3세트","cue":"팔을 들 때 어깨가 귀 쪽으로 올라가지 않도록 견갑골을 아래로 유지합니다.","how":["엎드려 누워 팔을 Y자 방향(대각선 앞)으로 뻗으세요","엄지가 위를 향한 채 팔을 천천히 들어 올리세요","어깨가 올라가지 않도록 주의하며 12회 · 3세트"]},{"name":"월 슬라이드 (폼롤러)","why":"전거근과 하부 승모근의 협응으로 견갑골이 흉곽을 타고 올라가는 정상 견갑상완 리듬을 훈련합니다.","sets":"10회 · 3세트","cue":"팔을 올리는 내내 어깨가 귀에서 멀어지도록 아래로 유지하세요.","how":["벽 앞에 서서 팔꿈치를 구부려 폼롤러를 벽에 대세요","팔꿈치를 펴며 폼롤러를 위로 밀어 올리세요","어깨가 올라가지 않도록 10회 · 3세트"]},{"name":"링 로우 홀드","why":"수평 당기기 자세에서 전거근·하부 승모근의 협응을 강화합니다.","sets":"20초 · 3세트","cue":"가슴을 링에 붙인 자세에서 어깨뼈를 아래·뒤로 당겨 유지합니다.","how":["링을 잡고 가슴을 링 높이로 당겨 20초 유지하세요","어깨가 올라가지 않도록 주의하며 3세트"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"견갑골 세팅 의식화","body":"로우 모든 세트에서 팔을 올리기 전 견갑골을 뒤·아래로 당기는 동작을 먼저 하세요. 전거근·하부 승모근이 약하면 이 습관이 보상합니다."},{"title":"Y·T·W 보조 운동 유지","body":"세션 후 밴드로 Y·T·W 각 10회를 꾸준히 유지하세요. 이 근육들은 사용하지 않으면 빠르게 다시 약해집니다."},{"title":"이 신호 오면 멈추세요","body":"팔을 올릴 때 어깨가 앞으로 말리거나 견갑골이 날개처럼 튀어나오면 안전한 범위를 벗어난 것입니다. 해당 세트를 종료하세요."},{"title":"재발 방지 핵심","body":"푸시업·딥스·프레스 볼륨이 늘어날수록 전거근·하부 승모근 보강 운동도 함께 늘리세요. 전면 근육 과부하가 견갑 안정화 근육 약화를 만듭니다."}]}]}}]},{"id":"wrist","name":"손목","coming_soon":false,"entry_question":"q1","questions":[{"id":"q1","text":"손목 어느 쪽이 아픈가요?","sub":"바를 당길 때 손목 어느 쪽인지 짚어보세요.","choices":[{"id":"c1","text":"손목을 뒤로 꺾을 때 앞쪽 당김","next":"cause:cause-a"},{"id":"c2","text":"손등 또는 팔뚝 바깥쪽 (신전근 쪽)","next":"cause:cause-b"},{"id":"c3","text":"새끼손가락 쪽 또는 안쪽 (굴곡근 쪽)","next":"cause:cause-c"},{"id":"c4","text":"쉬는 중에도 욱신거린다","next":"danger"}]}],"tests":[],"causes":[{"id":"cause-a","label":"원인 A","tag":"가동성 부족","name":"손목 신전 가동성 부족","description":"바를 잡거나 손목을 뒤로 꺾는 자세에서 손목 앞쪽이 당기고 아프다면 손목 신전 가동성이 부족한 것입니다. 관절 가동성을 확보하면 바 그립 자세에서 통증이 줄어듭니다.","priority_note":"가동성 확보가 먼저, 부하는 그 다음입니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"손목 굴곡근 스트레칭","why":"손목 앞쪽(굴곡근)이 짧으면 손목을 뒤로 꺾는 범위가 줄어듭니다. 직접 이완하면 그립 자세가 편해집니다.","sets":"30초 유지 · 3세트","cue":"팔꿈치를 편 채 손바닥을 앞으로 향하게 당깁니다.","how":["한 팔을 앞으로 뻗고 손바닥이 위를 향하게 하세요","반대 손으로 손가락을 아래로 당겨 손목 앞쪽을 늘리세요","30초 유지 후 반대쪽 · 3세트"]},{"name":"손목 원형 가동 운동","why":"손목 관절 전체를 부드럽게 움직여 활액을 순환시키고 가동 범위를 회복합니다.","sets":"양쪽 각 10회 · 2세트","cue":"통증 없는 범위에서 크고 느리게 원을 그립니다.","how":["양손을 맞잡거나 개별로 천천히 원을 그리세요","시계 방향 10회, 반시계 10회 · 2세트"]},{"name":"쿼드루페드 손목 신전 스트레칭","why":"체중을 실어 손목 신전 가동성을 훈련합니다. 실제 그립 자세와 가장 유사한 각도에서 이완합니다.","sets":"30초 유지 · 3세트","cue":"통증이 아닌 당기는 느낌만 있어야 합니다. 체중을 서서히 실으세요.","how":["네 발 자세에서 손가락이 무릎 방향으로 향하도록 손을 뒤집으세요","몸을 살짝 뒤로 밀어 손목에 체중을 실으세요","30초 유지 · 3세트"]},{"name":"손목 신전근 강화 (덤벨 리스트 익스텐션)","why":"신전 가동성과 함께 신전근을 강화하면 그립 자세를 더 안정적으로 유지할 수 있습니다.","sets":"15회 · 3세트","cue":"천천히 올리고 천천히 내립니다. 3초씩.","how":["테이블 끝에 팔뚝을 올리고 손목이 테이블 밖으로 나오게 하세요","가벼운 덤벨(1~2kg)을 잡고 손목을 천천히 들어 올리세요","15회 · 3세트"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"손목 준비 루틴","body":"로우 전 손목 서클 20회 + 손바닥 바닥 짚고 스트레칭 30초를 넣으세요. 손목이 충분히 열려야 바 그립 시 과부하가 줄어듭니다."},{"title":"그립 조정 전략","body":"바를 잡을 때 손바닥 아래쪽(손바닥과 손가락 경계)으로 쥐세요. 손목이 꺾이지 않아 신전 부담이 줄어듭니다."},{"title":"이 신호 오면 멈추세요","body":"손목 뒤쪽이 당기거나 그립 유지가 어려우면 손목 신전이 한계에 달한 것입니다. 스트랩으로 보조하거나 세트를 줄이세요."},{"title":"재발 방지 핵심","body":"프론트 스쿼트·클린·저크처럼 손목 신전이 많이 필요한 동작을 같은 날 겹치지 마세요. 손목 누적 부하가 빠르게 쌓입니다."}]}]}},{"id":"cause-b","label":"원인 B","tag":"과부하","name":"손목 신전근 건병증 (손등·팔뚝 바깥쪽 통증)","description":"바를 반복적으로 잡고 놓는 동작에서 손목 신전근이 과부하되면 손등이나 팔뚝 바깥쪽이 아픕니다. 갑자기 볼륨이 늘거나 그립 강도가 증가했을 때 흔합니다. 편심성 강화와 충분한 회복이 핵심입니다.","priority_note":"2주 부하를 낮추고 편심성 강화를 병행합니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"손목 신전근 마사지 + 스트레칭","why":"팔뚝 바깥쪽 근육의 긴장을 직접 풀어줍니다.","sets":"60초 마사지 + 30초 스트레칭 · 3세트","cue":"손을 주먹 쥔 채 팔뚝 바깥쪽을 반대 손으로 눌러가며 마사지합니다.","how":["반대 손 엄지로 팔뚝 바깥쪽을 천천히 문지르세요","이후 팔을 앞으로 뻗고 손바닥을 아래로 향해 30초 스트레칭하세요","3세트"]},{"name":"등척성 손목 신전 홀드","why":"건병증 초기에 등척성 수축은 통증을 줄이면서 건을 자극합니다.","sets":"45초 유지 · 4세트","cue":"통증 3/10 이하에서 수행합니다.","how":["테이블에 팔뚝을 올리고 손목이 밖으로 나오게 하세요","손목을 위로 드는 힘을 주며 반대 손으로 저항을 45초 유지하세요","4세트"]},{"name":"편심성 손목 신전 (덤벨)","why":"건병증 재활의 핵심입니다. 천천히 내려오는 편심성 동작에서 건이 강화됩니다.","sets":"15회 · 3세트","cue":"반대 손으로 들어 올리고, 아픈 손으로만 3초에 걸쳐 내립니다.","how":["테이블 끝에 팔뚝을 올리고 가벼운 덤벨을 잡으세요","반대 손으로 손목을 올려준 뒤","아픈 손으로만 3초에 걸쳐 천천히 내려오세요","15회 · 3세트"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"충격 동작 분리","body":"손등·팔뚝 바깥쪽 통증이 있을 때는 로우과 케틀벨 스윙·박스점프를 같은 날 해주세요. 신전근 건병증은 반복 충격에 민감합니다."},{"title":"그립 강도 줄이기","body":"바를 너무 세게 쥐면 신전근 건에 과부하가 옵니다. 바가 미끄러지지 않을 정도의 최소 그립으로 훈련하세요."},{"title":"이 신호 오면 멈추세요","body":"팔뚝 바깥쪽에 타는 듯한 느낌이나 팔꿈치 바깥쪽 압통이 오면 당일 손목 신전 동작을 모두 중단하세요."},{"title":"재발 방지 핵심","body":"통증이 사라진 후에도 전완 신전근 스트레칭을 매일 유지하세요. 건병증은 완치 후에도 과부하 시 재발률이 높습니다."}]}]}},{"id":"cause-c","label":"원인 C","tag":"과부하","name":"손목 굴곡근 과부하 / TFCC (새끼손가락 쪽 통증)","description":"바를 잡아당기는 동작에서 손목 안쪽(새끼손가락 쪽)이 아프거나 손목을 비틀 때 통증이 있으면 굴곡근 과부하 또는 TFCC(손목 삼각섬유연골 복합체) 문제일 수 있습니다. 부하를 줄이고 손목 회전 가동성을 회복해야 합니다.","priority_note":"새끼손가락 쪽 날카로운 통증은 TFCC 손상일 수 있으므로 심하면 의사 진료를 먼저 받으세요.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"손목 굴곡근 스트레칭","why":"손목 안쪽 굴곡근 긴장을 풀어줍니다.","sets":"30초 · 3세트","cue":"팔꿈치를 편 채 손바닥이 위를 향하게 하고 손가락을 아래로 당깁니다.","how":["팔을 앞으로 뻗고 손바닥이 위를 향하게 하세요","반대 손으로 손가락을 아래로 당겨 30초 유지하세요","3세트"]},{"name":"손목 전완 회내·회외 운동","why":"손목 회전 가동성을 회복합니다. TFCC 기능 회복에 중요합니다.","sets":"15회 · 3세트","cue":"팔꿈치를 옆구리에 붙이고 팔뚝만 회전합니다.","how":["팔꿈치를 90도 굽히고 옆구리에 붙이세요","손바닥이 위·아래를 교대로 향하도록 천천히 회전하세요","15회 · 3세트"]},{"name":"등척성 그립 홀드","why":"그립 근육을 등척성으로 자극해 혈류를 증가시키고 건 회복을 돕습니다.","sets":"30초 유지 · 4세트","cue":"통증 3/10 이하에서 수행합니다.","how":["테니스공이나 핸드그립을 가볍게 쥐고 30초 유지하세요","4세트"]},{"name":"편심성 손목 굴곡 (덤벨)","why":"굴곡근 건을 편심성으로 강화합니다.","sets":"15회 · 3세트","cue":"반대 손으로 들어 올리고, 아픈 손으로만 3초에 걸쳐 내립니다.","how":["테이블 끝에 팔뚝을 올리고 손바닥이 위를 향하게 하세요","반대 손으로 손목을 올려준 뒤 아픈 손으로만 천천히 내려오세요","15회 · 3세트"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"새끼손가락 쪽 부하 분산","body":"로우에서 그립을 살짝 넓히면 TFCC(손목 새끼손가락 쪽) 부하가 줄어듭니다. 통증 없는 그립 너비를 먼저 찾으세요."},{"title":"회전 동작 주의","body":"손목을 비트는 동작(클린·스내치 전환)이 TFCC에 가장 많은 스트레스를 줍니다. 재활 기간에는 이 동작을 제한하세요."},{"title":"이 신호 오면 멈추세요","body":"새끼손가락 쪽 손목에 찌릿하거나 약해지는 느낌이 오면 즉시 그립을 놓으세요. TFCC 손상은 조기 처치가 중요합니다."},{"title":"재발 방지 핵심","body":"손목 굴곡근 스트레칭(손목 꺾어 30초)을 세션 후 루틴으로 추가하세요. 굴곡근 경직이 TFCC 부하의 주원인입니다."}]}]}}],"danger":{"title":"지금 바로 운동을 멈추세요","reason":"안정 시에도 손목 통증이 지속되거나 저림·붓기가 있으면 인대·연골 손상이 의심됩니다.","action":"정형외과 또는 스포츠의학과 진료를 권장합니다. 통증 위치(엄지 쪽/새끼 쪽/가운데)를 기록해 방문하세요."}},{"id":"elbow","name":"팔꿈치","coming_soon":false,"entry_question":"q1","questions":[{"id":"q1","text":"팔꿈치 어느 쪽이 아픈가요?","sub":"당기는 순간 팔꿈치 어느 쪽인지 짚어보세요.","choices":[{"id":"c1","text":"바깥쪽 뼈 돌출부 (신전근 쪽)","next":"cause:cause-a"},{"id":"c2","text":"안쪽 뼈 돌출부 (굴곡근 쪽)","next":"cause:cause-b"},{"id":"c3","text":"앞쪽 (팔꿈치 접히는 부분)","next":"cause:cause-c"},{"id":"c4","text":"쉬는 중에도 욱신거린다","next":"danger"}]}],"tests":[],"causes":[{"id":"cause-a","label":"원인 A","tag":"과부하","name":"외측 상과염 (테니스 엘보 — 팔꿈치 바깥쪽)","description":"바를 잡고 당기는 동작에서 팔꿈치 바깥쪽 뼈 돌출부(외측 상과)가 아프면 손목 신전근의 공통 건이 과부하된 것입니다. 로우·프레스에서 흔하며, 편심성 강화가 핵심입니다.","priority_note":"2주 부하를 낮추고 편심성 손목 신전 강화를 병행합니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"팔뚝 바깥쪽 마사지 + 스트레칭","why":"외측 상과에 붙는 신전근 긴장을 풀어 건 부착부 부담을 줄입니다.","sets":"60초 마사지 + 30초 스트레칭 · 3세트","cue":"팔꿈치를 편 채 손목을 아래로 당기면 팔꿈치 바깥쪽이 당깁니다.","how":["반대 손 엄지로 팔뚝 바깥쪽을 천천히 문지르세요 (60초)","팔을 앞으로 뻗고 손바닥을 아래로 향해 손목을 아래로 당겨 30초","3세트"]},{"name":"등척성 손목 신전 홀드","why":"건병증 초기 통증 감소와 건 자극을 동시에 얻습니다.","sets":"45초 유지 · 4세트","cue":"통증 3/10 이하에서 수행합니다.","how":["테이블에 팔뚝을 올리고 손목 신전 자세에서 반대 손으로 저항을 주며 4 "id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"팔꿈치 안쪽 이완 루틴","body":"로우 전 전완 굴곡근 스트레칭 30초를 넣으세요. 내측 상과염은 굴곡근 과긴장에서 시작됩니다."},{"title":"당기는 동작 볼륨 조절","body":"풀업·로우·데드리프트를 한 세션에 모두 넣으면 굴곡근 건에 과부하가 옵니다. 재활 기간에는 한 세션에 하나만 집중하세요."},{"title":"이 신호 오면 멈추세요","body":"팔꿈치 안쪽을 손가락으로 누르면 압통이 있거나 그립 시 안쪽이 당기면 해당 세션을 중단하세요."},{"title":"재발 방지 핵심","body":"그립 집중 동작 후 전완 굴곡근 스트레칭을 세트처럼 붙이세요. 이완 없이 훈련을 반복하면 골퍼 엘보가 만성화됩니다."}]}]}},{"id":"cause-c","label":"원인 C","tag":"과부하","name":"이두건 건병증 (팔꿈치 앞쪽 통증)","description":"풀업·당기기 동작에서 팔꿈치 앞쪽(이두건 부착부)이 아프면 이두건이 과부하된 것입니다. 반복적인 굴곡 동작과 갑작스러운 볼륨 증가가 원인입니다. 편심성 강화와 볼륨 조절이 핵심입니다.","priority_note":"팔꿈치 앞쪽 날카로운 통증이나 멍은 이두건 파열일 수 있으므로 즉시 진료를 받으세요.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"이두근 스트레칭","why":"이두근 긴장을 풀어 건 부착부 부담을 줄입니다.","sets":"30초 · 3세트","cue":"팔꿈치를 완전히 펴고 손바닥이 위를 향하게 합니다.","how":["벽에 손바닥을 짚고 팔꿈치를 편 채 몸을 반대로 돌리세요","이두근이 당기는 느낌으로 30초 유지","3세트"]},{"name":"등척성 컬 홀드","why":"건병증 초기 통증 감소와 건 자극을 동시에 얻습니다.","sets":"45초 유지 · 4세트","cue":"통증 3/10 이하에서 수행합니다.","how":["팔꿈치를 90도 굽힌 채 반대 손으로 저항을 주며 45초 버티세요","4세트"]},{"name":"편심성 덤벨 컬","why":"이두건을 편심성으로 강화합니다. 천천히 내려오는 동작이 핵심입니다.","sets":"15회 · 3세트","cue":"반대 손으로 올리고, 아픈 팔로만 4초에 걸쳐 천천히 내립니다.","how":["덤벨을 반대 손으로 올려준 뒤","아픈 팔로만 4초에 걸쳐 천천히 내려오세요","15회 · 3세트"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"이두건 과부하 회피","body":"로우의 팔꿈치 굽힘 구간에서 과도한 속도나 반동을 조절해주세요. 이두건병증은 급격한 신장-수축 반복에서 악화됩니다."},{"title":"부하 진행 속도 조절","body":"이두건 통증이 사라진 후 2주는 무게 증가 없이 패턴만 유지하세요. 건 회복은 근육 회복보다 2~4배 느립니다."},{"title":"이 신호 오면 멈추세요","body":"팔꿈치 앞쪽(이두건 부착부)에 날카로운 통증이나 당기는 느낌이 오면 즉시 중단하세요. 건 파열은 전조 신호가 있을 때 예방할 수 있습니다."},{"title":"재발 방지 핵심","body":"클린·스내치의 팔꿈치 전환 구간에서 반동을 최소화하세요. 이두건에 가장 큰 순간 부하가 걸리는 동작입니다."}]}]}}],"danger":{"title":"지금 바로 운동을 멈추세요","reason":"안정 시에도 팔꿈치 통증이 지속되거나 저림이 있으면 인대 손상·신경 압박이 의심됩니다.","action":"정형외과 또는 스포츠의학과 진료를 권장합니다. 통증 위치(안쪽/바깥쪽/앞쪽)와 발생 동작을 기록해 방문하세요."}}]}};</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrossFit Rehab Guide</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --dark:       #2C2C2C;
      --dark-light: #444444;
      --accent:     #4A7FC1;
      --bg:         #F5F6FA;
      --card:       #FFFFFF;
      --text:       #2C2C2C;
      --text-sub:   #6B7280;
      --border:     #D1D5DB;
      --danger:     #DC2626;
      --danger-bg:  #FEF2F2;
      --success:    #16A34A;
      --choice-sel: #EEF2FF;
      --t1: 20px; --w1: 700;
      --t2: 17px; --w2: 600;
      --t3: 15px; --w3: 400;
      --t4: 14px; --w4: 400;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      height: 100vh; overflow: hidden; display: flex; justify-content: center;
      word-break: keep-all;
    }
    .app { width: 100%; max-width: 480px; height: 100%; display: flex; flex-direction: column; overflow: hidden; }

    /* Progress */
    .progress-wrap {
      position: sticky; top: 0; z-index: 10;
      background: var(--card); padding: 14px 20px 10px;
      border-bottom: 1px solid var(--border);
    }
    .progress-label { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .progress-label span { font-size: var(--t4); font-weight: var(--w4); color: var(--text-sub); }
    .progress-label span:last-child { font-weight: 600; color: var(--dark-light); }
    .progress-track { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--dark-light); border-radius: 99px; transition: width 0.3s ease; }

    /* Screen */
    .screen { flex: 1; padding: 20px 20px 24px; display: flex; flex-direction: column; gap: 14px; overflow-y: hidden; min-height: 0; }
    .screen.scrollable { overflow-y: auto; }

    /* Typography helpers */
    .t1 { font-size: var(--t1); font-weight: var(--w1); line-height: 1.4; }
    .t2 { font-size: var(--t2); font-weight: var(--w2); line-height: 1.5; }
    .t3 { font-size: var(--t3); font-weight: var(--w3); line-height: 1.6; color: var(--text-sub); word-break: keep-all; }
    .t4 { font-size: var(--t4); font-weight: var(--w4); color: var(--text-sub); }

    /* Card */
    .card { background: var(--card); border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.10); border: 1px solid var(--border); padding: 20px; }

    /* Choices */
    .choices { display: flex; flex-direction: column; gap: 6px; }
    .choice-btn {
      width: 100%; min-height: 52px; padding: 12px 16px;
      border-radius: 10px; border: 1px solid var(--border);
      background: var(--card); font-family: inherit;
      font-size: var(--t2); font-weight: var(--w2); color: var(--text);
      text-align: left; cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; gap: 12px;
    }
    .choice-btn:hover { border-color: var(--accent); background: var(--choice-sel); }
    .choice-btn .sub { font-size: var(--t4); color: var(--text-sub); display: block; margin-top: 2px; }

    /* Buttons */
    .btn-primary {
      width: 100%; height: 54px; border-radius: 10px; border: none;
      background: var(--dark); color: white; font-family: inherit;
      font-size: var(--t2); font-weight: var(--w2); cursor: pointer;
      transition: background 0.15s; flex-shrink: 0;
    }
    .btn-primary:hover { background: var(--dark-light); }
    .spinner-overlay {
      position: fixed; inset: 0; background: rgba(255,255,255,0.7);
      display: flex; align-items: center; justify-content: center; z-index: 999;
    }
    .spinner {
      width: 36px; height: 36px; border: 3px solid var(--border);
      border-top-color: var(--dark); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-back-circle {
      width: 38px; height: 38px; flex-shrink: 0;
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 18px; color: var(--dark);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .btn-back-circle:hover { background: var(--choice-sel); }
    .btn-danger {
      width: 100%; height: 54px; border-radius: 10px;
      border: 2px solid var(--danger); background: var(--danger);
      color: white; font-family: inherit; font-size: var(--t2); font-weight: var(--w2); cursor: pointer;
    }

    /* Stage Indicator */
    .stage-wrap { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; }
    .stage-item {
      flex-shrink: 0; padding: 5px 12px; border-radius: 99px;
      font-size: var(--t4); font-weight: 600; white-space: nowrap;
      border: 1.5px solid var(--border); color: var(--text-sub); background: var(--card);
    }
    .stage-item.active { background: var(--dark); color: white; border-color: var(--dark); }
    .stage-item.done  { background: #DCFCE7; color: var(--success); border-color: var(--success); }

    /* Exercise Card */
    .exercise-card {
      background: var(--card); border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.10); border: 1px solid var(--border);
      padding: 18px 20px; display: flex; flex-direction: column; gap: 8px;
    }
    .exercise-card h3 { font-size: var(--t2); font-weight: var(--w2); }
    .why-label { font-size: var(--t4); font-weight: 600; color: var(--accent); letter-spacing: 0.04em; }
    .why-text  { font-size: var(--t3); line-height: 1.6; color: var(--text-sub); }
    .cue-text  { font-size: var(--t4); color: var(--dark); background: var(--choice-sel); border-radius: 6px; padding: 6px 10px; }
    .sets-text { font-size: var(--t4); font-weight: 600; color: var(--dark); }

    /* Cause Tag */
    .cause-tag {
      display: inline-block; background: var(--choice-sel); color: var(--dark);
      border-radius: 6px; padding: 4px 10px;
      font-size: var(--t4); font-weight: 700;
      border: 1.5px solid var(--accent);
    }

    /* Danger */
    .danger-alert {
      background: var(--danger-bg); border: 2px solid var(--danger);
      border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 10px;
    }
    .danger-alert h2 { font-size: var(--t2); font-weight: var(--w2); color: var(--danger); }
    .danger-alert p  { font-size: var(--t3); line-height: 1.6; }

    /* Home */
    .home-hero { background: var(--dark); border-radius: 16px; padding: 28px 24px; color: white; }
    .home-hero .badge {
      display: inline-block; background: rgba(255,255,255,0.15);
      border-radius: 99px; padding: 4px 12px;
      font-size: var(--t4); font-weight: 600; margin-bottom: 14px;
    }
    .home-hero h1 { font-size: var(--t1); font-weight: var(--w1); line-height: 1.4; margin-bottom: 10px; }
    .home-hero p  { font-size: var(--t3); line-height: 1.6; color: rgba(255,255,255,0.75); }
    .info-row { display: flex; align-items: center; gap: 12px; font-size: var(--t3); }
    .info-row .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dark-light); flex-shrink: 0; }

    /* Complete */
    @keyframes pop-in {
      0%   { transform: scale(0); opacity: 0; }
      65%  { transform: scale(1.25); opacity: 1; }
      100% { transform: scale(1); }
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .complete-icon {
      width: 72px; height: 72px; background: #DCFCE7; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; margin: 0 auto 12px;
      animation: pop-in 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    .complete-wrap { text-align: center; padding: 12px 0; animation: fade-up 0.4s 0.2s ease both; }

    /* Password toggle */
    .pwd-wrap { position: relative; }
    .pwd-wrap input { width: 100%; padding-right: 44px; }
    .pwd-toggle {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--text-sub); font-size: 18px; padding: 4px;
    }


    /* Toast */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1A1A2E; color: white; border-radius: 10px;
      padding: 12px 20px; font-size: var(--t4); font-weight: 600;
      white-space: nowrap; z-index: 99999;
      opacity: 0; transition: opacity 0.2s ease; pointer-events: none;
    }
    #toast.show { opacity: 1; }

    /* Scroll top on nav */
    html { scroll-behavior: smooth; }

    /* 아코디언 화살표 회전 */
    details .how-chevron { transition: transform 0.2s ease; }
    details[open] .how-chevron { transform: rotate(180deg); }
  </style>
</head>
