<script>const BUNDLED={"manifest":[{"id":"squat","name":"스쿼트","pain_sites":[{"id":"knee","name":"무릎"},{"id":"lower-back","name":"허리"},{"id":"ankle","name":"발목"},{"id":"shoulder","name":"어깨"},{"id":"hip","name":"고관절"}]},{"id":"lunge","name":"런지","pain_sites":[{"id":"knee","name":"무릎"},{"id":"lower-back","name":"허리"},{"id":"ankle","name":"발목"},{"id":"hip","name":"고관절"}]},{"id":"deadlift","name":"데드리프트","coming_soon":true,"pain_sites":[{"id":"lower-back","name":"허리"},{"id":"knee","name":"무릎"},{"id":"shoulder","name":"어깨"},{"id":"wrist","name":"손목"},{"id":"hip","name":"고관절"}]},{"id":"pullup","name":"풀업","coming_soon":true,"pain_sites":[{"id":"shoulder","name":"어깨"},{"id":"elbow","name":"팔꿈치"},{"id":"wrist","name":"손목"},{"id":"lower-back","name":"허리"}]},{"id":"kipping","name":"키핑","coming_soon":true,"pain_sites":[{"id":"shoulder","name":"어깨"},{"id":"wrist","name":"손목"},{"id":"lower-back","name":"허리"},{"id":"elbow","name":"팔꿈치"}]},{"id":"row","name":"로우","coming_soon":true,"pain_sites":[{"id":"lower-back","name":"허리"},{"id":"shoulder","name":"어깨"},{"id":"wrist","name":"손목"},{"id":"elbow","name":"팔꿈치"}]},{"id":"press-vertical","name":"수직 프레스","pain_sites":[{"id":"shoulder","name":"어깨"},{"id":"elbow","name":"팔꿈치"},{"id":"wrist","name":"손목"},{"id":"lower-back","name":"허리"}]},{"id":"press-horizontal","name":"수평 프레스","pain_sites":[{"id":"shoulder","name":"어깨"},{"id":"elbow","name":"팔꿈치"},{"id":"wrist","name":"손목"},{"id":"lower-back","name":"허리"},{"id":"chest","name":"흉근"}]}],"squat":{"id":"squat","name":"스쿼트","pain_sites":[{"id":"knee","name":"무릎","entry_question":"q1","questions":[{"id":"q1","text":"통증이 언제 느껴지나요?","sub":null,"choices":[{"id":"c1","text":"운동 시작하자마자","next":"q:q2"},{"id":"c2","text":"어느 정도 반복한 후","next":"q:q2"},{"id":"c3","text":"쉬는 중에도 욱신거린다","next":"danger"}]},{"id":"q2","text":"스쿼트 깊이를 얕게 하면 통증이 줄어드나요?","sub":"무게 없이 맨몸으로 테스트해 보세요.","choices":[{"id":"c1","text":"네, 얕게 앉으면 괜찮아요","next":"test:test-ankle-df"},{"id":"c2","text":"아니요, 깊이와 상관없어요","next":"test:test-single-leg"}]}],"tests":[{"id":"test-ankle-df","name":"족관절 배측굴곡 가동성 테스트","purpose":"발목(족관절)이 충분히 앞으로 굽혀지는지 확인합니다. 이 범위가 부족하면 스쿼트 시 뒤꿈치가 들립니다.","steps":["벽 앞에 서서 발끝을 벽에서 약 5cm 떨어뜨리세요","발뒤꿈치를 바닥에 붙인 채로","무릎을 새끼발가락 방향으로 벽을 향해 밀어보세요"],"note":"신발 신고 해도 됩니다. 통증 있는 쪽 발로 하세요.","pass_text":"뒤꿈치가 바닥에 붙은 채 무릎이 벽에 닿아요","fail_text":"뒤꿈치가 들리거나 무릎이 벽에 닿지 않아요","pass_next":"cause:cause-b","fail_next":"cause:cause-a"},{"id":"test-single-leg","name":"트렌델렌버그 징후 검사","purpose":"고관절 외전근(엉덩이 바깥 근육) 기능과 슬관절(무릎 관절) 정렬을 무릎 부하 없이 확인합니다.","steps":["벽 옆에 서서 손끝만 가볍게 짚으세요","아픈 발로만 서고 반대쪽 발을 바닥에서 살짝 띄우세요","5~10초 유지하면서 골반 수평과 무릎 방향을 확인하세요"],"note":"거울이 있으면 활용하세요. 무릎을 구부리지 않아도 됩니다.","pass_text":"골반이 수평을 유지하고 무릎이 발끝 방향을 향해요","fail_text":"골반이 한쪽으로 기울거나 무릎이 안쪽으로 쏠려요","pass_next":"cause:cause-c","fail_next":"cause:cause-b"}],"danger":{"title":"지금 바로 운동을 멈추세요","reason":"안정 시에도 통증이 지속되면 연골·인대·활액낭 손상이 의심됩니다. 자가 재활을 진행하면 증상이 악화될 수 있습니다.","action":"정형외과 또는 스포츠의학과 진료를 권장합니다. 증상 발생 상황(동작·무게·빈도)을 기록해 방문하면 진단에 도움이 됩니다."},"causes":[{"id":"cause-a","label":"원인 A","tag":"족관절 배측굴곡 가동성 제한","name":"족관절 배측굴곡 가동성 제한","description":"발목이 잘 안 굽혀지면 스쿼트할 때 뒤꿈치가 들립니다. 뒤꿈치가 뜨면 무릎 앞쪽에 부담이 쏠려 통증이 생깁니다. 무릎보다 발목을 먼저 풀어야 합니다.","priority_note":"발목 가동성 문제는 다리 근력 강화보다 먼저 해결해야 합니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"월 앵클 모빌리티","why":"족관절 전방 관절 공간을 직접 열어 배측굴곡 가동범위를 회복시킵니다. 뒤꿈치가 바닥에 붙은 채로 깊이 앉을 수 있게 됩니다.","sets":"양측 각 10회 · 3세트","cue":"뒤꿈치를 바닥에 고정한 채 무릎을 새끼발가락 방향으로 유지하세요.","how":["벽 앞에 서서 발끝을 벽에서 5cm 떨어뜨리세요","발뒤꿈치를 바닥에 붙인 채 무릎을 벽 쪽으로 밀어보세요","무릎이 닿으면 발을 1cm 더 뒤로 물리고 반복합니다","양발 각각 10~15회씩"]},{"name":"밴드 거골 후방 견인 스트레칭","why":"밴드가 거골(발목뼈)을 후방으로 당겨 관절 내 활주(glide)를 회복시킵니다. 단순 스트레칭보다 관절 안쪽 공간을 직접 열어 배측굴곡 가동범위가 빠르게 늘어납니다.","sets":"양측 각 30초 유지 · 3세트","cue":"밴드를 복숭아뼈 바로 위에 걸고, 발목을 앞뒤로 부드럽게 펌핑하세요.","how":["저항 밴드를 복숭아뼈 바로 위(발목 앞쪽)에 걸고 반대쪽에 고정하세요","밴드가 팽팽하게 당겨지는 방향으로 한 발을 앞으로 내딛으세요","발뒤꿈치를 바닥에 유지하며 무릎을 앞으로 밀어 발목을 굽히세요","30초 유지 후 발목을 부드럽게 앞뒤로 10회 펌핑합니다"]},{"name":"힐 엘리베이티드 스쿼트","why":"뒤꿈치를 올려 족관절 배측굴곡 요구를 줄이고, 통증 없는 범위에서 스쿼트 패턴을 재학습합니다. 발목 가동성이 회복될수록 올림 높이를 줄여나가세요.","sets":"15회 · 3세트","cue":"무릎을 새끼발가락 방향으로 유지하며 천천히 내려가세요.","how":["판이나 원판 위에 발뒤꿈치를 올리고 서세요 (1~2cm 높이)","발끝을 약 30도 바깥으로 향하고 발을 어깨너비로 벌리세요","천천히 깊이 앉으며 무릎이 발끝 방향을 유지하는지 확인하세요","15회씩 수행하며 발목 감각에 집중합니다"]},{"name":"PVC 오버헤드 스쿼트","why":"PVC를 머리 위로 들면 체간이 수직으로 유지되어 족관절 배측굴곡 요구가 극대화됩니다. 가장 가벼운 외부 부하에서 통증 없이 완전 가동범위를 확인합니다.","sets":"10회 · 3세트","cue":"팔이 귀 옆을 유지하도록 하고, 하강 시 상체가 앞으로 쏠리지 않게 가슴을 세우세요.","how":["PVC를 어깨너비보다 넓게 잡고 귀 옆 수직 위치로 올리세요","발을 어깨너비로 벌리고 발끝을 약 30도 바깥으로 향하세요","팔이 귀 옆을 유지하며 천천히 최대 깊이로 앉으세요","10회씩 팔 위치와 무릎 방향을 동시에 체크합니다"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"WOD 전 족관절 준비","body":"박스 오기 전 집에서 월 앵클 모빌리티 20회를 루틴에 추가하세요. 족관절 배측굴곡 가동범위가 충분히 열린 상태로 시작해야 슬관절 전방 부하를 줄일 수 있습니다."},{"title":"뒤꿈치 올리기 전략","body":"무게 복귀 초기에는 원판(5mm)을 뒤꿈치 아래에 두고 시작하세요. 족관절 가동성이 충분히 확보될수록 원판 두께를 줄여 나가세요."},{"title":"강도 조절 신호","body":"스쿼트 도중 뒤꿈치가 바닥에서 뜨거나 슬관절 전면에 타는 듯한 느낌이 오면 즉시 강도를 낮추세요. 족관절 가동범위가 아직 충분하지 않은 신호입니다."},{"title":"재발 방지 핵심","body":"스프린트·더블언더 같이 족관절 반복 충격이 많은 WOD 다음 날은 스쿼트 볼륨을 20% 낮추세요. 족관절 피로가 슬관절 부하로 연결됩니다."}]}]}},{"id":"cause-b","label":"원인 B","tag":"대둔근·내전근 활성 저하","name":"대둔근·내전근 활성 저하","description":"스쿼트 중 무릎이 안으로 무너지는 건 엉덩이 근육과 허벅지 안쪽 근육이 무릎을 측면에서 잡아주지 못해서입니다. 발목이 멀쩡해도 이 근육들이 약하면 무릎이 자꾸 안쪽으로 쏠립니다. 엉덩이 근력부터 다뤄야 합니다.","priority_note":"발목 가동성 문제가 함께 있다면 원인 A 루트를 먼저 진행하세요.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"고관절 90/90 스트레칭","why":"고관절 내·외회전 가동성을 동시에 회복시킵니다. 고관절 주변이 충분히 이완되어야 대둔근이 제대로 수축할 수 있는 자세가 만들어집니다.","sets":"양측 각 60초 유지 · 2세트","cue":"앞쪽 무릎과 뒤쪽 무릎을 모두 바닥에 최대한 가깝게 내려놓으세요.","how":["바닥에 앉아 앞 무릎과 뒷 무릎을 모두 90도로 만드세요","몸통을 곧게 세우고 앞 다리 쪽 엉덩이를 바닥에 가깝게 내리세요","그 상태에서 상체를 앞으로 천천히 숙여 고관절 앞쪽을 늘려주세요","양쪽 각 60초씩 유지합니다"]},{"name":"클램쉘","why":"대둔근과 중둔근을 분리해 직접 활성화합니다. 이 운동으로 고관절 외전근력이 생겨야 스쿼트 중 슬관절 외반을 막는 힘이 만들어집니다.","sets":"양측 각 15회 · 3세트","cue":"골반이 뒤로 굴러가지 않도록 고정하고, 발뒤꿈치를 붙인 채 위쪽 무릎만 벌리세요.","how":["옆으로 누워 무릎을 45도로 구부리고 발을 모으세요","골반을 앞쪽으로 유지한 채 위쪽 무릎만 조개처럼 벌리세요","최대로 벌린 상태에서 1초 유지 후 천천히 내려오세요","골반이 뒤로 굴러가지 않게 고정하는 것이 핵심입니다 (15회)"]},{"name":"단하지 힙 브리지","why":"대둔근을 한쪽씩 분리해 편측 고관절 신전력을 강화합니다. 편측 근력 차이가 줄어야 스쿼트 중 좌우 무릎 정렬이 대칭으로 유지됩니다.","sets":"양측 각 12회 · 3세트","cue":"올라올 때 요추가 아닌 대둔근으로 밀어 올린다고 의식하세요.","how":["바닥에 누워 무릎을 세우고 한 발을 들어 올리세요","엉덩이로 밀어 올리듯 골반을 최대로 들어 올리세요","정점에서 2초 유지 후 천천히 내려옵니다","양쪽 각 12회씩 수행합니다"]},{"name":"PVC 박스 스쿼트","why":"둔근(엉덩이 근육)이 약해서 스쿼트 중 무릎이 안으로 무너지고 그쪽 관절에 부하가 집중되는 것이 통증의 원인입니다. 둔근을 분리해서 직접 깨우는 단계입니다.","sets":"10회 · 3세트","cue":"앉을 때 무릎이 새끼발가락 방향으로 벌어지는지 확인합니다.","how":["PVC를 승모근 위에 놓고 박스 앞에 서세요","천천히 박스에 엉덩이를 살짝 대고 바로 일어서세요","박스를 '터치'하는 느낌으로 앉았다 일어납니다","10~12회씩 수행합니다"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"WOD 전 둔근 활성화","body":"박스 도착 직후 클램쉘 15회 + 사이드 스텝 밴드 20보를 워밍업에 넣으세요. 둔근이 깨어있어야 스쿼트 중 무릎이 안으로 무너지지 않습니다."},{"title":"무릎 방향 체크 포인트","body":"무게 복귀 후 모든 세트에서 무릎이 새끼발가락 방향을 향하는지 확인하세요. 무릎이 안으로 쏠리면 해당 세트는 무게를 10kg 내리세요."},{"title":"이 신호 오면 멈추세요","body":"스쿼트 하강 중 무릎이 자신도 모르게 안으로 들어온다면 둔근이 아직 부하를 감당하지 못하는 것입니다. 빈 바로 돌아가 패턴부터 재점검하세요."},{"title":"재발 방지 핵심","body":"높은 볼륨 레그 WOD(스러스터·월볼) 다음 날에는 반드시 클램쉘 세트를 넣으세요. 피로한 상태에서 둔근 비활성화가 가장 많이 발생합니다."}]}]}},{"id":"cause-c","label":"원인 C","tag":"과부하","name":"훈련 볼륨 과부하","description":"깊이나 근력 문제 없이 갑자기 볼륨·빈도가 늘었을 때 생기는 누적 자극입니다. 조직 회복보다 자극이 빠른 상태로, 무릎 자체보다 훈련 계획을 먼저 조정해야 합니다.","priority_note":"우선 볼륨을 줄이고 회복을 확보한 뒤 루트를 진행합니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"훈련 볼륨 30% 감량 (1–2주)","why":"한 번에 너무 많은 자극이 쌓여 조직이 회복할 시간이 없는 것이 통증의 원인입니다. 과부하된 조직에 회복할 시간이 생깁니다.","sets":"해당 없음","cue":"스쿼트 세션 수를 주 1회 줄이거나, 세트 수를 각 세션에서 2–3세트 감량합니다.","how":["현재 스쿼트 세트 수 또는 총 반복 수를 30% 줄이세요","예: 주 4세션 → 3세션, 또는 세트당 10회 → 7회","강도(무게)보다 볼륨(양)을 줄이는 것이 우선입니다","1~2주 후 통증 감소를 확인하고 천천히 복귀합니다"]},{"name":"아이싱 (운동 후)","why":"한 번에 너무 많은 자극이 쌓여 조직이 회복할 시간이 없는 것이 통증의 원인입니다. 급성 염증이 빠르게 가라앉아 회복이 시작됩니다.","sets":"운동 후 15분 · 수건 위에 얼음팩","cue":"피부에 직접 닿지 않게 수건을 댑니다.","how":["운동이 끝난 직후 얼음팩이나 냉찜질팩을 통증 부위에 대세요","수건 등으로 감싸 피부에 직접 닿지 않게 하세요","15~20분간 적용하고 제거하세요","하루 2~3회까지 적용 가능합니다"]},{"name":"맨몸 스쿼트 패턴 재확인","why":"한 번에 너무 많은 자극이 쌓여 조직이 회복할 시간이 없는 것이 통증의 원인입니다. 염증이 줄어든 후 기본 패턴이 제대로 작동하는지 확인합니다.","sets":"20회 · 2세트","cue":"통증이 3/10 이상이면 볼륨 감량 기간을 1주 더 연장합니다.","how":["발을 어깨너비로 벌리고 발끝을 약 15~30도 바깥으로 향하세요","팔을 앞으로 뻗어 균형을 잡으며 천천히 앉으세요","무릎이 발끝 방향을 유지하고 허리가 곧게 유지되는지 확인하세요","12회씩 천천히, 동작의 질에 집중합니다"]},{"name":"PVC 백스쿼트","why":"한 번에 너무 많은 자극이 쌓여 조직이 회복할 시간이 없는 것이 통증의 원인입니다. 염증이 줄어든 후 기본 패턴이 제대로 작동하는지 확인합니다.","sets":"15회 · 3세트","cue":"통증 없음이 확인되면 다음 단계로.","how":["PVC를 승모근 위에 놓고 양손으로 잡아 고정하세요","발을 어깨너비로 벌리고 발끝을 약 30도 바깥으로 향하세요","가슴을 세우고 복압을 유지하며 천천히 앉으세요","10~12회씩 자세 점검에 집중합니다"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"볼륨 증가 원칙","body":"무릎 통증 없이 2주가 지나면 주간 스쿼트 볼륨을 10% 이내로만 올리세요. '지난주보다 세트 1개 추가'가 안전한 기준입니다."},{"title":"이 신호 오면 멈추세요","body":"운동 후 24시간이 지나도 무릎이 뻑뻑하거나 계단에서 불편하면 다음 스쿼트 세션 볼륨을 전주 대비 30% 줄이세요."},{"title":"회복 루틴 삽입","body":"스쿼트 세션 후 아이싱 15분과 폼롤러 대퇴사두 이완을 세트처럼 다루세요. 회복을 훈련만큼 계획적으로 관리해야 과부하가 반복되지 않습니다."},{"title":"재발 방지 핵심","body":"오픈 시즌·컴피티션 준비 기간에는 의도적으로 스쿼트 빈도를 주 1회 줄이세요. 피크 직전 과부하 패턴이 가장 흔한 재발 원인입니다."}]}]}}]},{"id":"lower-back","name":"허리","entry_question":"q1","questions":[{"id":"q1","text":"다리로 저림·찌릿함이 내려가나요?","sub":"엉덩이 아래 허벅지·종아리·발까지 퍼지는 느낌","choices":[{"id":"c1","text":"네, 다리까지 내려가요","next":"danger"},{"id":"c2","text":"아니요, 허리에만 있어요","next":"q:q2"}]},{"id":"q2","text":"스쿼트 내려갈 때 허리가 둥글게 말리나요?","sub":"거울이나 동료에게 확인하세요 (butt wink).","choices":[{"id":"c1","text":"네, 아래로 내려갈수록 말려요","next":"q:q3"},{"id":"c2","text":"아니요, 허리가 꼿꼿해요","next":"q:q4"}]},{"id":"q3","text":"깊이를 얕게 하면 허리 말림이 줄어드나요?","sub":null,"choices":[{"id":"c1","text":"네, 얕으면 괜찮아요","next":"test:test-lbs-hip-flex"},{"id":"c2","text":"아니요, 깊이와 상관없이 말려요","next":"cause:cause-b"}]},{"id":"q4","text":"플랭크 자세를 60초 유지할 수 있나요?","sub":"어깨·골반·발이 일직선이 되는 자세","choices":[{"id":"c1","text":"60초 전에 허리가 내려앉아요","next":"test:test-lbs-plank"},{"id":"c2","text":"60초 이상 유지돼요","next":"cause:cause-b"}]}],"danger":{"title":"지금 바로 운동을 멈추세요","reason":"하지 방사통(다리로 저림·찌릿함)은 디스크 탈출 또는 신경 압박 가능성이 있습니다. 자가 재활은 증상을 악화시킬 수 있습니다.","action":"신경외과 또는 정형외과 진료를 권장합니다. 통증 발생 동작·자세를 기록해 가세요."},"causes":[{"id":"cause-a","label":"원인 A","tag":"가동성 부족","name":"고관절(엉덩이 관절) 가동성 부족 → 허리 굴곡 보상","description":"엉덩이가 충분히 굽혀지지 않으면 스쿼트 하강 시 허리가 대신 굽혀집니다. 깊이를 줄이면 허리 말림이 줄어드는 게 이 원인의 특징입니다.","priority_note":"엉덩이 가동성이 확보되면 대부분 해결됩니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"90/90 힙 스트레칭","why":"고관절이 충분히 구부러지지 않아 스쿼트 깊이에서 허리가 대신 굽혀지는 것이 통증의 원인입니다. 고관절 내·외회전 가동성이 동시에 늘어납니다.","sets":"양측 각 60초 · 2세트","cue":"앞·뒷무릎을 모두 바닥에 최대한 가깝게 내려놓습니다.","how":["바닥에 앉아 앞 무릎과 뒷 무릎을 모두 90도로 만드세요","몸통을 곧게 세우고 앞 다리 쪽 엉덩이를 바닥에 가깝게 내리세요","그 상태에서 상체를 앞으로 천천히 숙여 고관절을 늘려주세요","양쪽 각 60초씩 유지합니다"]},{"name":"딥 스쿼트 핸드홀드","why":"고관절이 충분히 구부러지지 않아 스쿼트 깊이에서 허리가 대신 굽혀지는 것이 통증의 원인입니다. 고관절 굴곡의 최대 범위를 안전하게 늘립니다.","sets":"60초 유지 · 3세트","cue":"허리가 아닌 고관절로 내려간다고 의식합니다.","how":["랙이나 기둥을 두 손으로 잡고 서세요","발을 어깨너비로 벌리고 최대한 깊이 쪼그려 앉으세요","허리를 최대한 곧게 유지하며 30초 이상 버텨보세요","손을 잡고 있으니 균형은 신경 쓰지 않아도 됩니다"]},{"name":"박스 스쿼트 (통증 없는 깊이)","why":"고관절이 충분히 구부러지지 않아 스쿼트 깊이에서 허리가 대신 굽혀지는 것이 통증의 원인입니다. 고관절이 열리기 시작하면 통증 없는 깊이로 스쿼트 패턴을 재학습해야 합니다.","sets":"15회 · 3세트","cue":"허리가 말리기 직전 깊이에서 멈추고 그 범위를 조금씩 늘립니다.","how":["본인 허리 높이 정도의 박스 앞에 서세요","천천히 앉아 박스에 엉덩이를 살짝 대고 바로 일어서세요","박스에 앉아 쉬는 게 아니라 박스를 '터치'하는 느낌입니다","통증이 없는 높이의 박스를 사용합니다 (12회)"]},{"name":"PVC 고블릿 스쿼트","why":"고관절이 충분히 구부러지지 않아 스쿼트 깊이에서 허리가 대신 굽혀지는 것이 통증의 원인입니다. 고관절이 열리기 시작하면 통증 없는 깊이로 스쿼트 패턴을 재학습해야 합니다.","sets":"12회 · 3세트","cue":"팔꿈치로 무릎을 안에서 바깥으로 밀어내듯 내려갑니다.","how":["PVC를 세로로 잡아 가슴 앞에 두세요","팔꿈치를 바닥 쪽으로 향하게 유지하며 천천히 앉으세요","최하단에서 팔꿈치로 무릎 안쪽을 살짝 밀어 고관절을 열어줍니다","10~12회씩 수행합니다"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"엉덩이 먼저, 깊이는 나중","body":"WOD 복귀 초기에는 깊이를 허벅지가 바닥과 평행한 지점까지만 내려가세요. 고관절이 충분히 열려야 더 깊이 내려가도 허리가 안 말립니다."},{"title":"WOD 전 고관절 준비","body":"힙 90/90 스트레칭 60초 + 딥 스쿼트 홀드 30초를 워밍업에 삽입하세요. 고관절 가동성이 열려야 허리 보상이 줄어듭니다."},{"title":"이 신호 오면 멈추세요","body":"스쿼트 하강 시 허리가 둥글게 말리는 느낌이 오면 해당 세트 즉시 중단하세요. butt wink는 고관절이 아직 준비되지 않은 신호입니다."},{"title":"재발 방지 핵심","body":"장시간 앉아 있는 날(책상 근무·장거리 이동) 이후 스쿼트는 워밍업을 2배로 늘리세요. 고관절 굴곡근이 단축된 상태에서 바로 무게를 들면 허리 부하가 급증합니다."}]}]}},{"id":"cause-b","label":"원인 B","tag":"가동성 부족","name":"흉추(등 중간 척추) 가동성 부족 → 요추(허리 척추) 과부하","description":"등 중간이 뻣뻣하면 상체를 세우는 부담이 허리로 전달됩니다. 허리가 말리지 않아도 통증이 있다면 등 중간을 먼저 풀어야 합니다.","priority_note":"등 중간 가동성은 어깨·허리 통증 모두에 영향을 줍니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"폼롤러 흉추(등 중간 척추) 신전","why":"등 중간(흉추)이 굳어 있으면 상체를 세우는 부담이 허리로 전달됩니다. 굳은 흉추 분절을 직접 풀어 허리 부하를 줄입니다.","sets":"각 분절 10초 × 흉추 전체 · 2세트","cue":"폼롤러를 흉추 중간부터 시작해 위쪽으로 이동합니다.","how":["폼롤러를 등 중간(흉추) 아래에 가로로 놓으세요","손을 머리 뒤로 깍지 끼거나 가슴에 교차하세요","폼롤러를 축으로 등을 천천히 뒤로 젖혀 10초 유지하세요","폼롤러를 위아래로 조금씩 이동하며 흉추 전체를 풀어줍니다"]},{"name":"캣-카우","why":"등 중간과 허리를 번갈아 움직여 흉추 가동성을 회복합니다. 움직임 패턴이 재설정되면 허리가 단독으로 부담을 받는 상황이 줄어듭니다.","sets":"10회 · 3세트","cue":"카우(신전) 시 흉추가 펴진다고 의식합니다.","how":["네 발 자세로 손은 어깨 아래, 무릎은 엉덩이 아래에 두세요","숨을 내쉬며 등을 천장 쪽으로 둥글게 말아 올리세요 (캣)","숨을 들이쉬며 배를 바닥 쪽으로 내리고 고개를 들어 올리세요 (카우)","각 자세에서 2초씩 유지하며 천천히 10회 반복합니다"]},{"name":"맨몸 스쿼트 + 흉추(등 중간 척추) 회전","why":"최하단에서 등 중간을 직접 회전시켜 실제 스쿼트 동작에 가동성을 통합합니다.","sets":"10회 · 3세트","cue":"최하단에서 한 팔씩 천장 방향으로 뻗습니다.","how":["발을 어깨너비로 벌리고 서세요","스쿼트 최하단에서 한 팔을 바닥에 짚고 다른 팔을 천장으로 뻗으세요","시선은 위로 뻗은 손을 따라가세요","양쪽 번갈아 수행합니다 (각 10회)"]},{"name":"PVC 패스 오버","why":"어깨·등을 통해 흉추 신전을 강제해 오버헤드 자세에서 허리 보상을 줄입니다.","sets":"10회 · 3세트","cue":"통과 시 팔꿈치를 구부리지 않습니다.","how":["PVC 파이프나 저항 밴드를 어깨너비보다 넓게 잡으세요","팔꿈치를 편 채 팔을 앞에서 머리 위를 거쳐 등 뒤까지 넘기세요","등 뒤까지 내려갔다가 다시 원위치로 돌아옵니다","통증 없는 범위로 그립을 조절하세요 (10회)"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"흉추 먼저 풀기","body":"스쿼트 세션 전 폼롤러 흉추 익스텐션 10회를 루틴에 추가하세요. 흉추가 열리면 프론트랙·OHS에서 상체 수직이 훨씬 쉬워집니다."},{"title":"바 위치 체크","body":"백스쿼트 시 바가 목에 가까울수록 흉추 가동성 요구가 커집니다. 재활 초기에는 로우 바 포지션으로 내려 흉추 부담을 줄이세요."},{"title":"이 신호 오면 멈추세요","body":"하강 중 어깨가 앞으로 말리거나 시선이 바닥을 향하기 시작하면 흉추가 닫히는 신호입니다. 무게를 줄이거나 세트를 종료하세요."},{"title":"재발 방지 핵심","body":"매 스쿼트 세션 전 30초 흉추 익스텐션을 체크리스트 항목으로 고정하세요. 흉추 가동성은 워밍업 없이는 빠르게 닫히는 특성이 있습니다."}]}]}},{"id":"cause-c","label":"원인 C","tag":"안정화 부족","name":"코어 안정화 부족","description":"플랭크를 오래 유지하지 못하면 배에 힘 주기(복압)가 부족한 것입니다. 무게가 늘수록 허리가 직접 부담을 받아 통증이 생깁니다.","priority_note":"코어 훈련은 스쿼트와 병행하되, 먼저 볼륨을 줄이세요.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"데드버그","why":"복압이 부족해 스쿼트 중 허리가 직접 하중을 받고 있는 것이 통증의 원인입니다. 허리를 중립으로 유지하며 팔다리를 움직이는 코어 컨트롤이 훈련됩니다.","sets":"양측 각 8회 · 3세트","cue":"허리가 바닥에서 뜨지 않게 내내 눌러줍니다.","how":["바닥에 등을 대고 누워 무릎을 90도로 들어 올리세요","양팔을 천장 방향으로 뻗으세요","허리를 바닥에 붙인 채 오른 팔과 왼 다리를 동시에 수평으로 뻗으 증 없이 해보세요.","pass_text":"허리를 곧게 유지하며 깊이 앉을 수 있어요","fail_text":"어느 정도 내려가면 허리가 말려요","pass_next":"cause:cause-b","fail_next":"cause:cause-a"},{"id":"test-lbs-plank","name":"플랭크 안정성 테스트","purpose":"허리를 지지하는 코어 근지구력을 측정합니다","steps":["팔꿈치를 어깨 아래 바닥에 대고 발가락으로 지지하세요","어깨·골반·발뒤꿈치가 일직선이 되게 자세를 잡으세요","허리가 처지지 않게 최대한 버텨보세요"],"note":"30초 이하면 코어 부족, 60초 이상이면 정상 범위입니다.","pass_text":"60초 이상 허리가 처지지 않아요","fail_text":"60초 이전에 허리가 처지거나 엉덩이가 올라가요","pass_next":"cause:cause-b","fail_next":"cause:cause-c"}]},{"id":"ankle","name":"발목","entry_question":"q1","questions":[{"id":"q1","text":"발목에 부종(붓기)이나 멍이 있나요?","sub":null,"choices":[{"id":"c1","text":"네, 부어있거나 멍이 있어요","next":"danger"},{"id":"c2","text":"아니요, 외관상 정상이에요","next":"q:q2"}]},{"id":"q2","text":"통증이 주로 어느 쪽인가요?","sub":null,"choices":[{"id":"c1","text":"발목 앞쪽 (하강 시 콕 찌름)","next":"q:q3"},{"id":"c2","text":"발목 뒤쪽·아킬레스 쪽","next":"test:test-ba-heel-raise"},{"id":"c3","text":"발목 바깥쪽·접질렸던 부위","next":"test:test-ba-balance"}]},{"id":"q3","text":"스쿼트 깊이가 깊을 때만 발목 앞이 아프나요?","sub":"얕은 스쿼트에서는 통증이 없는지 확인하세요.","choices":[{"id":"c1","text":"네, 깊이 내려갈 때만 아파요","next":"test:test-ba-ankle-df"},{"id":"c2","text":"아니요, 얕아도 아파요","next":"danger"}]}],"danger":{"title":"지금 바로 운동을 멈추세요","reason":"부종·멍 동반 또는 깊이와 무관한 발목 앞쪽 통증은 인대·연골 손상 가능성이 있습니다.","action":"정형외과 또는 스포츠의학과 진료를 권장합니다."},"causes":[{"id":"cause-a","label":"원인 A","tag":"관절 충돌","name":"발목 전방 충돌 증후군","description":"하강 시 발목 앞쪽 뼈·조직이 서로 부딪히며 통증이 납니다. 가동성 운동으로 충돌 공간을 확보해야 합니다.","priority_note":"가동성 확보 전 깊은 스쿼트는 충돌을 반복해 악화됩니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"밴드 발목 견인 + 배측굴곡(앞으로 구부리기)","why":"발목이 충분히 구부러지지 않아 뒤꿈치가 들리고 무릎이 과하게 앞으로 나가는 것이 통증의 원인입니다. 견인과 능동적 움직임을 결합해 발목 가동성 회복을 가속합니다.","sets":"양측 각 2분 · 2세트","cue":"밴드를 발목 앞 복숭아뼈 바로 위에 걸고 천천히 무릎을 앞으로 밉니다.","how":["저항 밴드를 복숭아뼈 바로 위에 걸고 반대쪽(낮은 위치)에 고정하세요","발뒤꿈치를 바닥에 유지하며 무릎을 최대한 앞으로 밀어주세요","그 상태에서 발목을 앞뒤로 부드럽게 10회 펌핑합니다","양발 각각 2~3분씩"]},{"name":"힐 엘리베이티드 스쿼트","why":"발목이 충분히 구부러지지 않아 뒤꿈치가 들리고 무릎이 과하게 앞으로 나가는 것이 통증의 원인입니다. 발목이 어느 정도 열리면, 이제 그 범위를 실제 스쿼트 동작에서 쓰는 연습이 필요합니다.","sets":"15회 · 3세트","cue":"2.5~5cm 판 위에 뒤꿈치만 올립니다.","how":["판이나 원판 위에 발뒤꿈치를 올리고 서세요 (1~2cm 높이)","발끝을 약 30도 바깥으로 향하고 발을 어깨너비로 벌리세요","천천히 깊이 앉으며 무릎이 발끝 방향을 유지하는지 확인하세요","15회씩 수행하며 발목 감각에 집중합니다"]},{"name":"PVC 스쿼트 (뒤꿈치 없이)","why":"발목이 충분히 구부러지지 않아 뒤꿈치가 들리고 무릎이 과하게 앞으로 나가는 것이 통증의 원인입니다. 발목이 어느 정도 열리면, 이제 그 범위를 실제 스쿼트 동작에서 쓰는 연습이 필요합니다.","sets":"12회 · 3세트","cue":"발목 앞쪽 통증 없음을 확인하며 진행합니다.","how":["힐 엘리베이션 없이 PVC 스쿼트를 수행하세요","발을 어깨너비로 벌리고 발끝을 약 30도 바깥으로 향하세요","통증 없이 최대 깊이로 앉을 수 있는지 확인합니다","12회씩 수행합니다"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"충돌 없는 각도 찾기","body":"발끝을 외회전(바깥쪽)으로 30~45도 벌리면 발목 앞쪽 충돌이 줄어듭니다. WOD 복귀 초기에는 이 스탠스로 고정하세요."},{"title":"WOD 전 발목 준비","body":"월 앵클 모빌리티 20회 + 발목 서클 10회를 워밍업에 넣으세요. 발목 앞쪽 관절 공간이 열려야 스쿼트 중 충돌이 줄어듭니다."},{"title":"이 신호 오면 멈추세요","body":"하강 시 발목 앞쪽에서 '찝히는' 느낌이나 날카로운 통증이 오면 즉시 세트를 종료하세요. 충돌 상태에서 계속하면 연골 손상 위험이 있습니다."},{"title":"재발 방지 핵심","body":"더블언더·박스점프 같은 발목 반복 충격 동작 다음 날에는 스쿼트 깊이를 평소보다 얕게 유지하세요. 발목 관절이 누적 자극에 취약한 상태입니다."}]}]}},{"id":"cause-b","label":"원인 B","tag":"과부하","name":"아킬레스건 과부하","description":"발목 뒤쪽·아킬레스건 통증은 스쿼트 하강 시 종아리 근육과 아킬레스건에 반복 자극이 누적된 결과입니다. 볼륨 조정과 종아리 스트레칭이 우선입니다.","priority_note":"아킬레스건 통증은 악화 속도가 빠릅니다. 조기 대응이 중요합니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"종아리 스트레칭 (벽 밀기)","why":"한 번에 너무 많은 자극이 쌓여 조직이 회복할 시간이 없는 것이 통증의 원인입니다. 아킬레스건에 연결된 종아리 근육의 긴장이 풀립니다.","sets":"양측 각 60초 · 3세트","cue":"무릎 편 채로 30초, 무릎 살짝 굽혀 30초 — 비복근(종아리 바깥쪽 근육)과 가자미근(종아리 깊은 근육)을 분리합니다.","how":["벽 앞에 서서 한 발을 뒤로 길게 빼세요","뒷발의 뒤꿈치를 바닥에 유지하며 무릎을 펴세요","두 손으로 벽을 밀어 몸을 앞으로 기울이세요","종아리 아래쪽이 당기는 느낌으로 60초 유지합니다"]},{"name":"편심성 힐 드롭","why":"한 번에 너무 많은 자극이 쌓여 조직이 회복할 시간이 없는 것이 통증의 원인입니다. 아킬레스건에 조절된 자극을 줘서 건 조직이 더 강하게 재생됩니다.","sets":"15회 · 3세트","cue":"올라올 때는 두 발 사용, 내려갈 때만 한 발로 천천히.","how":["계단 끝이나 박스 끝에 발 앞쪽만 올리세요","두 발로 뒤꿈치를 최대한 높이 들어 올리세요","아픈 발 하나로만 천천히 뒤꿈치를 낮추세요 (3~5초)","양발로 올라오고 반복합니다 (15회)"]},{"name":"힐 엘리베이티드 맨몸 스쿼트","why":"한 번에 너무 많은 자극이 쌓여 조직이 회복할 시간이 없는 것이 통증의 원인입니다. 염증이 줄어든 후 기본 패턴이 제대로 작동하는지 확인합니다.","sets":"15회 · 3세트","cue":"뒤꿈치를 올리면 아킬레스건 신장이 줄어 통증이 감소합니다.","how":["판이나 원판 위에 발뒤꿈치를 올리고 서세요 (1~2cm 높이)","발끝을 약 30도 바깥으로 향하고 발을 어깨너비로 벌리세요","천천히 깊이 앉으며 무릎이 발끝 방향을 유지하는지 확인하세요","15회씩 수행합니다"]},{"name":"PVC 스쿼트","why":"한 번에 너무 많은 자극이 쌓여 조직이 회복할 시간이 없는 것이 통증의 원인입니다. 염증이 줄어든 후 기본 패턴이 제대로 작동하는지 확인합니다.","sets":"12회 · 3세트","cue":"통증 3/10 이상이면 힐 엘리베이션 유지.","how":["PVC를 어깨 앞에 수평으로 잡거나 고블릿 자세로 잡으세요","발을 어깨너비로 벌리고 발끝을 약 30도 바깥으로 향하세요","천천히 최대 깊이로 앉았다가 올라오세요","12회씩 수행합니다"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"종아리 이완 먼저","body":"스쿼트 전 폼롤러로 종아리(비복근·가자미근)를 2분 이완하세요. 아킬레스건 긴장은 종아리 근육의 경직에서 시작됩니다."},{"title":"점프·달리기 조합 주의","body":"아킬레스건 재활 중에는 더블언더·런닝이 포함된 WOD와 스쿼트 세션을 같은 날 해주세요. 아킬레스 반복 자극이 회복을 방해합니다."},{"title":"이 신호 오면 멈추세요","body":"발뒤꿈치 위쪽에 뻣뻣함이나 아침 첫 발걸음 시 통증이 있으면 스쿼트 볼륨을 절반으로 줄이세요. 건병증 악화의 초기 신호입니다."},{"title":"재발 방지 핵심","body":"아킬레스건은 회복이 느린 조직입니다. 통증이 사라져도 3~4주는 높이뛰기·스프린트를 제한하고 볼륨을 천천히 회복하세요."}]}]}},{"id":"cause-c","label":"원인 C","tag":"불안정","name":"만성 외측 발목 불안정","description":"발목을 접질린 이후 인대가 완전히 회복되지 않으면 스쿼트 중 발목 바깥쪽이 불안정해 통증이 반복됩니다. 균형 감각 훈련이 핵심입니다.","priority_note":"불안정이 심하면 정형외과에서 인대 손상 정도를 먼저 확인하세요.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"한 발 서기","why":"발목 바깥쪽 인대가 약해져 스쿼트 중 발목이 안쪽으로 쏠리는 것이 통증의 원인입니다. 발목 바깥쪽 안정성이 직접 훈련됩니다.","sets":"양측 각 30초 · 3세트","cue":"눈을 감으면 난이도 상승.","how":["한 발로 서서 다른 발을 살짝 드세요","눈을 뜨고 30초 버텨보세요","안정되면 눈을 감고 15초 도전합니다","양발 번갈아 수행합니다"]},{"name":"밸런스 보드 서기","why":"발목 바깥쪽 인대가 약해져 스쿼트 중 발목이 안쪽으로 쏠리는 것이 통증의 원인입니다. 발목 주변 근육과 인대가 불안정한 상황에서 버티는 힘을 기릅니다.","sets":"양측 각 60초 · 2세트","cue":"보드 없으면 접은 수건 위에서도 가능.","how":["밸런스 보드 또는 불안정한 표면 위에 두 발로 서세요","한 발씩 번갈아가며 중심을 잡아보세요","익숙해지면 한 발로만 서서 30초 유지합니다","눈을 감으면 난이도가 올라갑니다"]},{"name":"싱글 레그 스쿼트 (낮은 깊이)","why":"발목 바깥쪽 인대가 약해져 스쿼트 중 발목이 안쪽으로 쏠리는 것이 통증의 원인입니다. 안정성이 회복되면 실제 스쿼트 자세에서도 발목이 버텨주게 됩니다.","sets":"양측 각 8회 · 3세트","cue":"무릎이 안으로 발끝 방향으로 유지하며 집중합니다.","how":["한 발로 서서 다른 발을 살짝 앞으로 드세요","서 있는 발의 무릎을 천천히 구부려 20~30도만 내려가세요","무릎이 발끝 방향을 유지하는지 확인하면서 올라오세요","양쪽 각 10~12회씩 수행합니다"]},{"name":"PVC 스쿼트","why":"발목 바깥쪽 인대가 약해져 스쿼트 중 발목이 안쪽으로 쏠리는 것이 통증의 원인입니다. 안정성이 회복되면 실제 스쿼트 자세에서도 발목이 버텨주게 됩니다.","sets":"12회 · 3세트","cue":"발 아치가 발끝 방향으로 유지하며 발가락으로 바닥을 잡습니다.","how":["PVC를 어깨 앞에 수평으로 잡거나 고블릿 자세로 잡으세요","발을 어깨너비로 벌리고 발끝을 약 30도 바깥으로 향하세요","천천히 최대 깊이로 앉았다가 올라오세요","12회씩 수행합니다"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"발목 균형 훈련 지속","body":"한 발 서기 30초를 매 훈련 전 루틴에 넣으세요. 발목 외측 인대 안정성은 꾸준한 균형 훈련으로만 유지됩니다."},{"title":"테이핑 또는 보조기 활용","body":"무게 복귀 초기 2~4주는 발목 테이핑이나 보조기를 착용하세요. 외측 지지가 보완되면 불안정성으로 인한 보상 패턴이 줄어듭니다."},{"title":"이 신호 오면 멈추세요","body":"스쿼트 중 발목이 안쪽으로 꺾이려는 느낌이 오면 즉시 강도를 낮춰주세요. 반복 접질림이 인대를 더 늘려 만성화됩니다."},{"title":"재발 방지 핵심","body":"박스점프 착지 시 발목이 안으로 돌아가지 않는지 확인하세요. 점프 착지 패턴이 교정되지 않으면 발목 불안정이 반복됩니다."}]}]}}],"tests":[{"id":"test-ba-ankle-df","name":"발목 배측굴곡(앞으로 구부리기) 테스트","purpose":"스쿼트 깊이에서 발목 앞쪽 충돌이 있는지 확인합니다","steps":["벽 앞에 서서 발끝을 벽에서 약 5cm 떨어뜨리세요","발뒤꿈치를 바닥에 유지하며 무릎을 벽 쪽으로 밀어보세요","발목 앞쪽에 막히는 느낌이나 찌릿함이 있나요?"],"note":"통증보다 '막히는 느낌'도 양성입니다. 통증 있는 쪽 발로 하세요.","pass_text":"통증·막힘 없이 무릎이 벽에 닿아요","fail_text":"발목 앞쪽이 막히거나 찌릿해요","pass_next":"cause:cause-a","fail_next":"cause:cause-a"},{"id":"test-ba-heel-raise","name":"한 발 뒤꿈치 들기 테스트","purpose":"아킬레스건과 종아리의 부하 내구성을 확인합니다","steps":["랙이나 벽을 살짝 잡고 아픈 발 하나로 서세요","뒤꿈치를 최대한 높이 들어 올리세요","천천히 내리기를 20회 반복해보세요"],"note":"20회 중 통증이 나타나는 시점을 기억해두세요. 건강한 쪽과 비교하세요.","pass_text":"20회 통증 없이 완료했어요","fail_text":"도중에 아프거나 20회 못 채워요","pass_next":"cause:cause-b","fail_next":"cause:cause-b"},{"id":"test-ba-balance","name":"한 발 균형 테스트","purpose":"발목 바깥쪽 인대의 안정성을 확인합니다","steps":["아픈 발로 서서 다른 발을 살짝 드세요","눈을 뜨고 30초 버텨보세요","통과하면 눈을 감고 15초 도전하세요"],"note":"발목이 자꾸 흔들리거나 다른 발이 바닥에 닿으면 실패입니다.","pass_text":"눈 감고 15초도 안정적으로 버텨요","fail_text":"눈 뜨고도 30초 버티기 어려워요","pass_next":"cause:cause-c","fail_next":"cause:cause-c"}]},{"id":"shoulder","name":"어깨","coming_soon":false,"entry_question":"q1","questions":[{"id":"q1","text":"어깨 통증이 느껴지나요?","sub":"스쿼트 랙 포지션·바벨 거치 중 찝히거나 쉬는 중에도 아픈 경우 포함","choices":[{"id":"c1","text":"네, 통증이 있어요","next":"q:q2"},{"id":"c2","text":"아니요, 통증 없이 동작이 안 돼요","next":"q:q3"}]},{"id":"q2","text":"팔을 90도 들고 안쪽으로 비틀 때 아프면서, 팔에 힘이 빠지나요?","sub":"팔을 앞으로 들어 손바닥이 바닥을 향하게 비틀어보세요. 힘을 줘도 팔이 떨어지면 Drop Arm입니다.","choices":[{"id":"c1","text":"아프고 팔이 힘없이 떨어져요 (Drop Arm)","next":"danger"},{"id":"c2","text":"아프지만 힘은 유지돼요","next":"cause:cause-dp"}]},{"id":"q3","text":"룸바락(Lumbar Lock) 검사: 벽에 허리를 붙이고 팔을 들면 양쪽 엄지가 벽에 닿나요?","sub":"벽에 등·허리를 딱 붙이고, 팔꿈치를 편 채 양팔을 들어 엄지가 벽에 닿는지 확인하세요.","choices":[{"id":"c1","text":"네, 양쪽 모두 닿아요","next":"q:q4"},{"id":"c2","text":"팔이 안 닿거나 팔꿈치가 구부러져요","next":"cause:cause-case1"},{"id":"c3","text":"허리가 벽에서 떨어져요","next":"cause:cause-case2"},{"id":"c4","text":"어깨뼈(견갑골)가 날개처럼 튀어나와요","next":"cause:cause-case4"}]},{"id":"q4","text":"Apley's Scratch 검사: 한 팔은 위로, 반대 팔은 아래로 등 뒤에서 양손을 가까이 할 때 어떤가요?","sub":"찝히거나 날카롭게 아프면 DP 상태일 수 있습니다.","choices":[{"id":"c1","text":"한쪽 팔이 많이 제한되고 찝혀요","next":"cause:cause-dp"},{"id":"c2","text":"팔 범위는 어느 정도 되지만 한쪽이 훨씬 뻑뻑해요","next":"cause:cause-case3"},{"id":"c3","text":"대칭으로 잘 돼요","next":"cause:cause-case4"}]}],"tests":[],"danger":{"title":"지금 바로 운동을 멈추세요","reason":"Drop Arm(팔이 힘없이 떨어짐)은 회전근개 파열 신호입니다. 자가 재활을 진행하면 손상이 커질 수 있습니다.","action":"정형외과 또는 스포츠의학과에서 MRI 검사를 권장합니다. 증상 발생 상황(동작·소리·붓기)을 기록해 방문하세요."},"causes":[{"id":"cause-dp","label":"DP 프로세스","tag":"통증 조절","name":"충돌증후군 — 통증 있는 상태 (보호 우선)","description":"어깨를 쓸 때 찝히는 통증이 있으면 구조적 손상 악화를 막고 염증을 가라앉히는 것이 먼저입니다. 오버헤드 동작은 즉시 중단하고 통증 없는 범위의 등척성(버티기) 운동부터 시작합니다.","priority_note":"통증이 완전히 사라진 후 재평가를 거쳐 복귀합니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"월 프레스 (등척성)","why":"통증 없는 등척성 수축으로 어깨 근육을 깨웁니다. 관절 움직임 없이 수행해 염증을 악화시키지 않습니다.","sets":"10초 유지 · 5세트","cue":"팔꿈치 90도 굽혀 벽에 대고 밀어내는 힘만 줍니다. 팔이 움직이면 하는 것이 좋습니다.","how":["벽 앞에 서서 팔꿈치를 90도 굽혀 벽에 대세요","통증이 없는 힘으로 벽을 밀어내며 10초 유지하세요","5세트, 통증 있으면 즉시 중단"]},{"name":"아이소메트릭 밴드 홀드 (내·외회전)","why":"회전근개를 통증 없는 범위에서 등척성으로 자극합니다. 혈류를 증가시켜 조직 회복을 돕습니다.","sets":"10초 유지 · 5세트 (내·외회전 각각)","cue":"약한 밴드로 시작하고 통증이 생기면 즉시 강도를 낮춰주세요.","how":["약한 저항 밴드를 고정점에 연결하세요","팔꿈치 90도 굽힌 채 내회전(배 쪽) 방향으로 10초 버티세요","같은 자세로 외회전(바깥) 방향도 10초 버티세요","각 방향 5세트"]},{"name":"펜듈럼 엑서사이즈","why":"중력을 이용해 어깨 관절 공간을 확보합니다. 능동적 움직임 없이 관절액을 순환시켜 통증을 줄입니다.","sets":"원형 10회 · 전후 10회 · 3세트","cue":"팔에 힘을 완전히 빼고 몸통을 가볍게 흔들어 팔이 추처럼 움직이게 합니다.","how":["테이블에 반대 손을 짚고 상체를 앞으로 숙이세요","아픈 팔의 힘을 완전히 빼고 원형으로 10회 돌리세요","앞뒤로 10회 추 운동하세요","3세트"]},{"name":"슬리퍼 스트레치","why":"후방 관절낭 경직이 충돌증후군의 주요 원인 중 하나입니다. 내회전 가동성을 회복해 어깨 공간을 확보합니다.","sets":"30초 유지 · 3세트","cue":"통증이 아닌 당기는 느낌만 있어야 합니다.","how":["옆으로 누워 아픈 어깨를 아래로 하세요","아래팔을 90도 세우고 반대 손으로 손목을 잡아 바닥 쪽으로 부드럽게 누르세요","30초 유지 · 3세트"]},{"name":"크로스오버 시머트리 활성화","why":"약한 장력 밴드로 어깨 주변 혈류를 증가시킵니다. 통증 발생 범위 이전까지만 실시합니다.","sets":"15회 · 3세트","cue":"통증이 생기는 각도 직전까지만 수행합니다.","how":["약한 밴드를 어깨 높이에 고정하세요","팔꿈치를 붙인 채 바깥으로 당기는 동작을 15회 수행하세요","통증이 생기면 범위를 줄이세요"]},{"name":"푸쉬업 플러스","why":"통증이 줄면 전거근을 활성화합니다. 전거근이 견갑골을 흉곽에 붙여야 어깨 공간이 확보됩니다.","sets":"10회 · 3세트","cue":"팔꿈치를 편 상태에서 등을 추가로 둥글게 밀어내는 마지막 동작이 핵심입니다.","how":["푸쉬업 상단 자세에서 시작하세요","팔꿈치를 편 채 등을 천장 쪽으로 더 밀어내세요 (플러스 동작)","천천히 원위치 · 10회 · 3세트"]},{"name":"Y-레이즈 (엎드려)","why":"하부 승모근을 집중 강화합니다. 상부 승모근이 과활성화되어 있으면 어깨가 올라가 충돌 공간이 줄어듭니다.","sets":"12회 · 3세트","cue":"팔을 들 때 어깨가 귀 쪽으로 올라가지 않도록 견갑골을 아래로 유지합니다.","how":["엎드려 누워 팔을 Y자 방향(대각선 앞)으로 뻗으세요","엄지가 위를 향한 채 팔을 천천히 들어 올리세요","어깨가 올라가지 않도록 주의하며 12회 · 3세트"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"통증 구간 회피 원칙","body":"스쿼트 복귀 시 팔이 수평 이상 올라가지 않는 범위에서 시작하세요. 충돌이 일어나는 각도를 반복하면 회복이 역행합니다."},{"title":"견갑골 세팅 먼저","body":"모든 어깨 동작 전 견갑골을 뒤·아래로 살짝 당기는 '팩킹' 동작을 넣으세요. 어깨 공간이 확보된 상태에서 팔을 올려야 충돌이 줄어듭니다."},{"title":"이 신호 오면 멈추세요","body":"팔을 올릴 때 60~120도 구간에서 찌릿하거나 걸리는 느낌이 오면 해당 동작을 중단하세요. 통증 구간을 반복하면 회전근개 손상으로 이어질 수 있습니다."},{"title":"재발 방지 핵심","body":"어깨 통증이 사라진 후에도 가슴·앞 어깨 스트레칭을 매일 유지하세요. 전방 경직이 재발하면 충돌증후군도 함께 돌아옵니다."}]}]}},{"id":"cause-case1","label":"Case 1","tag":"가동성 부족","name":"광배근·흉추 경직 (어깨 굴곡 공간 부족)","description":"팔을 머리 위로 들 때 등 근육이나 등 중간이 굳어 있으면 어깨가 충분히 올라가지 않습니다. 팔꿈치가 구부러지거나 허리가 꺾이면 공간이 부족해 나타나는 보상입니다. 가동성 확보가 먼저입니다.","priority_note":"등 근육 이완 → 등 중간 가동성 → 패턴 통합 순으로 진행합니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"밴드 랫 트랙션","why":"철봉에 밴드를 걸고 체중을 실으면 광배근이 직접 이완됩니다. 팔을 올리는 공간이 가장 빠르게 확보되는 방법입니다.","sets":"1분 유지 · 좌우 각 2세트","cue":"몸을 아래로 내리며 광배근이 늘어나는 느낌에 집중합니다.","how":["철봉에 저항 밴드를 걸고 한 손으로 잡으세요","밴드가 당기는 방향으로 몸을 살짝 기울여 체중을 실으세요","겨드랑이 아래·뒤가 당기는 느낌으로 1분 유지하세요","좌우 각 2세트"]},{"name":"네발기기 흉추 회전","why":"흉추 가동성이 회복되면 어깨를 들어올릴 때 요추가 보상하지 않아도 됩니다.","sets":"좌우 각 10회 · 3세트","cue":"요추는 고정하고 흉추(등 중간)만 회전시킵니다.","how":["네 발 자세에서 한 손을 머리 뒤에 얹으세요","그 팔꿈치를 천장 쪽으로 회전시키세요 (등 중간이 돌아야 함)","허리가 따라 돌지 않도록 주의하며 10회 · 3세트"]},{"name":"브렛젤 스트레치 (Brettzel)","why":"흉추 회전과 대퇴직근(고관절 굴곡근)을 동시에 스트레칭합니다. 전신 연결성을 회복해 어깨 들기 동작에 필요한 흉추 공간을 확보합니다.","sets":"좌우 각 45초 · 2세트","cue":"위쪽 어깨를 바닥 쪽으로 부드럽게 눌러 흉추 회전을 극대화합니다.","how":["옆으로 누워 아래 무릎을 90도 굽히세요","위 발목을 잡아 대퇴직근을 스트레칭하세요","위쪽 팔을 뒤로 넘기며 흉추를 회전시키세요","45초 유지 후 반대쪽"]},{"name":"룸바락 어깨 굴곡 연습","why":"광배근·흉추가 풀리면 실제 동작에서 보상 없이 팔을 들 수 있는지 확인합니다.","sets":"10회 · 3세트","cue":"허리를 벽에 붙인 채 팔꿈치를 펴고 엄지가 벽에 닿도록 들어 올립니다.","how":["벽에 등·허리를 밀착하고 팔을 천천히 들어 올리세요","팔꿈치가 구부러지거나 허리가 떨어지면 멈추고 이전 단계를 반복하세요","10회 · 3세트"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"흉추·광배 이완 루틴","body":"스쿼트 전 폼롤러 흉추 익스텐션 10회 + 광배근 스트레칭 30초를 넣으세요. 이 두 조직이 경직되면 팔을 올릴 공간이 막힙니다."},{"title":"팔 올리기 전 흉추 체크","body":"팔을 머리 위로 올리기 전 가슴을 먼저 세우세요. 흉추가 굽은 상태에서 팔을 올리면 어깨 충돌 공간이 절반으로 줄어듭니다."},{"title":"이 신호 오면 멈추세요","body":"팔을 들어올릴 때 어깨가 귀 쪽으로 올라간다면 광배·흉추 경직이 동작을 막고 있는 것입니다. 무게를 줄이고 가동성 운동을 먼저 하세요."},{"title":"재발 방지 핵심","body":"장시간 앉아있는 날 이후 반드시 흉추 이완을 먼저 하세요. 책상 자세가 광배·흉추 경직을 가장 빠르게 만드는 원인입니다."}]}]}},{"id":"cause-case2","label":"Case 2","tag":"조절 실패","name":"코어-상지 분리 실패 (팔 들 때 허리가 따라감)","description":"팔을 들어올릴 때 허리가 자동으로 따라가면 몸통이 팔의 움직임과 분리되지 않는 것입니다. 팔과 몸통을 독립적으로 움직이는 훈련이 필요합니다.","priority_note":"코어 브레이싱 → 분리 훈련 → 오버헤드 통합 순으로 진행합니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"복압 브레이싱 연습","why":"팔이 머리 위로 올라갈 때 코어가 허리를 고정해야 어깨 공간이 유지됩니다. 브레이싱부터 각인합니다.","sets":"10초 유지 · 10회 · 3세트","cue":"숨을 크게 들이쉬고 배를 360도 방향으로 부풀린 채 멈춥니다.","how":["코로 크게 숨을 들이쉬며 배를 360도 방향으로 부풀리세요","이 상태에서 10초 유지 후 천천히 내쉬세요","10회 · 3세트"]},{"name":"데드 버그 (Dead Bug)","why":"요추를 고정한 채 팔과 다리를 독립적으로 움직이는 분리 패턴을 훈련합니다.","sets":"좌우 교대 10회 · 3세트","cue":"허리가 바닥에서 뜨는 순간 동작을 강도를 낮춰주세요.","how":["바닥에 누워 무릎 90도, 팔을 천장 방향으로 뻗으세요","숨을 내쉬며 허리를 바닥에 붙이세요","오른팔과 왼다리를 동시에 천천히 뻗었다 돌아오세요","좌우 교대 10회 · 3세트"]},{"name":"하프 닐링 촙 앤 리프트","why":"비대칭 코어 안정화 상태에서 팔을 움직여 코어-상지 분리를 훈련합니다.","sets":"좌우 각 10회 · 3세트","cue":"팔이 움직여도 골반이 흔들리지 않아야 합니다.","how":["한쪽 무릎을 바닥에 대고 반하프닐링 자세를 취하세요","밴드 또는 케이블을 대각선 아래에서 위로 당기며 몸통을 회전시키세요","골반이 안정적으로 유지하며 코어를 유지하며 10회 · 3세트"]},{"name":"터키시 겟업 1단계 (암 바)","why":"누운 자세에서 한 팔을 천장으로 뻗어 어깨 동적 안정성을 훈련합니다. 움직이는 동안 어깨 안정화 근육이 반사적으로 작동하도록 훈련합니다.","sets":"좌우 각 5회 · 3세트","cue":"팔꿈치를 완전히 펴고 어깨뼈를 패킹한 채 팔이 천장을 향하도록 유지합니다.","how":["바닥에 누워 한 손에 가벼운 웨이트를 잡고 천장으로 뻗으세요","반대 무릎을 세우고 옆구리로 구르며 앉는 첫 단계를 수행하세요","팔이 천장을 향한 채 유지하며 5회 · 3세트"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"코어 먼저, 팔 나중","body":"스쿼트 모든 세트에서 코어를 단단히 조인 뒤 팔 동작을 시작하세요. 코어와 상지가 분리되지 않으면 허리가 대신 반응합니다."},{"title":"데드버그 워밍업 삽입","body":"세션 전 데드버그 10회를 넣어 코어-상지 분리 패턴을 먼저 각인하세요. 이 패턴이 익숙해야 무거운 무게에서도 유지됩니다."},{"title":"이 신호 오면 멈추세요","body":"팔을 들 때 허리가 자동으로 젖혀진다면 코어 분리가 아직 안 된 것입니다. 무게를 내리고 패턴 연습으로 돌아가세요."},{"title":"재발 방지 핵심","body":"볼륨이 증가할수록 코어 피로가 먼저 오고 분리가 깨집니다. 세트 후반 허리 반응을 항상 모니터링하세요."}]}]}},{"id":"cause-case3","label":"Case 3","tag":"가동성 부족","name":"후방 관절낭 경직 (내회전·수평 내전 제한)","description":"어깨 뒤쪽 관절 주머니가 굳으면 팔을 등 뒤로 올리거나 앞으로 가로지르는 동작이 크게 제한됩니다. 두 손을 등 뒤에서 마주잡을 때 아래쪽 손이 특히 올라가기 힘든 패턴입니다.","priority_note":"어깨 뒤쪽 이완 → 가동 범위 확장 → 패턴 통합 순으로 진행합니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"슬리퍼 스트레치","why":"후방 관절낭을 직접 이완합니다. 내회전 가동성이 회복되면 Apley's Scratch 제한이 풀립니다.","sets":"30초 유지 · 3세트","cue":"통증이 아닌 당기는 느낌만 있어야 합니다. 천천히 부드럽게.","how":["옆으로 누워 아픈 어깨를 아래로 하세요","아래팔을 90도 세우고 반대 손으로 손목을 잡아 바닥 쪽으로 부드럽게 누르세요","30초 유지 · 3세트"]},{"name":"인디안 클럽 스윙 (또는 가벼운 덤벨 원형 스윙)","why":"관절 궤도를 따라 부드럽게 움직여 후방 관절낭과 회전근개를 동적으로 이완합니다.","sets":"원형 10회 · 전후 10회 · 3세트","cue":"팔에 힘을 빼고 추처럼 자연스럽게 흔들어 관절 공간을 확보합니다.","how":["가벼운 덤벨(1~2kg)을 손에 들고 팔을 자연스럽게 늘어뜨리세요","원형으로 10회, 앞뒤로 10회 부드럽게 스윙하세요","3세트"]},{"name":"90/90 ER/IR PAILs & RAILs","why":"끝범위에서 등척성 수축 후 이완하면 관절낭이 더 효과적으로 늘어납니다. 단순 스트레칭보다 가동 범위 확장 효과가 큽니다.","sets":"20초 등척성 · 30초 이완 · 3세트","cue":"끝범위에서 20초 버티는 힘이 이완 후 가동 범위를 넓혀줍니다.","how":["옆으로 누워 어깨와 팔꿈치를 90/90 자세로 만드세요","내회전(바닥 쪽) 끝범위에서 반대 방향으로 20초 등척성 저항을 주세요","20초 후 힘을 빼고 30초 추가 이완","3세트"]},{"name":"밴드 외회전 강화","why":"후방 관절낭이 이완되면 회전근개(특히 극하근·소원근)를 강화해 안정성을 확보합니다.","sets":"15회 · 3세트","cue":"팔꿈치를 옆구리에 붙이고 바깥으로만 회전합니다.","how":["밴드를 팔꿈치 높이에 고정하세요","팔꿈치를 옆구리에 붙이고 90도 굽힌 채 바깥으로 당기세요","천천히 돌아오며 15회 · 3세트"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"수평 내전 스트레칭 매일","body":"크로스 바디 어깨 스트레칭 30초를 매일 아침 루틴에 넣으세요. 후방 관절낭이 경직되면 내회전이 막혀 어깨 충돌이 반복됩니다."},{"title":"그립 너비 조정","body":"스쿼트에서 그립을 조금 넓히면 내회전 요구가 줄어 후방 관절낭 부담이 감소합니다. 통증 없는 너비를 먼저 찾으세요."},{"title":"이 신호 오면 멈추세요","body":"팔꿈치를 몸 앞으로 모을 때 어깨 뒤쪽에 압박감이 오면 후방 관절낭이 아직 열리지 않은 것입니다. 그 이상 내전해주세요."},{"title":"재발 방지 핵심","body":"렉에서 바를 잡기 전 어깨 내회전을 30초 스트레칭하는 습관을 만드세요. 차가운 상태로 어깨를 바로 쓰면 후방 경직이 빠르게 재발합니다."}]}]}},{"id":"cause-case4","label":"Case 4","tag":"근력 부족","name":"전거근·하부 승모근 약화 (견갑골 익상)","description":"팔을 들 때 어깨뼈가 날개처럼 뒤로 튀어나오거나 흔들리면 어깨뼈를 잡아주는 근육이 제대로 작동하지 않는 것입니다. 어깨뼈가 안정적으로 고정돼야 팔을 올릴 때 어깨 관절 공간이 확보됩니다.","priority_note":"어깨뼈를 잡아주는 근육(전거근·하부 승모근)을 먼저 깨워야 합니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"푸쉬업 플러스","why":"전거근을 직접 활성화합니다. 마지막에 등을 추가로 밀어내는 동작에서 전거근이 집중적으로 켜집니다.","sets":"10회 · 3세트","cue":"팔꿈치를 편 상태에서 등을 추가로 둥글게 밀어내는 마지막 동작이 핵심입니다.","how":["푸쉬업 상단 자세에서 시작하세요","팔꿈치를 편 채 등을 천장 쪽으로 더 밀어내세요","천천히 원위치 · 10회 · 3세트"]},{"name":"Y-레이즈 (엎드려)","why":"하부 승모근을 집중 강화합니다. 상부 승모근이 덜 켜지고 하부 승모근이 더 켜지도록 훈련합니다.","sets":"12회 · 3세트","cue":"팔을 들 때 어깨가 귀 쪽으로 올라가지 않도록 견갑골을 아래로 유지합니다.","how":["엎드려 누워 팔을 Y자 방향(대각선 앞)으로 뻗으세요","엄지가 위를 향한 채 팔을 천천히 들어 올리세요","어깨가 올라가지 않도록 주의하며 12회 · 3세트"]},{"name":"월 슬라이드 (폼롤러)","why":"전거근과 하부 승모근의 협응으로 견갑골이 흉곽을 타고 올라가는 정상 견갑상완 리듬을 훈련합니다.","sets":"10회 · 3세트","cue":"팔을 올리는 내내 어깨가 귀에서 멀어지도록 아래로 유지하세요.","how":["벽 앞에 서서 팔꿈치를 구부려 폼롤러를 벽에 대세요","팔꿈치를 펴며 폼롤러를 위로 밀어 올리세요","어깨가 올라가지 않도록 10회 · 3세트"]},{"name":"링 로우 홀드","why":"수평 당기기 자세에서 전거근·하부 승모근의 협응을 강화합니다.","sets":"20초 · 3세트","cue":"가슴을 링에 붙인 자세에서 어깨뼈를 아래·뒤로 당겨 유지합니다.","how":["링을 잡고 가슴을 링 높이로 당겨 20초 유지하세요","어깨가 올라가지 않도록 주의하며 3세트"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"견갑골 세팅 의식화","body":"스쿼트 모든 세트에서 팔을 올리기 전 견갑골을 뒤·아래로 당기는 동작을 먼저 하세요. 전거근·하부 승모근이 약하면 이 습관이 보상합니다."},{"title":"Y·T·W 보조 운동 유지","body":"세션 후 밴드로 Y·T·W 각 10회를 꾸준히 유지하세요. 이 근육들은 사용하지 않으면 빠르게 다시 약해집니다."},{"title":"이 신호 오면 멈추세요","body":"팔을 올릴 때 어깨가 앞으로 말리거나 견갑골이 날개처럼 튀어나오면 안전한 범위를 벗어난 것입니다. 해당 세트를 종료하세요."},{"title":"재발 방지 핵심","body":"푸시업·딥스·프레스 볼륨이 늘어날수록 전거근·하부 승모근 보강 운동도 함께 늘리세요. 전면 근육 과부하가 견갑 안정화 근육 약화를 만듭니다."}]}]}}]},{"id":"hip","name":"고관절","coming_soon":false,"entry_question":"q1","questions":[{"id":"q1","text":"통증 위치가 어디인가요?","sub":"손으로 짚어보세요. 사타구니·앞쪽·바깥쪽 중 어느 쪽인지 확인합니다.","choices":[{"id":"c1","text":"사타구니 안쪽 (구부릴 때 찝힘)","next":"cause:cause-a"},{"id":"c2","text":"고관절 앞쪽 (허벅지 위 당김)","next":"cause:cause-b"},{"id":"c3","text":"엉덩이 바깥쪽 또는 뒤쪽","next":"cause:cause-c"},{"id":"c4","text":"쉬는 중에도 욱신거린다","next":"danger"}]}],"tests":[],"danger":{"title":"지금 바로 운동을 멈추세요","reason":"안정 시에도 사타구니·고관절 통증이 지속되거나 다리로 저림이 있으면 관절 손상·탈구 등 구조적 문제가 의심됩니다.","action":"정형외과 또는 스포츠의학과 진료를 권장합니다. 통증 위치와 발생 동작을 기록해 방문하세요."},"causes":[{"id":"cause-a","label":"원인 A","tag":"가동성 부족","name":"고관절 임핀지먼트 (FAI) — 사타구니 찝힘","description":"엉덩이를 깊이 구부릴 때 넓적다리뼈와 골반뼈가 부딪히면서 사타구니 안쪽이 찝힙니다. 엉덩이를 굽히고 안쪽으로 돌리는 범위를 확보하면 충돌 없이 동작이 가능해집니다.","priority_note":"엉덩이 가동성 확보가 먼저, 부하는 그 다음입니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"90/90 힙 스트레칭","why":"고관절 내회전·외회전 가동성을 동시에 풀어줍니다. 임핀지먼트는 내회전이 제한될 때 더 심해집니다.","sets":"좌우 각 60초 · 3세트","cue":"억지로 누르지 말고 중력에 맡겨 천천히 이완합니다.","how":["바닥에 앉아 앞 다리와 뒤 다리를 각각 90도로 구부리세요","상체를 앞 다리 정강이 쪽으로 부드럽게 숙이세요","60초 유지 후 반대쪽"]},{"name":"피겨4 스트레칭","why":"이상근과 고관절 외회전근을 이완해 고관절 안쪽 공간을 확보합니다.","sets":"좌우 각 60초 · 2세트","cue":"엉덩이 바깥쪽이 당기는 느낌이 나야 합니다.","how":["바닥에 누워 한쪽 발목을 반대쪽 무릎 위에 올리세요","세운 무릎을 가슴 쪽으로 당기면 엉덩이 바깥쪽이 당깁니다","60초 유지 후 반대쪽"]},{"name":"개구리 자세 (Frog Stretch)","why":"고관절 내회전·굴곡 가동성을 동시에 개선합니다. 임핀지먼트가 있는 각도를 통증 없는 범위에서 점진적으로 열어줍니다.","sets":"30~60초 유지 · 3세트","cue":"엉덩이를 뒤로 빼며 허벅지 안쪽이 당기는 느낌을 찾으세요.","how":["네 발 자세에서 무릎을 양옆으로 최대한 벌리세요","엉덩이를 천천히 뒤로 빼며 고관절이 열리는 느낌을 찾으세요","30~60초 유지 · 3세트"]},{"name":"클램쉘 + 사이드라잉 힙 어브덕션","why":"고관절 외전근을 강화하면 임핀지먼트 없이 안정적으로 고관절을 사용할 수 있습니다.","sets":"좌우 각 15회 · 3세트","cue":"발뒤꿈치를 붙인 채 위 무릎만 벌립니다.","how":["클램쉘 15회 → 사이드라잉 어브덕션 15회 순으로","좌우 각 3세트"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"스탠스 조정으로 찝힘 회피","body":"스탠스를 넓히고 발끝을 더 바깥으로 벌리면 고관절 굴곡 깊이가 줄어 임핀지먼트가 감소합니다. 통증 없는 스탠스를 먼저 찾으세요."},{"title":"깊이 제한","body":"재활 초기에는 고관절이 무릎 평행 지점까지만 내려가세요. 찝힘이 오는 깊이를 파악해 그 이상 내려가지 마세요."},{"title":"이 신호 오면 멈추세요","body":"사타구니 안쪽에 찌릿함이나 '걸리는' 느낌이 오면 즉시 세트를 종료하세요. 임핀지먼트 반복은 연골 손상 위험이 있습니다."},{"title":"재발 방지 핵심","body":"OHS·프론트 스쿼트처럼 고관절 굴곡이 더 깊이 들어가는 동작을 복귀할 때 같은 찝힘이 있는지 확인하세요."}]}]}},{"id":"cause-b","label":"원인 B","tag":"과긴장","name":"고관절 굴곡근 긴장 (앞쪽 통증)","description":"엉덩이 앞쪽 근육이 과도하게 뭉치면 동작 중 사타구니 앞 xt":"쉬는 중에도 욱신거린다","next":"danger"}]},{"id":"q2","text":"무릎 어느 쪽이 아픈가요?","sub":"손으로 짚어보면 더 정확합니다.","choices":[{"id":"c1","text":"앞쪽 (슬개골 주변)","next":"test:test-ankle-df"},{"id":"c2","text":"바깥쪽","next":"cause:cause-c"}]}],"tests":[{"id":"test-ankle-df","name":"발목 배측굴곡 테스트","purpose":"발목이 충분히 구부러지는지 확인합니다. 제한이 있으면 런지 시 뒤꿈치가 들리며 무릎 전면에 과부하가 걸립니다.","steps":["벽 앞에 서서 발끝을 벽에서 약 5cm 떨어뜨리세요","발뒤꿈치를 바닥에 붙인 채로","무릎을 벽 쪽으로 밀어보세요 (새끼발가락 방향으로)"],"note":"신발 신고 해도 됩니다. 통증 있는 쪽 발로 하세요.","pass_text":"무릎이 벽에 닿아요","fail_text":"뒤꿈치가 들리거나 닿지 않아요","pass_next":"test:test-valgus","fail_next":"cause:cause-a"},{"id":"test-valgus","name":"런지 무릎 정렬 테스트","purpose":"런지 하강 시 무릎이 안쪽으로 쏠리는지 확인합니다. 고관절 외전근 힘을 반영합니다.","steps":["거울 앞이나 핸드폰 전면 카메라 앞에 서세요","맨몸으로 천천히 런지 하강 자세를 취하세요","앞 무릎이 발끝 방향을 유지하는지 정면에서 관찰하세요"],"note":"무릎을 구부릴 필요 없이 하강 자세만 취하면 됩니다.","pass_text":"무릎이 발끝 방향 유지","fail_text":"무릎이 안쪽으로 쏠림","pass_next":"cause:cause-d","fail_next":"cause:cause-b"}],"danger":{"title":"지금 바로 운동을 멈추세요","reason":"안정 시에도 통증이 지속되면 연골·인대·활액낭 손상이 의심됩니다. 자가 재활을 진행하면 증상이 악화될 수 있습니다.","action":"정형외과 또는 스포츠의학과 진료를 권장합니다. 증상 발생 상황(동작·무게·빈도)을 기록해 방문하면 진단에 도움이 됩니다."},"causes":[{"id":"cause-a","label":"원인 A","tag":"가동성 부족","name":"발목 배측굴곡 제한","description":"런지 하강 시 발목이 충분히 굽혀지지 않으면 뒤꿈치가 들리고 무릎이 앞으로 과도하게 밀리면서 슬개골 아래에 압박이 집중됩니다. 무릎 자체가 아닌 발목 가동성을 먼저 해결해야 통증이 사라집니다.","priority_note":"가동성 제한은 근력 운동보다 먼저 해결합니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"월 앵클 모빌리티","why":"발목 앞쪽 관절 공간을 직접 늘려줍니다. 꾸준히 하면 뒤꿈치가 바닥에 붙은 채로 런지를 내려갈 수 있게 됩니다.","sets":"양측 각 10회 · 3세트","cue":"뒤꿈치를 바닥에 고정한 채 무릎이 새끼발가락 방향으로 나가게 합니다.","how":["벽 앞에 서서 발끝을 벽에서 5cm 떨어뜨리세요","발뒤꿈치를 바닥에 붙인 채 무릎을 벽 쪽으로 밀어보세요","무릎이 닿으면 발을 1cm 더 뒤로 물리고 반복합니다","양발 각각 10~15회씩"]},{"name":"밴드 발목 견인 스트레칭","why":"밴드가 발목뼈(거골)를 뒤쪽으로 당겨 관절 안쪽 활주를 회복시킵니다. 월 앵클 모빌리티와 병행하면 효과가 배가됩니다.","sets":"양측 각 30초 유지 · 3세트","cue":"밴드를 발목 바로 위에 걸고, 발목을 부드럽게 앞뒤로 펌핑합니다.","how":["저항 밴드를 복숭아뼈 바로 위에 걸고 반대쪽에 고정하세요","밴드가 팽팽하게 당겨지는 방향으로 한 발을 앞으로 내딛으세요","발뒤꿈치를 바닥에 유지하며 무릎을 앞으로 밀어 발목을 굽히세요","30초 유지 후 발목을 부드럽게 앞뒤로 10회 펌핑합니다"]},{"name":"힐 엘리베이티드 런지","why":"발뒤꿈치를 살짝 높여 발목 가동 범위가 부족한 상태에서도 올바른 런지 패턴을 연습할 수 있습니다.","sets":"좌우 각 10회 · 3세트","cue":"무릎이 발끝 방향을 유지하는지 거울로 확인하세요.","how":["앞발 뒤꿈치 아래에 원판이나 책(1~2cm)을 깔고 서세요","한 발을 뒤로 보내며 런지 자세를 취하세요","앞 무릎이 90도 근처까지 내려가도록 천천히 하강하세요","10회 후 반대쪽도 동일하게"]},{"name":"PVC 잡고 런지","why":"PVC를 앞에 수직으로 세우고 잡으면 균형을 보조해 발목과 무릎 정렬에만 집중할 수 있습니다.","sets":"좌우 각 10회 · 3세트","cue":"PVC를 지지대로만 쓰고 체중은 다리로 부담합니다.","how":["PVC를 발 앞쪽 바닥에 수직으로 세우고 양손으로 잡으세요","한 발을 뒤로 보내 런지 자세로 천천히 내려가세요","앞 무릎 방향과 발뒤꿈치 위치를 확인하며 진행하세요","좌우 각 10회"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"런지 스텝 길이 조정","body":"스텝을 길게 할수록 발목 배측굴곡 요구가 높아집니다. 재활 초기에는 스텝을 짧게 유지하고 발목이 열릴수록 길게 늘리세요."},{"title":"WOD 전 발목 준비","body":"월 앵클 모빌리티 20회를 런지 전에 넣으세요. 발목이 준비되지 않으면 무릎이 과하게 앞으로 나가 전면에 부하가 집중됩니다."},{"title":"이 신호 오면 멈추세요","body":"런지 하강 시 앞발 뒤꿈치가 뜨거나 무릎 전면에 타는 느낌이 오면 즉시 세트를 종료하세요."},{"title":"재발 방지 핵심","body":"워킹 런지·바벨 런지는 발목 가동성 요구가 가장 높습니다. 발목이 충분히 열리기 전까지 이 동작은 제한하세요."}]}]}},{"id":"cause-b","label":"원인 B","tag":"근력 부족","name":"고관절 외전근 약화 (무릎 안쪽 쏠림)","description":"런지 하강 시 중둔근이 충분히 버텨주지 못하면 무릎이 안쪽으로 쏠립니다(valgus). 이 상태가 반복되면 슬개골 안쪽과 내측 인대에 스트레스가 쌓입니다. 무릎이 아닌 고관절 외전근을 먼저 강화해야 합니다.","priority_note":"고관절 외전근 강화가 선행되어야 무릎 정렬이 잡힙니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"클램쉘","why":"중둔근을 무릎·허리 부하 없이 직접 자극하는 가장 안전한 시작 운동입니다. 이 근육이 켜져야 런지에서 무릎이 안 무너집니다.","sets":"좌우 각 15회 · 3세트","cue":"발뒤꿈치끼리 붙인 채 위쪽 무릎만 벌립니다. 골반이 뒤로 구르지 않도록 주의하세요.","how":["옆으로 누워 무릎을 45도 구부리세요","발뒤꿈치를 붙인 채 위쪽 무릎을 천장 방향으로 벌리세요","골반이 뒤로 돌아가지 않도록 복부를 살짝 잡으세요","15회 후 반대쪽"]},{"name":"사이드라잉 힙 어브덕션","why":"중둔근 상부 섬유까지 자극합니다. 클램쉘보다 다리 전체를 들어 더 넓은 범위를 씁니다.","sets":"좌우 각 15회 · 3세트","cue":"발끝이 위를 향한 채 다리를 곧게 들어 올립니다.","how":["옆으로 누워 아래 다리를 살짝 구부려 안정을 잡으세요","위쪽 다리를 곧게 뻗은 채 30~40도까지 들어 올리세요","2초 유지 후 천천히 내립니다","15회 · 3세트, 반대쪽도 동일"]},{"name":"밴드 사이드 워크","why":"서서 이동하며 중둔근을 기능적으로 강화합니다. 런지 중 무릎 안정에 직접 연결되는 패턴입니다.","sets":"좌우 각 15보 · 3세트","cue":"무릎이 발끝 방향을 유지하고 상체는 안정적으로 유지하며 합니다.","how":["저항 밴드를 무릎 바로 위에 걸고 어깨너비로 서세요","살짝 스쿼트 자세(무릎 15도 구부림)를 유지하며","옆으로 천천히 15보 이동하세요","반대 방향으로도 15보"]},{"name":"벽 잡고 런지 (무릎 정렬 집중)","why":"균형 보조를 받으며 무릎 방향에만 집중해 올바른 패턴을 각인합니다.","sets":"좌우 각 10회 · 3세트","cue":"하강하면서 무릎이 발끝 방향인지 소리 내어 확인하는 습관을 들이세요.","how":["벽 옆에 서서 한 손으로 가볍게 짚으세요","천천히 런지 하강 — 앞 무릎이 발끝 방향인지 확인하세요","안쪽으로 쏠리면 의식적으로 바깥으로 밀어내세요","좌우 각 10회"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"둔근 활성화 먼저","body":"런지 전 클램쉘 15회를 워밍업에 넣으세요. 고관절 외전근이 준비되어야 런지 중 무릎이 안으로 무너지지 않습니다."},{"title":"무릎 추적 모니터링","body":"런지 하강 시 앞발 무릎이 발끝 방향을 유지하는지 확인하세요. 안으로 쏠리면 그 세트는 무게 없이 패턴부터 다시 잡으세요."},{"title":"이 신호 오면 멈추세요","body":"런지 중 무릎 안쪽에 통증이나 불안감이 오면 고관절 외전근이 피로한 신호입니다. 세트를 종료하세요."},{"title":"재발 방지 핵심","body":"스플릿 스쿼트·불가리안 스플릿 스쿼트를 보조 운동으로 넣으세요. 한 발 지지 패턴이 강해질수록 런지 중 무릎 안정성이 좋아집니다."}]}]}},{"id":"cause-c","label":"원인 C","tag":"과긴장","name":"IT밴드/TFL 긴장 (외측 무릎 통증)","description":"장경인대(IT밴드)와 대퇴근막장근(TFL)이 과도하게 긴장되면 런지에서 무릎 바깥쪽이 당기거나 쑤십니다. 이완을 먼저 하고 고관절 외전근을 강화해야 재발을 막을 수 있습니다.","priority_note":"이완이 먼저, 강화는 그 다음입니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"폼롤러 IT밴드 이완","why":"IT밴드 주변 근막 긴장을 직접 풀어줍니다. 통증 포인트에서 30초 이상 머물러야 효과가 납니다.","sets":"좌우 각 60~90초 · 2세트","cue":"가장 아픈 지점에서 멈추고 숨을 내쉬며 이완하세요.","how":["옆으로 누워 폼롤러를 허벅지 바깥쪽에 대세요","아래팔로 상체를 지지하며 엉덩이 옆부터 무릎 위까지 천천히 굴리세요","가장 아픈 지점에서 30~40초 강도를 낮춰주세요","좌우 각 60~90초"]},{"name":"TFL 스트레칭 (서서)","why":"TFL이 짧아지면 IT밴드를 위에서 당겨 외측 무릎 통증을 유발합니다. 이 근육을 늘려줘야 IT밴드 긴장이 완화됩니다.","sets":"좌우 각 30초 · 3세트","cue":"골반이 앞으로 나오지 않도록 복부를 살짝 잡으세요.","how":["벽 옆에 서서 스트레칭할 다리를 뒤쪽 다리 뒤로 교차시키세요","골반을 벽 쪽으로 살짝 밀면 엉덩이 옆이 당기는 느낌이 납니다","30초 유지 후 반대쪽","하루 3회 반복하면 효과가 빠릅니다"]},{"name":"90/90 힙 스트레칭","why":"고관절 내회전·외회전 가동성을 동시에 풀어 TFL과 IT밴드를 간접적으로 이완합니다.","sets":"좌우 각 60초 · 2세트","cue":"억지로 누르지 말고 중력에 맡겨 천천히 이완합니다.","how":["바닥에 앉아 앞 다리와 뒤 다리를 각각 90도로 구부리세요","상체를 앞 다리 정강이 쪽으로 부드럽게 숙이세요","60초 유지 후 반대쪽","호흡을 유지하며 억지로 밀지 마세요"]},{"name":"클램쉘 + 사이드라잉 힙 어브덕션","why":"IT밴드 긴장의 근본 원인 중 하나는 고관절 외전근 약화입니다. 이완 후 중둔근을 활성화해야 재발을 막습니다.","sets":"좌우 각 15회 · 3세트","cue":"이완 직후 바로 이어서 수행하면 근육이 더 잘 켜집니다.","how":["클램쉘 15회 → 사이드라잉 힙 어브덕션 15회 순으로","폼롤러 이완 직후에 수행하세요","좌우 각 15회 · 3세트"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"IT밴드·TFL 이완 루틴","body":"런지 전 폼롤러 IT밴드 이완 2분을 넣으세요. 외측 무릎 통증은 IT밴드 긴장이 해소되어야 런지 중 마찰이 줄어듭니다."},{"title":"런지 깊이 제한","body":"재활 초기에는 뒷무릎이 바닥에 닿기 직전에 강도를 낮춰주세요. 런지 최하단이 IT밴드 마찰이 가장 큰 지점입니다."},{"title":"이 신호 오면 멈추세요","body":"무릎 바깥쪽에 타는 느낌이 오면 즉시 세트를 종료하세요. 마찰 상태에서 반복하면 염증이 악화됩니다."},{"title":"재발 방지 핵심","body":"런닝이 포함된 WOD 다음 날 런지를 하면 IT밴드 자극이 겹쳐 빠르게 악화됩니다. 런닝 WOD 후 24시간은 런지를 조절해주세요."}]}]}},{"id":"cause-d","label":"원인 D","tag":"과부하","name":"슬개대퇴 증후군 (대퇴사두근 과부하)","description":"발목 가동성도 충분하고 무릎 정렬도 괜찮지만 슬개골 앞쪽이 아프다면, 대퇴사두근이 런지 부하를 감당하기엔 아직 약하거나 갑자기 볼륨이 늘어난 것이 원인입니다. 부하를 낮추고 단계적으로 슬개골 주변 근력을 키워야 합니다.","priority_note":"리버스 런지가 전방 런지보다 슬개골 부하가 적어 재활에 유리합니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"쿼드 세팅","why":"무릎에 부하 없이 대퇴사두근만 수축시킵니다. 통증이 심한 초기에 근육이 꺼지는 것을 막아줍니다.","sets":"10초 유지 · 15회 · 3세트","cue":"뒤꿈치를 바닥에 대고 무릎 아래 근육이 단단해지는 느낌에 집중합니다.","how":["바닥에 다리를 곧게 뻗고 앉으세요","허벅지 앞 근육을 조이며 무릎을 바닥 쪽으로 누르세요","10초 유지 후 이완","15회 · 3세트"]},{"name":"스트레이트 레그 레이즈","why":"무릎을 구부리지 않고 대퇴사두근을 강화합니다. 슬개골에 압박 없이 근력을 키울 수 있는 초기 운동입니다.","sets":"15회 · 3세트","cue":"허벅지가 단단히 수축된 상태에서 다리를 들어야 슬개골 보호 효과가 있습니다.","how":["바닥에 누워 한쪽 무릎은 세우고 반대쪽은 곧게 뻗으세요","허벅지 앞을 수축한 채 뻗은 다리를 45도까지 들어 올리세요","2초 유지 후 천천히 내립니다","15회 · 3세트, 반대쪽도 동일"]},{"name":"미니 스쿼트 (0~45도)","why":"45도 이하 무릎 굴곡은 슬개대퇴 압박이 최소화되는 안전 구간입니다. 이 범위에서 대퇴사두근을 강화합니다.","sets":"15회 · 3세트","cue":"통증이 시작되는 각도 직전까지만 내려갑니다.","how":["발을 어깨너비로 벌리고 서세요","무릎을 45도만 구부렸다가 천천히 올라오세요","통증이 없는 범위를 찾아 그 안에서만 반복하세요","15회 · 3세트"]},{"name":"낮은 박스 스텝업","why":"스텝업은 런지보다 슬개골 부하가 적으면서 편심성 대퇴사두근 강화가 됩니다. 내려올 때 천천히가 핵심입니다.","sets":"좌우 각 10회 · 3세트","cue":"올라갈 때보다 내려올 때 3~4초를 들여 천천히 내려옵니다.","how":["10~20cm 높이 박스나 계단 앞에 서세요","한 발로 박스를 밟고 올라가세요","반대발을 천천히 내려 바닥에 닿기 직전까지만 내렸다가 올라오세요","좌우 각 10회 · 3세트"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"런지 깊이로 부하 조절","body":"대퇴사두 과부하는 런지 깊이가 깊을수록 심해집니다. 재활 초기에는 허벅지가 바닥과 평행한 지점에서 강도를 낮춰주세요."},{"title":"내려가는 속도 늘리기","body":"하강을 3~4초로 천천히 내려가면 대퇴사두 부하가 분산됩니다. 반동 없이 천천히 컨트롤하는 것이 핵심입니다."},{"title":"이 신호 오면 멈추세요","body":"슬개골 아래쪽이나 무릎 전면에 타는 느낌이 오면 대퇴사두가 한계에 달한 신호입니다. 세트를 종료하세요."},{"title":"재발 방지 핵심","body":"스러스터·월볼처럼 대퇴사두 연속 사용 동작이 있는 WOD 다음 날은 런지 볼륨을 절반으로 줄이세요."}]}]}}]},{"id":"lower-back","name":"허리","coming_soon":false,"entry_question":"q1","questions":[{"id":"q1","text":"통증이 언제 느껴지나요?","sub":null,"choices":[{"id":"c1","text":"런지 하강할 때","next":"q:q2"},{"id":"c2","text":"올라올 때 또는 내내","next":"q:q2"},{"id":"c3","text":"쉬는 중에도 욱신거린다","next":"danger"}]},{"id":"q2","text":"통증 위치가 어디인가요?","sub":"손으로 짚어보세요.","choices":[{"id":"c1","text":"허리 중앙 (척추 주변)","next":"test:test-hip-flexor"},{"id":"c2","text":"허리 한쪽 (엉덩이 위쪽)","next":"cause:cause-c"}]}],"tests":[{"id":"test-hip-flexor","name":"토마스 테스트 (고관절 굴곡근 긴장 확인)","purpose":"장요근(고관절 굴곡근)이 짧아져 있는지 확인합니다. 단축되면 런지 시 골반이 앞으로 기울며 허리가 과도하게 젖혀집니다.","steps":["침대나 박스 끝에 앉으세요","한쪽 무릎을 양손으로 가슴 쪽으로 당기세요","그 상태로 천천히 뒤로 누우세요","반대쪽 다리가 자연스럽게 내려가는지 확인하세요"],"note":"반대쪽 다리가 바닥(또는 침대면)에서 뜨면 고관절 굴곡근이 짧은 것입니다.","pass_text":"반대쪽 다리가 바닥에 닿아요","fail_text":"반대쪽 다리가 들려요","pass_next":"cause:cause-b","fail_next":"cause:cause-a"}],"causes":[{"id":"cause-a","label":"원인 A","tag":"가동성 부족","name":"고관절 굴곡근 단축 (요추 과신전)","description":"장요근이 짧아지면 런지 하강 시 골반이 앞으로 기울고 허리가 과도하게 젖혀집니다(요추 과신전). 허리 자체 문제가 아니라 고관절 앞쪽 근육을 먼저 풀어야 통증이 해결됩니다.","priority_note":"스트레칭으로 고관절 굴곡근을 먼저 이완한 후 코어 안정화를 병행합니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"로우 런지 스트레칭 (Couch Stretch)","why":"장요근을 직접 늘려줍니다. 런지 자세로 하기 때문에 실제 동작과 가장 연관성이 높은 스트레칭입니다.","sets":"좌우 각 60초 · 3세트","cue":"골반을 앞으로 밀면서 허리는 곧게 유지합니다. 허리가 젖혀지면 효과가 없습니다.","how":["한 발을 앞에, 반대 무릎을 바닥에 놓는 런지 자세를 취하세요","뒷발 쪽 엉덩이를 앞으로 밀면서 고관절 앞쪽이 당기는 느낌을 찾으세요","허리가 젖혀지지 않도록 복부를 살짝 조이세요","60초 유지 후 반대쪽"]},{"name":"90/90 힙 플렉서 스트레칭","why":"장요근과 대퇴직근을 동시에 이완합니다. 앉은 자세가 많은 사람에게 특히 효과적입니다.","sets":"좌우 각 45초 · 3세트","cue":"상체를 곧게 유지하고 골반을 앞으로 살짝 밀어냅니다.","how":["한쪽 무릎을 바닥에 대고 반대쪽 발을 앞에 두세요 (런지 자세)","뒤쪽 발의 발등을 벽이나 박스에 올리세요","상체를 세우고 골반을 앞으로 밀면 허벅지 앞과 고관절 앞이 당깁니다","45초 유지 후 반대쪽"]},{"name":"데드 버그 (Dead Bug)","why":"고관절 굴곡근이 이완되면 허리가 중립을 유지하도록 코어가 받쳐줘야 합니다. 데드 버그는 요추를 바닥에 고정한 채 사지를 움직여 코어 안정화를 훈련합니다.","sets":"좌우 교대 10회 · 3세트","cue":"허리가 바닥에서 뜨는 순간 동작을 강도를 낮춰주세요. 허리 고정이 전부입니다.","how":["바닥에 누워 무릎 90도, 팔을 천장 방향으로 뻗으세요","숨을 내쉬며 허리를 바닥에 붙이세요","오른팔과 왼다리를 동시에 천천히 뻗었다 돌아오세요","허리가 바닥에서 뜨지 않는 범위에서만 수행합니다","좌우 교대 10회 · 3세트"]},{"name":"PVC 잡고 런지 (골반 중립 의식)","why":"균형 보조를 받으며 골반이 앞으로 기울지 않는 런지 패턴을 각인합니다. 스트레칭과 코어 훈련이 실제 동작에 통합되는 단계입니다.","sets":"좌우 각 10회 · 3세트","cue":"하강하면서 배꼽을 척추 쪽으로 살짝 당기는 느낌을 유지합니다.","how":["런지 전 코치 스트레칭 + 데드 버그를 워밍업으로 수행하세요","PVC를 앞에 세우고 잡은 채 런지 하강하세요","허리가 젖혀지지 않도록 복부를 조이며 수행하세요","좌우 각 10회"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"런지 셋업 전 고관절 굴곡근 이완","body":"피전 스트레칭 60초를 런지 전에 넣으세요. 고관절 굴곡근이 단축되면 런지 자세에서 허리가 자동으로 과신전됩니다."},{"title":"코어 브레이싱 유지","body":"런지 하강 중 배꼽을 안으로 당기고 복압을 유지하세요. 코어가 없으면 고관절 굴곡근 단축이 곧바로 허리 과신전으로 연결됩니다."},{"title":"이 신호 오면 멈추세요","body":"런지 하강 시 허리가 앞으로 젖혀지는 느낌이 오면 즉시 세트를 종료하세요. 과신전 자세 반복은 후관절 자극을 누적시킵니다."},{"title":"재발 방지 핵심","body":"장시간 앉아있는 날 이후 런지 전 고관절 굴곡근 스트레칭을 2배로 늘리세요. 고관절 굴곡근 단축이 가장 빠르게 생기는 상황입니다."}]}]}},{"id":"cause-b","label":"원인 B","tag":"근력 부족","name":"코어 약화 (요추 중립 유지 불가)","description":"코어가 충분히 버텨주지 못하면 런지의 비대칭 부하 아래서 요추가 굴곡되거나 측면으로 쏠립니다. 고관절 굴곡근은 유연한데 허리가 아프다면 코어 안정화가 부족한 것입니다.","priority_note":"복압(브레이싱) 훈련을 먼저, 런지 복귀는 그 다음입니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"복압 브레이싱 연습","why":"무거운 부하 아래서 허리를 보호하는 핵심은 복압(IAP)입니다. 이것을 의식적으로 만드는 연습부터 시작합니다.","sets":"10초 유지 · 10회 · 3세트","cue":"숨을 크게 들이쉬고 배를 360도 방향으로 부풀린 채 멈춥니다. 배를 집어넣지 마세요.","how":["편하게 서거나 앉으세요","코로 크게 숨을 들이쉬며 배를 360도 방향으로 부풀리세요","이 상태에서 10초 유지 후 천천히 내쉬세요","10회 · 3세트"]},{"name":"데드 버그 (Dead Bug)","why":"요추를 바닥에 고정한 채 사지를 움직여 코어 안정화를 훈련합니다. 런지의 사지 교대 패턴과 동일한 신경 구조입니다.","sets":"좌우 교대 10회 · 3세트","cue":"허리가 바닥에서 뜨는 순간 동작을 강도를 낮춰주세요.","how":["바닥에 누워 무릎 90도, 팔을 천장 방향으로 뻗으세요","숨을 내쉬며 허리를 바닥에 붙이세요","오른팔과 왼다리를 동시에 천천히 뻗었다 돌아오세요","좌우 교대 10회 · 3세트"]},{"name":"버드 독 (Bird Dog)","why":"서서 하는 코어 훈련의 전 단계입니다. 런지와 같은 사지 교대 패턴으로 코어 안정화를 강화합니다.","sets":"좌우 교대 10회 · 3세트","cue":"골반이 옆으로 기울지 않도록 유지합니다. 속도보다 안정성이 중요합니다.","how":["네 발 자세에서 허리를 중립으로 만드세요","오른팔과 왼다리를 동시에 천천히 뻗으세요","3초 유지 후 돌아옵니다","좌우 교대 10회 · 3세트"]},{"name":"플랭크","why":"코어 전체를 정적으로 강화합니다. 런지에서 요구되는 척추 안정성의 기반이 됩니다.","sets":"30~45초 · 3세트","cue":"엉덩이가 올라가거나 처지지 않도록 일직선을 유지합니다.","how":["팔꿈치를 어깨 아래에 놓고 전완으로 지지하세요","머리부터 발꿈치까지 일직선을 유지하세요","복부를 조이고 허리가 처지지 않도록 합니다","30~45초 · 3세트"]},{"name":"PVC 잡고 런지 (브레이싱 유지)","why":"코어 훈련을 실제 런지 패턴에 통합하는 단계입니다.","sets":"좌우 각 10회 · 3세트","cue":"내려가기 전 숨을 크게 들이쉬고 브레이싱한 채 하강합니다.","how":["PVC를 앞에 세우고 잡으세요","내려가기 전 복압을 만든 채 런지 하강하세요","올라오면서 숨을 내쉬세요","좌우 각 10회"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"코어 먼저 활성화","body":"런지 전 플랭크 30초로 코어를 미리 활성화하세요. 코어가 준비된 상태에서 시작해야 런지 중 허리 중립이 유지됩니다."},{"title":"바벨 런지 전 체크","body":"바벨을 올리기 전 맨몸 런지에서 허리 중립이 유지되는지 먼저 확인하세요. 코어 약화가 있으면 무게가 실릴 때 바로 무너집니다."},{"title":"이 신호 오면 멈추세요","body":"런지 후반 세트에서 허리가 무너지는 느낌이 오면 코어 피로 신호입니다. 남은 세트 수를 줄이거나 무게를 내리세요."},{"title":"재발 방지 핵심","body":"런지 볼륨이 증가할수록 코어 보조 운동(데드버그·플랭크)도 함께 늘리세요. 코어가 뒤따라가지 못하면 허리 통증이 반복됩니다."}]}]}},{"id":"cause-c","label":"원인 C","tag":"관절 부하","name":"천장관절(SI joint) 부하 불균형","description":"런지는 좌우 다리에 교대로 비대칭 부하를 줍니다. 천장관절이 불안정하면 이 비대칭 부하가 골반 한쪽에 집중되어 엉덩이 위쪽 허리에 통증이 생깁니다. 좌우 중 한쪽만 아프고 허리 정중앙은 괜찮다면 SI joint 관련 가능성이 높습니다.","priority_note":"대칭 동작(스쿼트)으로 먼저 코어를 강화한 후 런지로 복귀합니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"피겨4 스트레칭 (Figure-4)","why":"천장관절 주변 근육(이상근, 소둔근)의 긴장을 풀어 SI joint 압박을 줄입니다.","sets":"좌우 각 60초 · 2세트","cue":"통증이 있는 쪽을 더 오래 유지하세요.","how":["바닥에 누워 무릎을 세우세요","한쪽 발목을 반대쪽 무릎 위에 올리세요","세운 무릎을 가슴 쪽으로 당기면 엉덩이 바깥쪽이 당깁니다","60초 유지 후 반대쪽"]},{"name":"글루트 브릿지","why":"대둔근과 코어를 동시에 강화해 SI joint의 안정성을 높입니다. 좌우 대칭 동작으로 SI joint에 균등한 부하를 줍니다.","sets":"15회 · 3세트","cue":"최고점에서 엉덩이를 2초 쥐어짜세요.","how":["바닥에 누워 무릎을 세우세요","엉덩이를 들어 올려 무릎·골반·어깨가 일직선이 되게 하세요","2초 유지 후 천천히 내립니다","15회 · 3세트"]},{"name":"데드 버그","why":"코어 안정화로 SI joint가 받는 비대칭 부하를 줄입니다.","sets":"좌우 교대 10회 · 3세트","cue":"허리가 바닥에서 뜨지 않도록 합니다.","how":["바닥에 누워 무릎 90도, 팔을 천장 방향으로 뻗으세요","오른팔과 왼다리를 동시에 천천히 뻗었다 돌아오세요","좌우 교대 10회 · 3세트"]},{"name":"맨몸 스쿼트","why":"좌우 대칭 부하 동작에서 SI joint 통증이 없는지 먼저 확인합니다. 런지로 가기 전 중간 단계입니다.","sets":"15회 · 3세트","cue":"엉덩이 위쪽 통증이 없는지 확인하며 수행합니다.","how":["맨몸 스쿼트 15회를 수행하며 SI joint 통증을 확인하세요","통증 없으면 3세트 완료 후 다음 단계로"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"SI 관절 대칭 체크","body":"런지 시 한쪽 골반이 더 많이 올라가거나 내려가면 SI 관절에 비대칭 부하가 집중됩니다. 거울이나 동료에게 확인하세요."},{"title":"양쪽 런지 균등 배분","body":"오른쪽·왼쪽 번갈아 균등하게 수행하세요. 한쪽을 먼저 모두 수행하면 SI 관절에 비대칭 부하가 누적됩니다."},{"title":"이 신호 오면 멈추세요","body":"엉덩이 한쪽이나 천골 주변에 찌릿함이 오면 SI 관절에 과부하 신호입니다. 세트를 즉시 종료하세요."},{"title":"재발 방지 핵심","body":"한쪽 발목·무릎 제한으로 비대칭이 생기면 SI 관절 통증이 반복됩니다. 하체 좌우 가동성과 근력 균형을 정기적으로 확인하세요."}]}]}}],"danger":{"title":"지금 바로 운동을 멈추세요","reason":"안정 시에도 허리 통증이 지속되면 추간판 탈출증·척추 분리증 등 구조적 손상이 의심됩니다.","action":"정형외과 또는 스포츠의학과 진료를 권장합니다. 통증 발생 상황(동작·무게·자세)을 기록해 방문하면 진단에 도움이 됩니다."}},{"id":"ankle","name":"발목","coming_soon":false,"entry_question":"q1","questions":[{"id":"q1","text":"통증이 언제 느껴지나요?","sub":null,"choices":[{"id":"c1","text":"런지 하강할 때 (발목 구부러질 때)","next":"q:q2"},{"id":"c2","text":"올라올 때 또는 발 떼는 순간","next":"q:q2"},{"id":"c3","text":"쉬는 중에도 욱신거린다","next":"danger"}]},{"id":"q2","text":"통증 위치가 어디인가요?","sub":"손으로 짚어보세요.","choices":[{"id":"c1","text":"발목 앞쪽 (구부릴 때 막히는 느낌)","next":"test:test-ankle-df"},{"id":"c2","text":"발목 바깥쪽 또는 복숭아뼈 주변","next":"cause:cause-b"},{"id":"c3","text":"발뒤꿈치 위 또는 종아리 아래","next":"cause:cause-c"}]}],"tests":[{"id":"test-ankle-df","name":"발목 배측굴곡 테스트","purpose":"발목이 충분히 구부러지는지 확인합니다. 제한이 있으면 런지 시 뒤꿈치가 들리거나 발목 앞쪽이 막히는 통증이 생깁니다.","steps":["벽 앞에 서서 발끝을 벽에서 약 5cm 떨어뜨리세요","발뒤꿈치를 바닥에 붙인 채로","무릎을 벽 쪽으로 밀어보세요 (새끼발가락 방향으로)"],"note":"신발 신고 해도 됩니다. 통증 있는 쪽 발로 하세요.","pass_text":"무릎이 벽에 닿아요","fail_text":"뒤꿈치가 들리거나 닿지 않아요","pass_next":"cause:cause-a-mild","fail_next":"cause:cause-a"}],"causes":[{"id":"cause-a","label":"원인 A","tag":"가동성 부족","name":"발목 배측굴곡 제한","description":"발목이 충분히 구부러지지 않으면 런지 하강 시 뒤꿈치가 들리거나 발목 앞쪽 관절이 막히는 느낌의 통증이 생깁니다. 관절 공간이 좁아진 것이 원인이며, 발목 가동성 운동으로 해결할 수 있습니다.","priority_note":"가동성 제한은 근력 운동보다 먼저 해결합니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"월 앵클 모빌리티","why":"발목 앞쪽 관절 공간을 직접 늘려줍니다. 런지에서 뒤꿈치가 바닥에 붙은 채로 내려갈 수 있게 됩니다.","sets":"양측 각 10회 · 3세트","cue":"뒤꿈치를 바닥에 고정한 채 무릎이 새끼발가락 방향으로 나가게 합니다.","how":["벽 앞에 서서 발끝을 벽에서 5cm 떨어뜨리세요","발뒤꿈치를 바닥에 붙인 채 무릎을 벽 쪽으로 밀어보세요","무릎이 닿으면 발을 1cm 더 뒤로 물리고 반복합니다","양발 각각 10~15회씩"]},{"name":"밴드 발목 견인 스트레칭","why":"밴드가 발목뼈(거골)를 뒤쪽으로 당겨 관절 안쪽 활주를 회복시킵니다.","sets":"양측 각 30초 유지 · 3세트","cue":"밴드를 발목 바로 위에 걸고, 발목을 부드럽게 앞뒤로 펌핑합니다.","how":["저항 밴드를 복숭아뼈 바로 위에 걸고 반대쪽에 고정하세요","밴드가 팽팽하게 당겨지는 방향으로 한 발을 앞으로 내딛으세요","발뒤꿈치를 바닥에 유지하며 무릎을 앞으로 밀어 발목을 굽히세요","30초 유지 후 발목을 앞뒤로 10회 펌핑합니다"]},{"name":"힐 엘리베이티드 런지","why":"발뒤꿈치를 살짝 높여 가동 범위 제한을 보상하며 올바른 런지 패턴을 연습합니다.","sets":"좌우 각 10회 · 3세트","cue":"발뒤꿈치 높이를 점점 낮춰가며 발목 가동성 개선을 확인합니다.","how":["앞발 뒤꿈치 아래에 원판(1~2cm)을 깔고 서세요","런지 하강 시 발목 앞쪽 통증 여부를 확인하세요","통증 없이 10회 완료 시 원판 높이를 낮추세요","좌우 각 10회 · 3세트"]},{"name":"PVC 잡고 런지 (발목 감각 집중)","why":"균형 보조를 받으며 발뒤꿈치가 바닥에 유지되는 런지 패턴을 각인합니다.","sets":"좌우 각 10회 · 3세트","cue":"하강 내내 뒤꿈치가 바닥에서 떨어지지 않도록 합니다.","how":["PVC를 앞에 세우고 잡은 채 런지 하강하세요","발목 앞쪽 통증 없이 내려가는 깊이를 찾으세요","좌우 각 10회"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"스텝 짧게 시작","body":"발목 배측굴곡 제한이 있으면 스텝을 짧게 유지하세요. 스텝이 길수록 발목 굴곡 요구가 높아집니다."},{"title":"뒤꿈치 올리기 보조","body":"앞발 뒤꿈치 아래 원판을 두면 발목 굴곡 요구가 줄어 통증 없이 런지를 수행할 수 있습니다. 가동성이 늘면 원판을 제거하세요."},{"title":"이 신호 오면 멈추세요","body":"런지 중 앞발 뒤꿈치가 뜨거나 발목 앞쪽에 찝히는 느낌이 오면 즉시 세트를 종료하세요."},{"title":"재발 방지 핵심","body":"발목 가동성 운동을 꾸준히 유지하면서 볼륨을 늘리세요. 가동성이 해결되지 않은 채 볼륨만 올리면 무릎 통증으로 이어집니다."}]}]}},{"id":"cause-a-mild","label":"원인 A (경미)","tag":"가동성 부족","name":"발목 배측굴곡 경미한 제한","description":"테스트는 통과했지만 런지 깊이가 깊어지거나 볼륨이 늘면 발목 앞쪽이 막히는 느낌이 납니다. 가동성이 경계선에 있는 경우로, 모빌리티 운동으로 여유를 확보하면 됩니다.","priority_note":"훈련 전 발목 모빌리티 워밍업을 습관화하세요.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"월 앵클 모빌리티","why":"경미한 제한도 꾸준히 해소하면 런지 깊이가 깊어져도 통증이 사라집니다.","sets":"양측 각 10회 · 2세트","cue":"매 훈련 전 워밍업으로 수행하세요.","how":["벽 앞에 서서 발끝을 5cm 떨어뜨리세요","뒤꿈치를 바닥에 붙인 채 무릎을 벽 쪽으로 밀어보세요","양발 각각 10회"]},{"name":"맨몸 런지 (발목 집중)","why":"가벼운 제한은 정상적인 런지 범위에서 통증 없이 수행 가능합니다.","sets":"좌우 각 12회 · 3세트","cue":"뒤꿈치가 들리지 않는 범위에서 최대한 깊이 내려갑니다.","how":["맨몸 런지를 수행하며 발목 통증 여부를 확인하세요","통증 없으면 세트를 늘리세요"]},{"name":"덤벨 런지 (경부하)","why":"모빌리티 워밍업 후 부하를 추가해 통증 여부를 확인합니다.","sets":"좌우 각 10회 · 3세트","cue":"훈련 전 월 앵클 모빌리티를 항상 먼저 수행하세요.","how":["덤벨(각 4~8kg)로 런지를 수행하세요","발목 통증 없이 완료 시 무게를 올리세요"]}],"duration":"1주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"스텝 길이 점진적 증가","body":"경미한 발목 제한은 스텝 길이를 주마다 조금씩 늘리는 방식으로 해결됩니다. 첫 주는 어깨너비 스텝에서 시작하세요."},{"title":"발목 모빌리티 워밍업","body":"월 앵클 모빌리티 10~15회를 런지 전 루틴에 넣으세요. 경미한 제한은 꾸준한 준비로 충분히 관리됩니다."},{"title":"이 신호 오면 멈추세요","body":"발목 앞쪽에 불편함이 오면 그날은 스텝 길이를 줄이세요. 무리하게 가동성을 늘리려 하면 전방 충돌 증후군으로 악화될 수 있습니다."},{"title":"재발 방지 핵심","body":"발목 가동성은 점진적으로 개선됩니다. 월 앵클 모빌리티를 매일 꾸준히 하고, 결과는 2~4주 후에 확인하세요."}]}]}},{"id":"cause-b","label":"원인 B","tag":"불안정성","name":"발목 외측 인대 불안정성","description":"런지 착지나 방향 전환 시 발목이 바깥쪽으로 꺾이는 경향이 있으면, 이전에 접질린 경험이 있거나 발목 외측 인대가 약한 것입니다. 고유수용감각(균형 감각)과 발목 주변 근력을 강화해야 재부상을 막을 수 있습니다.","priority_note":"균형 훈련이 먼저, 런지 복귀는 그 다음입니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"타월 위 한 발 서기","why":"불안정한 표면 위에서 균형을 잡으며 발목 주변 고유수용감각을 회복합니다. 접질린 후 가장 먼저 해야 하는 훈련입니다.","sets":"좌우 각 30초 · 3세트","cue":"발목이 흔들리는 것을 허용하되 쓰러지지 않으려는 근육의 반응에 집중합니다.","how":["접힌 타월이나 밸런스 패드 위에 한 발로 서세요","30초 유지 · 3세트","익숙해지면 눈을 감거나 팔을 움직여 난이도를 높이세요"]},{"name":"발목 저항 밴드 운동 (4방향)","why":"발목 외측 인대 주변 근육(비골근 등)을 강화합니다. 4방향 저항 운동이 가장 효율적입니다.","sets":"각 방향 15회 · 2세트","cue":"발목만 움직이고 무릎과 다리는 고정합니다.","how":["의자에 앉아 저항 밴드를 발목에 걸고 반대쪽에 고정하세요","발끝을 위(배측굴곡)·아래(저측굴곡)·안쪽·바깥쪽 순으로 움직이세요","각 방향 15회 · 2세트"]},{"name":"한 발 서기 → 스쿼트","why":"한 발 균형이 잡히면 굴곡 동작을 추가합니다. 런지의 한 발 착지 패턴과 직접 연결됩니다.","sets":"좌우 각 10회 · 3세트","cue":"발목이 바깥으로 발끝 방향으로 유지하며 엄지발가락에 힘을 줍니다.","how":["한 발로 서서 반대발을 살짝 들으세요","천천히 15~20도만 무릎을 구부렸다가 올라오세요","발목이 안정적이면 깊이를 조금씩 늘리세요","좌우 각 10회 · 3세트"]},{"name":"벽 잡고 런지 (발목 안정 집중)","why":"균형 보조를 받으며 런지 착지 시 발목이 안정적으로 유지되는지 확인합니다.","sets":"좌우 각 10회 · 3세트","cue":"착지할 때 발목이 바깥으로 발끝 방향으로 유지하며 엄지발가락으로 바닥을 잡는 느낌을 유지합니다.","how":["벽 옆에서 한 손으로 가볍게 짚고 런지를 수행하세요","착지 순간 발목 안정성을 확인하세요","좌우 각 10회"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"착지 패턴 체크","body":"런지 스텝 착지 시 발목이 안으로 꺾이지 않는지 확인하세요. 외측 인대 불안정성은 착지 패턴에서 가장 많이 드러납니다."},{"title":"보조기·테이핑 활용","body":"재활 초기 런지 시 발목 테이핑이나 보조기를 착용하세요. 외측 지지가 보완되면 불안정성으로 인한 보상 패턴이 줄어듭니다."},{"title":"이 신호 오면 멈추세요","body":"런지 착지 시 발목이 흔들리거나 접질릴 것 같은 느낌이 오면 즉시 세트를 종료하세요. 반복 접질림이 만성화됩니다."},{"title":"재발 방지 핵심","body":"한 발 서기 밸런스 훈련을 매일 유지하세요. 외측 인대 안정성은 꾸준한 균형 훈련으로만 회복됩니다."}]}]}},{"id":"cause-c","label":"원인 C","tag":"과부하","name":"아킬레스건 과부하","description":"런지 시 발 떼는 순간 또는 뒤꿈치 위쪽 종아리 아래가 아프다면 아킬레스건에 과부하가 걸린 것입니다. 갑자기 런지 볼륨이나 보폭이 늘어났거나 쿠션이 적은 신발로 바꾼 것이 원인인 경우가 많습니다.","priority_note":"이완과 편심성(내려가는) 강화를 병행합니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"종아리 폼롤러 이완","why":"종아리 근육(비복근·가자미근) 긴장이 아킬레스건을 당깁니다. 이완하면 건에 가해지는 장력이 줄어듭니다.","sets":"좌우 각 60초 · 2세트","cue":"가장 아픈 지점에서 멈추고 발목을 앞뒤로 펌핑하세요.","how":["폼롤러를 종아리 아래에 대고 손으로 몸을 지지하세요","발목부터 무릎 아래까지 천천히 굴리세요","가장 아픈 지점에서 30초 강도를 낮춰주세요","좌우 각 60초"]},{"name":"종아리 스트레칭 (벽)","why":"아킬레스건 유연성을 직접 늘려줍니다. 무릎 편 상태(비복근)와 굽힌 상태(가자미근)를 모두 스트레칭합니다.","sets":"각 자세 30초 · 좌우 · 2세트","cue":"당기는 느낌이지 통증이 아니어야 합니다.","how":["벽에 양손을 짚고 한 발을 뒤로 빼세요","뒤쪽 무릎을 편 채 발뒤꿈치를 바닥에 붙여 30초 (비복근)","같은 자세에서 뒤쪽 무릎을 살짝 구부려 30초 (가자미근)","좌우 각 2세트"]},{"name":"편심성 힐 드롭 (Eccentric Heel Drop)","why":"아킬레스건 재활의 핵심 운동입니다. 내려오는 동작(편심성)에서 건을 강화해 과부하를 견딜 수 있게 합니다.","sets":"15회 · 3세트 (양발 → 단발 순)","cue":"올라갈 때는 양발, 내려올 때는 아픈 발 하나로만 천천히 내려옵니다.","how":["계단 끝이나 박스 끝에 발끝만 걸치고 서세요","양발로 발끝을 들어 올리세요","아픈 발 하나로만 3~4초에 걸쳐 천천히 내려오세요","15회 · 3세트, 통증 3/10 이하에서 수행"]},{"name":"맨몸 런지 (보폭 줄임)","why":"보폭을 줄이면 아킬레스건 신장 범위가 줄어 부하가 감소합니다. 통증 없는 범위에서 패턴을 유지합니다.","sets":"좌우 각 10회 · 3세트","cue":"통증 2/10 이하에서만 진행합니다. 통증이 있으면 보폭을 더 줄이세요.","how":["평소보다 보폭을 30~40% 줄여서 런지를 수행하세요","통증 없으면 매 세션 보폭을 조금씩 늘리세요","좌우 각 10회 · 3세트"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"아킬레스건 준비 루틴","body":"런지 전 종아리 이완(폼롤러 2분)과 아킬레스 스트레칭 30초를 넣으세요. 건병증은 경직된 상태에서 바로 부하를 주면 악화됩니다."},{"title":"달리기 런지 조합 금지","body":"런닝이 포함된 WOD 날에는 런지 볼륨을 최소화하세요. 아킬레스건에 달리기와 런지 자극이 겹치면 회복이 크게 지연됩니다."},{"title":"이 신호 오면 멈추세요","body":"뒤꿈치 위쪽이 뻣뻣하거나 아킬레스 부위에 압통이 오면 그날 런지를 취소하세요. 건병증 급성기에 강행하면 파열 위험이 있습니다."},{"title":"재발 방지 핵심","body":"아킬레스건은 회복이 매우 느린 조직입니다. 통증이 사라진 후에도 4주는 볼륨 증가를 제한하세요."}]}]}}],"danger":{"title":"지금 바로 운동을 멈추세요","reason":"안정 시에도 발목 통증이 지속되면 인대 파열·연골 손상이 의심됩니다. 자가 재활을 진행하면 증상이 악화될 수 있습니다.","action":"정형외과 또는 스포츠의학과 진료를 권장합니다. 부상 상황(동작·소리·붓기 여부)을 기록해 방문하면 진단에 도움이 됩니다."}},{"id":"hip","name":"고관절","coming_soon":false,"entry_question":"q1","questions":[{"id":"q1","text":"통증 위치가 어디인가요?","sub":"손으로 짚어보세요. 사타구니·앞쪽·바깥쪽 중 어느 쪽인지 확인합니다.","choices":[{"id":"c1","text":"사타구니 안쪽 (구부릴 때 찝힘)","next":"cause:cause-a"},{"id":"c2","text":"고관절 앞쪽 (허벅지 위 당김)","next":"cause:cause-b"},{"id":"c3","text":"엉덩이 바깥쪽 또는 뒤쪽","next":"cause:cause-c"},{"id":"c4","text":"쉬는 중에도 욱신거린다","next":"danger"}]}],"tests":[],"danger":{"title":"지금 바로 운동을 멈추세요","reason":"안정 시에도 사타구니·고관절 통증이 지속되거나 다리로 저림이 있으면 관절 손상·탈구 등 구조적 문제가 의심됩니다.","action":"정형외과 또는 스포츠의학과 진료를 권장합니다. 통증 위치와 발생 동작을 기록해 방문하세요."},"causes":[{"id":"cause-a","label":"원인 A","tag":"가동성 부족","name":"고관절 임핀지먼트 (FAI) — 사타구니 찝힘","description":"고관절을 깊이 구부릴 때 대퇴골두와 비구 테두리가 충돌하면서 사타구니 안쪽이 찝힙니다. 고관절 굴곡 가동성과 내회전 가동성을 확보하면 충돌 없이 동작이 가능해집니다.","priority_note":"고관절 가동성 확보가 먼저, 부하는 그 다음입니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"90/90 힙 스트레칭","why":"고관절 내회전·외회전 가동성을 동시에 풀어줍니다. 임핀지먼트는 내회전이 제한될 때 더 심해집니다.","sets":"좌우 각 60초 · 3세트","cue":"억지로 누르지 말고 중력에 맡겨 천천히 이완합니다.","how":["바닥에 앉아 앞 다리와 뒤 다리를 각각 90도로 구부리세요","상체를 앞 다리 정강이 쪽으로 부드럽게 숙이세요","60초 유지 후 반대쪽"]},{"name":"피겨4 스트레칭","why":"이상근과 고관절 외회전근을 이완해 고관절 안쪽 공간을 확보합니다.","sets":"좌우 각 60초 · 2세트","cue":"엉덩이 바깥쪽이 당기는 느낌이 나야 합니다.","how":["바닥에 누워 한쪽 발목을 반대쪽 무릎 위에 올리세요","세운 무릎을 가슴 쪽으로 당기면 엉덩이 바깥쪽이 당깁니다","60초 유지 후 반대쪽"]},{"name":"개구리 자세 (Frog Stretch)","why":"고관절 내회전·굴곡 가동성을 동시에 개선합니다. 임핀지먼트가 있는 각도를 통증 없는 범위에서 점진적으로 열어줍니다.","sets":"30~60초 유지 · 3세트","cue":"엉덩이를 뒤로 빼며 허벅지 안쪽이 당기는 느낌을 찾으세요.","how":["네 발 자세에서 무릎을 양옆으로 최대한 벌리세요","엉덩이를 천천히 뒤로 빼며 고관절이 열리는 느낌을 찾으세요","30~60초 유지 · 3세트"]},{"name":"클램쉘 + 사이드라잉 힙 어브덕션","why":"고관절 외전근을 강화하면 임핀지먼트 없이 안정적으로 고관절을 사용할 수 있습니다.","sets":"좌우 각 15회 · 3세트","cue":"발뒤꿈치를 붙인 채 위 무릎만 벌립니다.","how":["클램쉘 15회 → 사이드라잉 어브덕션 15회 순으로","좌우 각 3세트"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"스탠스 조정으로 찝힘 회피","body":"런지 스텝 폭을 조금 넓히고 발끝을 바깥으로 돌리면 고관절 굴곡 깊이가 줄어 임핀지먼트가 감소합니다."},{"title":"깊이 제한","body":"뒷무릎이 바닥에 닿기 전 사타구니에 찝힘이 오는 지점을 파악해 그 이상 내려가지 마세요."},{"title":"이 신호 오면 멈추세요","body":"사타구니 안쪽에 찌릿함이나 '걸리는' 느낌이 오면 즉시 세트를 종료하세요. 임핀지먼트 자체가 연골 마모의 원인이 됩니다."},{"title":"재발 방지 핵심","body":"고관절 임핀지먼트는 스쿼트·클린 등 다른 동작에도 영향을 줍니다. 찝히는 동작 패턴을 모두 파악해 공통 회피 전략을 세우세요."}]}]}},{"id":"cause-b","label":"원인 B","tag":"과긴장","name":"고관절 굴곡근 긴장 (앞쪽 통증)","description":"장요근·대퇴직근이 과도하게 긴장되면 동작 중 고관절 앞쪽이 당기거나 쑤십니다. 오래 앉아있거나 훈련 볼륨이 급격히 늘었을 때 흔합니다. 이완과 함께 고관절 신전 근력을 키워야 재발을 막을 수 있습니다.","priority_note":"이완 먼저, 고관절 신전 강화는 그 다음입니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"로우 런지 스트레칭 (Couch Stretch)","why":"장요근을 직접 이완합니다. 동작 중 고관절 앞쪽 통증의 가장 직접적인 원인 근육입니다.","sets":"좌우 각 60초 · 3세트","cue":"골반을 앞으로 밀면서 허리는 곧게 유지합니다.","how":["한 발을 앞에, 반대 무릎을 바닥에 놓는 런지 자세를 취하세요","뒷발 쪽 엉덩이를 앞으로 밀면서 고관절 앞쪽이 당기는 느낌을 찾으세요","60초 유지 후 반대쪽"]},{"name":"폼롤러 고관절 굴곡근 이완","why":"대퇴직근과 장요근 근막을 직접 이완합니다.","sets":"좌우 각 60초 · 2세트","cue":"가장 아픈 지점에서 멈추고 숨을 내쉬며 이완하세요.","how":["엎드려 폼롤러를 허벅지 앞쪽(사타구니 아래)에 대세요","천천히 굴리며 가장 아픈 지점에서 30초 강도를 낮춰주세요","좌우 각 60초"]},{"name":"글루트 브릿지","why":"대둔근을 강화하면 고관절 신전력이 생겨 굴곡근의 과부하를 줄입니다.","sets":"15회 · 3세트","cue":"최고점에서 엉덩이를 2초 쥐어짜세요.","how":["바닥에 누워 무릎을 세우세요","엉덩이를 들어 무릎·골반·어깨가 일직선이 되게 하세요","2초 유지 후 천천히 내립니다 · 15회 · 3세트"]},{"name":"맨몸 동작 (이완 후)","why":"이완 후 실제 동작에서 고관절 앞쪽 통증이 줄었는지 확인합니다.","sets":"10회 · 3세트","cue":"동작 전 코치 스트레칭을 항상 수행하세요.","how":["이완 직후 맨몸 동작을 수행하며 통증 여부를 확인하세요","통증 없으면 세트를 늘리세요"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"런지 전 굴곡근 이완","body":"피전 스트레칭 60초 + 힙 플렉서 스트레칭 30초를 런지 전에 넣으세요. 굴곡근이 단축된 채 런지를 하면 앞쪽 통증이 반복됩니다."},{"title":"스텝 길이 조정","body":"스텝이 너무 길면 뒷발 고관절 굴곡근이 더 늘어나 통증이 심해집니다. 통증이 없는 스텝 길이를 먼저 찾으세요."},{"title":"이 신호 오면 멈추세요","body":"런지 하강 시 뒷발 사타구니 앞쪽이 당기거나 찌릿하면 즉시 세트를 종료하세요."},{"title":"재발 방지 핵심","body":"장시간 앉기 후에는 반드시 굴곡근 이완을 먼저 하고 런지를 시작하세요. 앉아있는 시간이 길수록 굴곡근 단축이 빠르게 옵니다."}]}]}},{"id":"cause-c","label":"원인 C","tag":"근력 부족","name":"중둔근·이상근 긴장 (바깥쪽·엉덩이 통증)","description":"중둔근이 약하거나 이상근이 긴장되면 고관절 바깥쪽 또는 엉덩이에 통증이 생깁니다. 특히 한 발에 체중이 실릴 때 심해집니다. 이완과 함께 중둔근을 강화해야 합니다.","priority_note":"이완 먼저, 중둔근 강화는 그 다음입니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"피겨4 스트레칭","why":"이상근과 고관절 외회전근을 이완합니다.","sets":"좌우 각 60초 · 3세트","cue":"엉덩이 바깥쪽이 당기는 느낌이 나야 합니다.","how":["바닥에 누워 한쪽 발목을 반대쪽 무릎 위에 올리세요","세운 무릎을 가슴 쪽으로 당기면 엉덩이 바깥쪽이 당깁니다","60초 유지 후 반대쪽"]},{"name":"폼롤러 중둔근·이상근 이완","why":"엉덩이 측면·뒤쪽 근막 긴장을 직접 풀어줍니다.","sets":"좌우 각 60초 · 2세트","cue":"가장 아픈 지점에서 멈추고 발목을 교차해 압박을 높이세요.","how":["바닥에 앉아 폼롤러를 한쪽 엉덩이 아래에 대세요","아픈 쪽 발을 반대쪽 무릎 위에 올려 압박을 높이세요","60초 굴리며 아픈 지점에서 30초 강도를 낮춰주세요"]},{"name":"클램쉘","why":"중둔근을 무릎·허리 부하 없이 직접 자극합니다.","sets":"좌우 각 15회 · 3세트","cue":"발뒤꿈치끼리 붙인 채 위쪽 무릎만 벌립니다.","how":["옆으로 누워 무릎을 45도 구부리세요","발뒤꿈치를 붙인 채 위쪽 무릎을 천장 방향으로 벌리세요","15회 후 반대쪽 · 3세트"]},{"name":"밴드 사이드 워크","why":"서서 이동하며 중둔근을 기능적으로 강화합니다.","sets":"좌우 각 15보 · 3세트","cue":"무릎이 발끝 방향을 유지하고 상체는 안정적으로 유지하며 합니다.","how":["저항 밴드를 무릎 바로 위에 걸고 어깨너비로 서세요","살짝 스쿼트 자세를 유지하며 옆으로 15보 이동하세요","반대 방향도 15보"]},{"name":"맨몸 동작 (이완 후)","why":"이완과 활성화 후 실제 동작에서 엉덩이 통증이 줄었는지 확인합니다.","sets":"10회 · 3세트","cue":"동작 전 피겨4 스트레칭을 항상 수행하세요.","how":["이완 직후 맨몸 동작을 수행하며 통증 여부를 확인하세요"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"중둔근·이상근 이완 루틴","body":"폼롤러 엉덩이 이완 + 피전 스트레칭 60초를 런지 전에 넣으세요. 이 근육들이 경직되면 런지 중 엉덩이 바깥쪽 통증이 생깁니다."},{"title":"런지 스텝 너비 조정","body":"스탠스가 너무 좁으면 중둔근 긴장이 심해집니다. 스텝을 조금 넓히면 중둔근 부하가 줄어드는 경우가 많습니다."},{"title":"이 신호 오면 멈추세요","body":"엉덩이 바깥쪽이나 이상근 부위에 타는 느낌이 오면 세트를 종료하세요. 긴장된 근육에 반복 자극은 만성 통증을 만듭니다."},{"title":"재발 방지 핵심","body":"런닝·사이클링과 런지를 같은 날 겹치면 중둔근 피로가 빠르게 쌓입니다. 엉덩이 중점 WOD 다음 날은 런지를 쉬세요."}]}]}}]}]},"deadlift":{"id":"deadlift","name":"데드리프트","pain_sites":[{"id":"knee","name":"무릎","entry_question":"q1","questions":[{"id":"q1","text":"통증이 언제 느껴지나요?","sub":null,"choices":[{"id":"c1","text":"바닥에서 바를 들어 올릴 때","next":"q:q2"},{"id":"c2","text":"바가 무릎을 지나갈 때","next":"q:q2"},{"id":"c3","text":"쉬는 중에도 욱신거린다","next":"danger"}]},{"id":"q2","text":"무릎 어느 쪽이 아픈가요?","sub":"손으로 짚어보면 더 정확합니다.","choices":[{"id":"c1","text":"앞쪽 (슬개골 주변)","next":"test:test-valgus"},{"id":"c2","text":"바깥쪽","next":"cause:cause-c"}]}],"tests":[{"id":"test-valgus","name":"데드리프트 셋업 무릎 정렬 테스트","purpose":"셋업 자세에서 무릎이 안쪽으로 쏠리는지 확인합니다. 고관절 외전근 힘을 반영합니다.","steps":["바 없이 데드리프트 셋업 자세(엉덩이 내리고 바 잡는 위치)를 취하세요","거울이나 핸드폰으로 정면을 촬영하세요","무릎이 발끝 방향을 유지하는지 확인하세요"],"note":"수모 스탠스도 동일하게 테스트하세요.","pass_text":"무릎이 발끝 방향 유지","fail_text":"무릎이 안쪽으로 쏠림","pass_next":"cause:cause-a","fail_next":"cause:cause-b"}],"danger":{"title":"지금 바로 운동을 멈추세요","reason":"안정 시에도 통증이 지속되면 연골·인대 손상이 의심됩니다. 자가 재활을 진행하면 증상이 악화될 수 있습니다.","action":"정형외과 또는 스포츠의학과 진료를 권장합니다. 증상 발생 상황(동작·무게·빈도)을 기록해 방문하면 진단에 도움이 됩니다."},"causes":[{"id":"cause-a","label":"원인 A","tag":"과부하","name":"슬개대퇴 압박 과부하","description":"데드리프트 셋업 시 무릎이 굽혀진 상태에서 무거운 무게를 밀어 올리면 슬개골 아래에 압박이 집중됩니다. 대퇴사두근이 이 부하를 감당하기에 아직 충분히 강하지 않거나, 갑자기 무게나 볼륨이 늘어난 것이 원인입니다. 루마니안 데드리프트(RDL)로 무릎 굴곡 부하를 줄이며 근력을 먼저 쌓아야 합니다.","priority_note":"RDL → 박스 데드리프트 → 풀 데드리프트 순으로 점진적으로 복귀합니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"쿼드 세팅","why":"무릎에 부하 없이 대퇴사두근만 수축시킵니다. 통증이 심한 초기에 근육이 꺼지는 것을 막아줍니다.","sets":"10초 유지 · 15회 · 3세트","cue":"뒤꿈치를 바닥에 대고 무릎 아래 근육이 단단해지는 느낌에 집중합니다.","how":["바닥에 다리를 곧게 뻗고 앉으세요","허벅지 앞 근육을 조이며 무릎을 바닥 쪽으로 누르세요","10초 유지 후 이완","15회 · 3세트"]},{"name":"스트레이트 레그 레이즈","why":"무릎을 구부리지 않고 대퇴사두근을 강화합니다. 슬개골 압박 없이 근력을 키울 수 있는 가장 안전한 초기 운동입니다.","sets":"15회 · 3세트","cue":"허벅지가 단단히 수축된 상태에서 다리를 들어야 슬개골 보호 효과가 있습니다.","how":["바닥에 누워 한쪽 무릎은 세우고 반대쪽은 곧게 뻗으세요","허벅지 앞을 수축한 채 뻗은 다리를 45도까지 들어 올리세요","2초 유지 후 천천히 내립니다","15회 · 3세트, 반대쪽도 동일"]},{"name":"루마니안 데드리프트 (맨몸 힙 힌지)","why":"RDL은 무릎을 거의 구부리지 않고 힙 힌지 패턴만 사용합니다. 슬개대퇴 압박 없이 데드리프트 동작 패턴을 유지할 수 있습니다.","sets":"10회 · 3세트","cue":"무릎은 살짝만 구부리고 엉덩이를 뒤로 빼며 상체를 앞으로 숙입니다.","how":["발을 엉덩이 너비로 서고 손을 허벅지 앞에 놓으세요","무릎을 10~15도만 살짝 구부린 채 엉덩이를 뒤로 빼세요","상체가 바닥과 45도 될 때까지 천천히 숙이세요","햄스트링이 당기는 느낌이 나면 멈추고 엉덩이를 밀어 올라오세요","10회 · 3세트"]},{"name":"박스 데드리프트 (PVC 또는 빈 바)","why":"바를 바닥이 아닌 무릎 높이 박스에서 시작하면 셋업 시 무릎 굴곡 각도가 줄어 슬개대퇴 압박이 크게 감소합니다.","sets":"8회 · 3세트","cue":"박스 높이는 무릎 통증이 없는 범위로 조절합니다. 처음엔 높게, 점점 낮춰가세요.","how":["바를 무릎 높이 박스(또는 원판 스택) 위에 놓으세요","평소 데드리프트 셋업 자세를 취하되 무릎 굴곡이 더 적습니다","통증 없이 당기고 내려놓으세요","8회 · 3세트, 통증 없으면 박스 높이를 1단계 낮추세요"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"슬개골 압박 회피 전략","body":"데드리프트 복귀 초기에는 무릎이 완전히 잠기지 않도록 최상단에서 1~2도 여유를 두세요. 완전 신전 잠금이 슬개대퇴 압박을 높입니다."},{"title":"발 위치 체크","body":"발이 너무 넓거나 발끝이 과도하게 바깥이면 슬개골 추적이 틀어집니다. 어깨너비, 발끝 15도 이내를 기준으로 시작하세요."},{"title":"이 신호 오면 멈추세요","body":"무릎 앞쪽(슬개골 주변)에 갈리는 느낌이나 계단 오를 때 악화되면 데드리프트 볼륨을 즉시 줄이세요."},{"title":"재발 방지 핵심","body":"데드리프트 세션 후 대퇴사두 스트레칭과 폼롤러 이완을 세트처럼 붙이세요. 대퇴사두 경직이 슬개대퇴 압박의 주원인입니다."}]}]}},{"id":"cause-b","label":"원인 B","tag":"근력 부족","name":"고관절 외전근 약화 (무릎 안쪽 쏠림)","description":"데드리프트 셋업 시 중둔근이 충분히 버텨주지 못하면 무릎이 안쪽으로 쏠립니다. 특히 수모 스탠스에서 두드러집니다. 슬개골 안쪽과 내측 인대에 반복적인 스트레스가 쌓이는 것이 통증의 원인입니다. 무릎이 아닌 고관절 외전근을 먼저 강화해야 합니다.","priority_note":"고관절 외전근 강화가 선행되어야 무릎 정렬이 잡힙니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"클램쉘","why":"중둔근을 무릎·허리 부하 없이 직접 자극하는 가장 안전한 시작 운동입니다. 이 근육이 켜져야 데드리프트 셋업에서 무릎이 안 무너집니다.","sets":"좌우 각 15회 · 3세트","cue":"발뒤꿈치끼리 붙인 채 위쪽 무릎만 벌립니다. 골반이 뒤로 구르지 않도록 주의하세요.","how":["옆으로 누워 무릎을 45도 구부리세요","발뒤꿈치를 붙인 채 위쪽 무릎을 천장 방향으로 벌리세요","골반이 뒤로 돌아가지 않도록 복부를 살짝 잡으세요","15회 후 반대쪽"]},{"name":"사이드라잉 힙 어브덕션","why":"중둔근 상부 섬유까지 자극합니다. 클램쉘보다 다리 전체를 들어 더 넓은 범위를 씁니다.","sets":"좌우 각 15회 · 3세트","cue":"발끝이 위를 향한 채 다리를 곧게 들어 올립니다.","how":["옆으로 누워 아래 다리를 살짝 구부려 안정을 잡으세요","위쪽 다리를 곧게 뻗은 채 30~40도까지 들어 올리세요","2초 유지 후 천천히 내립니다","15회 · 3세트, 반대쪽도 동일"]},{"name":"밴드 사이드 워크","why":"서서 이동하며 중둔근을 기능적으로 강화합니다. 데드리프트 셋업 중 무릎 안정에 직접 연결되는 패턴입니다.","sets":"좌우 각 15보 · 3세트","cue":"무릎이 발끝 방향을 유지하고 상체는 안정적으로 유지하며 합니다.","how":["저항 밴드를 무릎 바로 위에 걸고 어깨너비로 서세요","살짝 힙 힌지 자세(엉덩이 약간 뒤로)를 유지하며","옆으로 천천히 15보 이동하세요","반대 방향으로도 15보"]},{"name":"밴드 데드리프트 셋업 드릴","why":"밴드를 무릎에 걸고 셋업하면 바깥으로 미는 힘을 의식하게 되어 중둔근 활성화 패턴을 각인합니다.","sets":"10회 · 3세트","cue":"셋업할 때 무릎을 밴드에 저항하며 바깥으로 밀어내는 느낌을 유지합니다.","how":["저항 밴드를 무릎 위에 걸고 데드리프트 셋업 자세를 취하세요","무릎을 밴드에 저항하며 바깥으로 밀어내세요","이 느낌을 유지한 채 맨몸 힙 힌지(RDL) 10회 수행","10회 · 3세트"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"WOD 전 둔근 활성화","body":"클램쉘 15회 + 밴드 사이드 스텝 20보를 데드리프트 워밍업에 넣으세요. 둔근이 준비되어야 무릎이 안으로 무너지지 않습니다."},{"title":"무릎 방향 모니터링","body":"데드리프트 초동 구간에서 무릎이 발끝 방향으로 밀리는지 확인하세요. 안으로 무너지면 해당 세트는 무게를 내리세요."},{"title":"이 신호 오면 멈추세요","body":"바를 들어올리는 초반에 무릎 안쪽에 통증이 오면 고관절 외전근이 아직 준비되지 않은 것입니다. 빈 바로 돌아가세요."},{"title":"재발 방지 핵심","body":"높은 볼륨 하체 WOD 다음 날 데드리프트를 하면 둔근이 피로해 무릎 보호가 약해집니다. 하체 WOD 후 24시간 이상 간격을 두세요."}]}]}},{"id":"cause-c","label":"원인 C","tag":"과긴장","name":"IT밴드/TFL 긴장 (외측 무릎 통증)","description":"데드리프트의 힙 힌지 패턴은 TFL(대퇴근막장근)을 반복적으로 단축시킵니다. 이 근육이 과긴장되면 IT밴드가 당겨지며 무릎 바깥쪽에 통증이 생깁니다. 이완을 먼저 하고 고관절 외전근을 강화해야 재발을 막을 수 있습니다.","priority_note":"이완이 먼저, 강화는 그 다음입니다.","route":{"stages":[{"id":"stage-1","name":"기초 재활","exercises":[{"name":"폼롤러 IT밴드 이완","why":"IT밴드 주변 근막 긴장을 직접 풀어줍니다. 통증 포인트에서 30초 이상 머물러야 효과가 납니다.","sets":"좌우 각 60~90초 · 2세트","cue":"가장 아픈 지점에서 멈추고 숨을 내쉬며 이완하세요.","how":["옆으로 누워 폼롤러를 허벅지 바깥쪽에 대세요","아래팔로 상체를 지지하며 엉덩이 옆부터 무릎 위까지 천천히 굴리세요","가장 아픈 지점에서 30~40초 강도를 낮춰주세요","좌우 각 60~90초"]},{"name":"TFL 스트레칭 (서서)","why":"TFL이 짧아지면 IT밴드를 위에서 당겨 외측 무릎 통증을 유발합니다. 데드리프트 후 반드시 실시하세요.","sets":"좌우 각 30초 · 3세트","cue":"골반이 앞으로 나오지 않도록 복부를 살짝 잡으세요.","how":["벽 옆에 서서 스트레칭할 다리를 뒤쪽 다리 뒤로 교차시키세요","골반을 벽 쪽으로 살짝 밀면 엉덩이 옆이 당기는 느낌이 납니다","30초 유지 후 반대쪽","훈련 후와 다음날 아침 각 1회씩 하면 효과가 빠릅니다"]},{"name":"90/90 힙 스트레칭","why":"고관절 내회전·외회전 가동성을 동시에 풀어 TFL과 IT밴드를 간접적으로 이완합니다.","sets":"좌우 각 60초 · 2세트","cue":"억지로 누르지 말고 중력에 맡겨 천천히 이완합니다.","how":["바닥에 앉아 앞 다리와 뒤 다리를 각각 90도로 구부리세요","상체를 앞 다리 정강이 쪽으로 부드럽게 숙이세요","60초 유지 후 반대쪽","호흡을 유지하며 억지로 밀지 마세요"]},{"name":"클램쉘 + 힙 어브덕션","why":"IT밴드 긴장의 근본 원인 중 하나는 고관절 외전근 약화입니다. 이완 후 중둔근을 활성화해야 재발을 막습니다.","sets":"좌우 각 15회 · 3세트","cue":"이완 직후 바로 이어서 수행하면 근육이 더 잘 켜집니다.","how":["클램쉘 15회 → 사이드라잉 힙 어브덕션 15회 순으로","폼롤러 이완 직후에 수행하세요","좌우 각 15회 · 3세트"]}],"duration":"1~2주"},{"id":"stage-2","name":"재평가","type":"reassessment","duration":"통과 시 다음 단계로","checklist":["해당 동작을 통증 없이 전 구간 수행할 수 있다","가동 범위가 건측(반대쪽)과 동일하거나 더 나온다","운동 후 24시간 내 통증이 악화되지 않는다"],"pass_note":"3가지 모두 해당되면 다음 단계로 이동하세요.","fail_note":"하나라도 해당 안 되면 1단계를 반복하세요."},{"id":"stage-3","name":"운동 복귀","type":"tips","duration":"꾸준히 유지","tips":[{"title":"IT밴드 이완 루틴","body":"데드리프트 전 폼롤러로 IT밴드·TFL 2분 이완을 넣으세요. 외측 무릎 통증은 IT밴드 긴장 해소가 가장 먼저입니다."},{"title":"엉덩이 스트레칭 추가","body":"피전 스트레칭 60초를 워밍업에 삽입하세요. TFL 단축은 고관절 내회전 시 IT밴드를 더 긴장시킵니다."},{"title":"이 신호 오면 멈추세요"
