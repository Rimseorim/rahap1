<script>
/* ── 진행 저장 ── */
function saveProgress() {
  if (S.screen !== 'home') localStorage.setItem('rehab_progress', JSON.stringify(S));
}
function loadProgress() {
  try { const s = localStorage.getItem('rehab_progress'); return s ? JSON.parse(s) : null; }
  catch(e) { return null; }
}
async function resumeProgress() {
  const saved = loadProgress();
  if (!saved) return;
  if (saved.movementId && !DATA) {
    DATA = BUNDLED[saved.movementId];
  }
  Object.assign(S, saved);
  render();
}

/* ── 상태 ── */
const S = {
  screen: 'home',
  painSiteId: null,
  painIntensity: null,
  movementId: null,
  questionId: null,
  testId: null,
  causeId: null,
  stageIndex: 0,
  checkedItems: [],
  questionDepth: 0,
  isRedFlagDanger: false,
};

/* ── 사용자 ── */
let USER = JSON.parse(localStorage.getItem('rehab_user') || 'null');

function saveUser(u) { USER = u; localStorage.setItem('rehab_user', JSON.stringify(u)); }
function clearUser() { USER = null; localStorage.removeItem('rehab_user'); }

const API = 'https://web-production-28002.up.railway.app';

/* ── 비밀번호 토글 ── */
function togglePwd(id) {
  const inp = document.getElementById(id);
  const btn = inp.parentElement.querySelector('.pwd-toggle i');
  if (inp.type === 'password') {
    inp.type = 'text';
    btn.className = 'ti ti-eye-off';
  } else {
    inp.type = 'password';
    btn.className = 'ti ti-eye';
  }
}

/* ── 화면 꺼짐 방지 ── */
let _wakeLock = null;
async function acquireWakeLock() {
  if (!('wakeLock' in navigator) || _wakeLock) return;
  try { _wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
}
function releaseWakeLock() {
  if (_wakeLock) { _wakeLock.release(); _wakeLock = null; }
}

let _toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

async function apiPost(path, body) {
  const res = await fetch(API + path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if (!res.ok) throw new Error('이메일 또는 비밀번호가 올바르지 않습니다.');
  return data;
}

const DEMO_ACCOUNTS = [
  { email: 'kim@rehab.com',  password: '1234', nickname: '김크파' },
  { email: 'lee@rehab.com',  password: '1234', nickname: '이바벨' },
  { email: 'park@rehab.com', password: '1234', nickname: '박무산' },
  { email: 'choi@rehab.com', password: '1234', nickname: '최올림' },
  { email: 'jung@rehab.com', password: '1234', nickname: '정케틀' },
];

async function doLogin(e) {
  e.preventDefault();
  const email = document.getElementById('inp-email').value;
  const password = document.getElementById('inp-password').value;
  const errEl = document.getElementById('auth-error');

  // 데모 계정 먼저 체크 (백엔드 없이도 작동)
  const demo = DEMO_ACCOUNTS.find(a => a.email === email && a.password === password);
  if (demo) {
    saveUser({ token: 'demo', nickname: demo.nickname });
    go('home');
    return;
  }

  const btn = e.submitter;
  btn.disabled = true; btn.textContent = '로그인 중...';
  try {
    const data = await apiPost('/auth/login', { email, password });
    saveUser(data);
    go('home');
  } catch(err) {
    errEl.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.';
    showToast('로그인에 실패했습니다.');
  } finally {
    btn.disabled = false; btn.textContent = '로그인';
  }
}

async function doSignup(e) {
  e.preventDefault();
  const email = document.getElementById('inp-email').value;
  const password = document.getElementById('inp-password').value;
  const nickname = document.getElementById('inp-nickname').value;
  const errEl = document.getElementById('auth-error');
  const btn = e.submitter;
  btn.disabled = true; btn.textContent = '가입 중...';
  try {
    const data = await apiPost('/auth/signup', { email, password, nickname });
    saveUser(data);
    go('home');
  } catch(err) {
    errEl.textContent = err.message;
    showToast('회원가입에 실패했습니다.');
  } finally {
    btn.disabled = false; btn.textContent = '가입하기';
  }
}

function logout() { clearUser(); render(); }
function naverLogin() { window.location.href = `${API}/auth/naver/login`; }
function kakaoLogin() { showToast('카카오 로그인 준비 중입니다.'); }
function googleLogin() { showToast('구글 로그인 준비 중입니다.'); }

let MY_RECORDS = null;

async function resumeRecord(movementId, painSiteId, causeId, stageIndex) {
  try {
    DATA = BUNDLED[movementId];
    S.movementId  = movementId;
    S.painSiteId  = painSiteId;
    S.causeId     = causeId;
    S.stageIndex  = stageIndex;
    go('route');
  } catch(e) { showToast('데이터를 불러오지 못했습니다. 잠시 후 다시 시도해주세요.'); }
}

async function deleteRecord(id) {
  if (!confirm('기록을 삭제할까요?')) return;
  await apiPost('/records/delete', { token: USER.token, record_id: id });
  try {
    const records = await fetch(`${API}/records/mine?token=${USER.token}`).then(r => r.json());
    LAST_RECORD = records.length ? records[records.length - 1] : null;
  } catch(e) { LAST_RECORD = null; }
  goMyRecords();
}

async function goMyRecords() {
  if (USER && USER.token !== 'demo') {
    try {
      const res = await fetch(`${API}/records/mine?token=${USER.token}`);
      const data = await res.json();
      MY_RECORDS = Array.isArray(data) ? data : [];
    } catch(e) { MY_RECORDS = []; showToast('기록을 불러오지 못했습니다. 잠시 후 다시 시도해주세요.'); }
  } else {
    MY_RECORDS = [];
  }
  go('my_records');
}

function my_records() {
  const movementNames = { 'squat': '스쿼트', 'lunge': '런지', 'deadlift': '데드리프트' };
  const painNames = { knee: '무릎', 'lower-back': '허리', ankle: '발목', shoulder: '어깨', wrist: '손목' };
  const causeLabel = id => {
    if (!id) return '';
    const map = {
      'cause-a': 'Case A', 'cause-b': 'Case B', 'cause-c': 'Case C', 'cause-d': 'Case D',
      'cause-dp': 'Case DP', 'cause-a-mild': 'Case A (경증)',
      'cause-case1': 'Case 1', 'cause-case2': 'Case 2', 'cause-case3': 'Case 3', 'cause-case4': 'Case 4',
    };
    return map[id] || id.replace(/^cause-/, 'Case ').toUpperCase();
  };

  if (!MY_RECORDS || MY_RECORDS.length === 0) {
    return `
      <div class="home-hero"><h1>내 기록</h1></div>
      <div class="card" style="text-align:center;color:var(--text-sub);padding:40px 20px">
        아직 저장된 기록이 없어요.<br>감별을 완료하면 여기에 기록됩니다.
      </div>
      <button class="btn-primary" style="background:var(--dark-light)" onclick="go('home')">홈으로</button>`;
  }

  const byDate = {};
  [...MY_RECORDS].reverse().forEach(r => {
    const d = new Date(r.updated_at).toLocaleDateString('ko-KR');
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push(r);
  });

  const cards = Object.entries(byDate).map(([date, records]) => {
    const recordCards = records.map(r => `
      <div class="card" style="display:flex;flex-direction:column;gap:8px;cursor:pointer" onclick="resumeRecord('${r.movement_id}','${r.pain_site_id}','${r.cause_id}',${r.stage_index})">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-weight:600;font-size:var(--t3)">${movementNames[r.movement_id] || r.movement_id}</span>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <span style="background:var(--choice-sel);color:var(--dark);border-radius:6px;padding:3px 8px;font-size:var(--t4)">${painNames[r.pain_site_id] || r.pain_site_id}</span>
          <span style="background:var(--choice-sel);color:var(--dark);border-radius:6px;padding:3px 8px;font-size:var(--t4)">${causeLabel(r.cause_id)}</span>
          <span style="background:var(--choice-sel);color:var(--dark);border-radius:6px;padding:3px 8px;font-size:var(--t4)">Stage ${r.stage_index + 1}</span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">
          <span style="font-size:var(--t4);color:var(--accent)">이어서 하기 →</span>
          <button onclick="event.stopPropagation();deleteRecord(${r.id})" style="font-size:var(--t4);color:var(--danger);background:none;border:none;cursor:pointer;padding:4px 8px">삭제</button>
        </div>
      </div>`).join('');
    return `
      <div style="display:flex;align-items:center;gap:10px;margin-top:4px">
        <span style="font-size:var(--t4);font-weight:600;color:var(--text-sub);white-space:nowrap">${date}</span>
        <div style="flex:1;height:1px;background:var(--border)"></div>
      </div>
      ${recordCards}`;
  }).join('');

  return `
    <div class="home-hero"><h1>내 기록</h1></div>
    ${cards}
    <button class="btn-primary" style="background:var(--dark-light)" onclick="go('home')">홈으로</button>`;
}

async function saveRehabRecord() {
  if (!USER) return;
  try {
    const result = await apiPost('/records/save', {
      token: USER.token,
      movement_id: S.movementId,
      pain_site_id: S.painSiteId,
      cause_id: S.causeId || '',
      stage_index: S.stageIndex || 0,
    });
    const ps = DATA?.pain_sites?.find(p => p.id === S.painSiteId);
    const cause = ps?.causes?.find(c => c.id === S.causeId);
    const stages = cause?.route?.stages || [];
    LAST_RECORD = {
      id: result.id,
      movement_id: S.movementId,
      pain_site_id: S.painSiteId,
      cause_id: S.causeId || '',
      stage_index: S.stageIndex || 0,
      updated_at: new Date().toISOString(),
      _stageName: stages[S.stageIndex]?.name || null,
      _totalStages: stages.length || 6,
    };
  } catch(e) { showToast('기록 저장에 실패했습니다.'); }
}

/* ── 데이터 ── */
let DATA = null;
let MANIFEST = null;
let LAST_RECORD = null;

async function init() {
  // 네이버 OAuth 콜백 처리 (팝업 자식 창인 경우)
  const params = new URLSearchParams(location.search);
  const isOAuthReturn = !!params.get('naver_token');
  if (isOAuthReturn) {
    saveUser({ token: params.get('naver_token'), nickname: params.get('naver_nickname') || '사용자' });
    history.replaceState({}, '', location.pathname);
    S.screen = 'home';
  } else if (params.get('error')) {
    history.replaceState({}, '', location.pathname);
  }

  MANIFEST = BUNDLED['manifest'];
  if (USER && USER.token !== 'demo') {
    try {
      const records = await fetch(`${API}/records/mine?token=${USER.token}`).then(r => r.json());
      LAST_RECORD = records.length ? records[records.length - 1] : null;
      if (LAST_RECORD) {
        try {
          const mv = BUNDLED[LAST_RECORD.movement_id];
          const ps = mv.pain_sites.find(p => p.id === LAST_RECORD.pain_site_id);
          const cause = ps?.causes.find(c => c.id === LAST_RECORD.cause_id);
          const stages = cause?.route?.stages || [];
          LAST_RECORD._stageName = stages[LAST_RECORD.stage_index]?.name || null;
          LAST_RECORD._totalStages = stages.length;
        } catch(e) {}
      }
    } catch(e) { LAST_RECORD = null; }
  }
  if (!isOAuthReturn) {
    const saved = loadProgress();
    if (saved && saved.movementId) {
      DATA = BUNDLED[saved.movementId];
      Object.assign(S, saved);
    }
  }
  render();
  const splash = document.getElementById('splash');
  setTimeout(() => {
    splash.style.opacity = '0';
    setTimeout(() => splash.style.display = 'none', 400);
  }, 1500);
}


/* ── 헬퍼 ── */
const el = id => document.getElementById(id);
const find = (arr, id) => arr && arr.find(x => x.id === id);

function getMovement()  { return DATA; }
function getPainSite()  { return find(DATA.pain_sites, S.painSiteId); }
function getQuestion()  { return find(getPainSite().questions, S.questionId); }
function getTest()      { return find(getPainSite().tests, S.testId); }
function getCause()     { return find(getPainSite().causes, S.causeId); }

// manifest 기반 — 전체 종목의 pain_site 수집
function getAllPainSites() {
  const map = {};
  MANIFEST.forEach(m => m.pain_sites.forEach(ps => {
    if (!map[ps.id]) map[ps.id] = { id: ps.id, name: ps.name };
  }));
  return Object.values(map);
}

// manifest 기반 — 선택한 부위를 가진 종목만
function getMovementsForSite() {
  return MANIFEST.filter(m => m.pain_sites.some(p => p.id === S.painSiteId));
}


/* ── 진행률 ── */
const PROGRESS = {
  home: 0, pain_site: 10, movement: 30,
  question: 55, test: 70, cause: 82, route: 92, complete: 100, danger: 50, coming_soon: 35
};
const LABEL = {
  pain_site: '통증 부위', movement: '동작 선택',
  question: '챕터1 · 감별 질문', test: '챕터2 · 직접 테스트',
  cause: '원인 확정', route: '재활 루트', complete: '완료', danger: '주의'
};

function updateProgress(screen) {
  const bar = el('progress-bar');
  if (['landing', 'home', 'login', 'signup', 'my_records'].includes(screen)) { bar.style.display = 'none'; return; }
  bar.style.display = 'block';
  let pct, label;
  if ((screen === 'route' || screen === 'complete') && S.causeId) {
    const total = getCause().route.stages.length;
    const base  = PROGRESS['cause'] || 82;
    const idx   = screen === 'complete' ? S.stageIndex + 1 : S.stageIndex;
    pct   = Math.round(base + (idx / total) * (100 - base));
    label = LABEL[screen] || '';
  } else {
    pct   = PROGRESS[screen] || 50;
    label = LABEL[screen] || '';
  }
  el('pb-label').textContent = label;
  el('pb-pct').textContent = pct + '%';
  el('pb-fill').style.width = pct + '%';
}

/* ── 렌더 ── */
function render() {
  const publicScreens = ['landing', 'login', 'signup'];
  if (!USER && !publicScreens.includes(S.screen)) {
    S.screen = 'landing';
  }
  updateProgress(S.screen);
  window.scrollTo(0, 0);
  if (['route', 'test'].includes(S.screen)) acquireWakeLock();
  else releaseWakeLock();
  const screens = { landing, home, login, signup, my_records, pain_site, movement, question, test, cause, route, danger, complete, coming_soon };
  el('main-screen').innerHTML = (screens[S.screen] || landing)();
  const scrollableScreens = ['route', 'my_records'];
  el('main-screen').classList.toggle('scrollable', scrollableScreens.includes(S.screen));
}

      </button>
      <button class="choice-btn" onclick="selectTestResult('${t.fail_next}')">
        <span>${t.fail_text}</span>
      </button>
    </div>
    `;
}

function cause() {
  const c = getCause();
  return `
    ${contextBar()}
    <div>
      <h1 class="t1">원인을 찾았습니다</h1>
    </div>
    <div class="card" style="display:flex;flex-direction:column;gap:10px">
      <span class="cause-tag">${c.label} · ${c.tag}</span>
      <h2 class="t2">${c.name}</h2>
      <p class="t3">${c.description}</p>
    </div>
    <div style="background:var(--danger-bg);border:1px solid var(--danger);border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;gap:10px">
      <div style="display:flex;gap:10px;align-items:flex-start">
        <span style="color:var(--danger);font-weight:700;flex-shrink:0;font-size:16px">!</span>
        <div>
          <p style="margin:0;font-size:var(--t4);font-weight:600;color:var(--danger)">관절이 눈에 띄게 부어있어요</p>
          <p style="margin:3px 0 0;font-size:var(--t4);color:var(--text-sub)">운동 후뿐 아니라 지금도 부어있는 경우</p>
        </div>
      </div>
      <div style="display:flex;gap:10px;align-items:flex-start">
        <span style="color:var(--danger);font-weight:700;flex-shrink:0;font-size:16px">!</span>
        <div>
          <p style="margin:0;font-size:var(--t4);font-weight:600;color:var(--danger)">만지면 열감이 느껴져요</p>
          <p style="margin:3px 0 0;font-size:var(--t4);color:var(--text-sub)">다른 쪽 관절과 비교했을 때 확실히 따뜻함</p>
        </div>
      </div>
      <p style="margin:4px 0 0;font-size:var(--t4);color:var(--danger);font-weight:600">위 항목에 해당된다면 재활 전 전문의 진단을 먼저 받으세요.</p>
    </div>
    <button class="btn-primary" onclick="saveRehabRecord();go('route')">재활 루트 보기</button>`;
}

function route() {
  const c  = getCause();
  const mv = getMovement();
  const ps = getPainSite();
  const stages = c.route.stages;
  const stage  = stages[S.stageIndex];
  const isLast = S.stageIndex === stages.length - 1;

  const stageIndicator = stages.map((st, i) => {
    const cls = i < S.stageIndex ? 'done' : i === S.stageIndex ? 'active' : '';
    const clickable = i <= S.stageIndex;
    return clickable
      ? `<button class="stage-item ${cls}" onclick="jumpToStage(${i})" style="cursor:pointer;font-family:inherit">${i + 1} ${st.name}</button>`
      : `<div class="stage-item ${cls}">${i + 1} ${st.name}</div>`;
  }).join('');

  let stageContent;
  if (stage.type === 'reassessment') {
    const checklist = stage.checklist || [];
    const items = checklist.map((item, i) => {
      const checked = S.checkedItems.includes(i);
      return `
      <div onclick="toggleCheck(${i})" style="display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer">
        <span style="flex-shrink:0;width:22px;height:22px;border-radius:50%;border:2px solid ${checked ? 'var(--success)' : 'var(--border)'};background:${checked ? 'var(--success)' : 'transparent'};display:flex;align-items:center;justify-content:center">
          ${checked ? `<svg width="12" height="12" viewBox="0 0 36 36" fill="none"><path d="M8 18L15 25L28 11" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>` : ''}
        </span>
        <span style="font-size:var(--t3);color:${checked ? 'var(--text-sub)' : 'var(--text)'}">${item}</span>
      </div>`;
    }).join('');
    const allChecked = S.checkedItems.length === checklist.length;
    stageContent = `
    <div class="card">
      <p style="font-size:var(--t3);font-weight:600;margin-bottom:4px">다음 ${checklist.length}가지를 모두 확인하세요</p>
      ${items}
      <div style="margin-top:12px;padding:10px;background:var(--bg);border-radius:8px">
        <p style="margin:0;font-size:var(--t4);color:var(--accent)">✓ ${stage.pass_note}</p>
        <p style="margin:4px 0 0;font-size:var(--t4);color:var(--danger)">✗ ${stage.fail_note}</p>
      </div>
    </div>
    <button class="btn-primary" onclick="${isLast ? "go('complete')" : 'nextStage()'}" ${allChecked ? '' : 'disabled'} style="margin-top:24px;${allChecked ? '' : 'opacity:0.4;pointer-events:none'}">
      ${isLast ? '루트 완료' : '이 단계 완료'}
    </button>`;
  } else if (stage.type === 'tips') {
    stageContent = (stage.tips || []).map(tip => `
    <div class="card" style="display:flex;flex-direction:column;gap:6px">
      <p style="margin:0;font-size:var(--t3);font-weight:600">${tip.title}</p>
      <p style="margin:0;font-size:var(--t4);color:var(--text-sub);line-height:1.6">${tip.body}</p>
    </div>`).join('');
  } else {
    stageContent = (stage.exercises || []).map((ex, exIdx) => {
      const howSteps = (ex.how || []).map((s, i) => `
        <div style="display:flex;gap:10px;align-items:flex-start;margin-top:8px">
          <span style="flex-shrink:0;width:20px;height:20px;border-radius:50%;background:#2C2C2C;color:white;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center">${i+1}</span>
          <span style="font-size:var(--t3);line-height:1.6;color:var(--text)">${s}</span>
        </div>`).join('');
      return `
      <div class="exercise-card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
          <h3 style="margin:0">${ex.name}</h3>
          <button onclick="openVideoModal('${ex.video_url||''}')" style="flex-shrink:0;background:var(--dark);color:white;border:none;border-radius:6px;padding:5px 10px;font-size:var(--t4);font-weight:600;cursor:pointer">▶ 영상</button>
        </div>
        <span class="sets-text">${ex.sets}</span>
        <details style="margin-top:10px" ${exIdx === 0 ? 'open' : ''}>
          <summary style="list-style:none;cursor:pointer;display:flex;justify-content:space-between;align-items:center;
            border-top:1px solid var(--border);padding-top:10px">
            <span style="font-size:var(--t4);font-weight:600;color:var(--text-sub)">방법</span>
            <i class="ti ti-chevron-down how-chevron" style="font-size:14px;color:var(--text-sub)"></i>
          </summary>
          <div style="margin-top:4px;display:flex;flex-direction:column">
            ${howSteps}
          </div>
          ${ex.cue ? `<div class="cue-text" style="margin-top:12px">${ex.cue}</div>` : ''}
        </details>
        <details style="margin-top:8px">
          <summary style="font-size:var(--t4);color:var(--text-sub);cursor:pointer;list-style:none">▸ 왜 이 운동인가</summary>
          <p class="why-text" style="margin-top:8px">${ex.why}</p>
        </details>
      </div>`;
    }).join('');
  }

  return `
    ${contextBar()}
    <div>
      <h1 class="t1">${c.label} · ${mv.name} ${ps.name}</h1>
      <p class="t3" style="margin-top:6px">${c.name}</p>
    </div>
    <div>
      <p class="t4" style="margin-bottom:8px;font-weight:600">현재 단계</p>
      <div class="stage-wrap">${stageIndicator}</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;padding:4px 0">
      <span style="font-size:var(--t2);font-weight:var(--w2)">${stage.name} 단계</span>
    </div>
    ${stageContent}
    ${stage.type === 'reassessment' ? '' : `<button class="btn-primary" style="margin-top:24px" onclick="${isLast ? "go('complete')" : 'nextStage()'}">
      ${isLast ? '루트 완료' : '이 단계 완료'}
    </button>`}`;
}

function coming_soon() {
  const moveName = DATA ? DATA.name : '이 동작';
  const siteName = S.painSiteId ? (ALL_PAIN_NAMES[S.painSiteId] || S.painSiteId) : '';
  return `
    <div style="text-align:center;padding:40px 0">
      <h1 class="t1">${moveName} · ${siteName}<br>콘텐츠 준비 중입니다</h1>
      <p class="t3" style="margin-top:12px;color:var(--text-sub)">해당 콘텐츠는 곧 업데이트됩니다.<br>다른 동작을 먼저 이용해 보세요.</p>
    </div>
    <button class="btn-primary" onclick="go('movement')">다른 동작 선택</button>`;
}

function danger() {
  let title, reason, action;
  if (S.isRedFlagDanger) {
    title  = '지금 바로 운동을 멈추세요';
    reason = '선택하신 증상은 자가 재활 전 전문의 진단이 필요한 신호입니다. 부기·열감·야간 통증·관절 잠김·외상 후 통증은 연골, 인대, 골 손상을 동반할 수 있어 재활 운동을 먼저 진행하면 증상이 악화될 수 있습니다.';
    action = '정형외과 또는 스포츠의학과를 방문하세요. 증상 발생 시점, 부위, 해당 동작을 메모해 가면 진단에 도움이 됩니다.';
  } else {
    const d = getPainSite().danger;
    title  = d.title;
    reason = d.reason;
    action = d.action;
  }
  return `
    <div style="background:var(--danger-bg);margin:-24px -20px 0;padding:24px 20px;flex:none">
      <h1 class="t1" style="color:var(--danger)">${title}</h1>
    </div>
    <div class="danger-alert">
      <h2>병원 진료가 필요합니다</h2>
      <p>${reason}</p>
      <p style="font-size:var(--t4);color:var(--text-sub)">${action}</p>
    </div>
    <div class="card" style="text-align:center;display:flex;flex-direction:column;gap:6px">
      <p style="font-size:var(--t3);color:var(--text-sub)">증상이 안정되고 <b>안정 시 통증이 없어지면</b> 앱으로 돌아와 다시 감별해보세요.</p>
      <p style="font-size:var(--t4);color:var(--text-sub)">재활 루트는 전문가 진료 후 병행할 수 있습니다.</p>
    </div>
    <button class="btn-danger" onclick="reset()">처음으로 돌아가기</button>`;
}

function complete() {
  const c = getCause();
  const stages = c.route.stages;
  const isAllDone = S.stageIndex >= stages.length - 1;

  const stageIndicator = stages.map((st, i) => {
    const cls = i <= S.stageIndex ? 'done' : i === S.stageIndex + 1 ? 'active' : '';
    const clickable = i <= S.stageIndex;
    return clickable
      ? `<button class="stage-item ${cls}" onclick="jumpToStage(${i})" style="cursor:pointer;font-family:inherit">${i + 1} ${st.name}</button>`
      : `<div class="stage-item ${cls}">${i + 1} ${st.name}</div>`;
  }).join('');

  const nextStage = stages[S.stageIndex + 1];
  return `
    <div style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:16px">
      <div class="complete-wrap">
        <div class="complete-icon">
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 18L15 25L28 11" stroke="#16A34A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h1 class="t1">${S.stageIndex + 1}단계 완료!</h1>
        <p class="t3" style="margin-top:8px">
          ${isAllDone
            ? '모든 단계를 마쳤습니다. 꾸준히 유지하세요.'
            : `${stages[S.stageIndex].name} 단계를 마쳤습니다.`}
        </p>
      </div>
      <div class="stage-wrap" style="justify-content:center">${stageIndicator}</div>
      ${nextStage ? `
        <div class="card" style="display:flex;flex-direction:column;gap:6px">
          <p class="t4" style="text-align:center">다음 단계</p>
          <p class="t2" style="text-align:center">${S.stageIndex + 2}단계 · ${nextStage.name}</p>
        </div>` : ''}
    </div>
    ${nextStage
      ? `<button class="btn-primary" onclick="goNextStageFromComplete()">다음 단계 시작</button>
         <button class="btn-primary" style="background:var(--text-sub);margin-top:8px" onclick="go('route')">이 단계 운동 다시 보기</button>`
      : ''}
    <button class="btn-primary" style="background:var(--text-sub);margin-top:8px" onclick="reset()">처음으로 돌아가기</button>`;
}

/* ── 액션 ── */
const BACK_MAP = {
  pain_site: 'home', movement: 'pain_site',
  question: 'movement', test: 'question',
  cause: null,
  route: 'cause', complete: 'route', danger: 'home', coming_soon: 'movement'
};
function goBack() {
  let dest = BACK_MAP[S.screen];
  if (S.screen === 'cause') dest = S.testId ? 'test' : 'question';
  if (dest) go(dest);
}

function openVideoModal(url) {
  const videoId = url.match(/(?:youtu\.be\/|v=)([^&?\/]+)/)?.[1];
  const embedUrl = videoId ? `https://www.youtube.com/embed/${videoId}?autoplay=1` : url;
  document.getElementById('video-iframe').src = embedUrl;
  document.getElementById('video-modal').style.display = 'flex';
}
function closeVideoModal() {
  document.getElementById('video-iframe').src = '';
  document.getElementById('video-modal').style.display = 'none';
}

function go(screen) {
  S.screen = screen;
  saveProgress();
  render();
}

function selectPainSite(id) {
  S.painSiteId   = id;
  S.movementId   = null;
  S.questionId   = null;
  S.causeId      = null;
  S.stageIndex   = 0;
  S.questionDepth = 0;
  go('movement');
}


function showSpinner() {
  const el = document.createElement('div');
  el.className = 'spinner-overlay'; el.id = 'spinner';
  el.innerHTML = '<div class="spinner"></div>';
  document.body.appendChild(el);
}
function hideSpinner() {
  const el = document.getElementById('spinner');
  if (el) el.remove();
}

async function selectMovement(id) {
  showSpinner();
  try { DATA = BUNDLED[id]; if (!DATA) throw new Error(); }
  catch(e) { hideSpinner(); showToast('데이터를 불러오지 못했습니다. 잠시 후 다시 시도해주세요.'); return; }
  hideSpinner();
  S.movementId   = id;
  if (DATA.coming_soon) { go('coming_soon'); return; }
  const site = getPainSite();
  if (site && site.coming_soon) { go('coming_soon'); return; }
  S.questionId   = site.entry_question;
  S.questionDepth = 0;
  go('question');
}


function selectChoice(next) {
  S.questionDepth++;
  if (next === 'danger') {
    go('danger');
  } else if (next.startsWith('q:')) {
    S.questionId = next.slice(2);
    go('question');
  } else if (next.startsWith('test:')) {
    S.testId = next.slice(5);
    go('test');
  } else if (next.startsWith('cause:')) {
    S.causeId = next.slice(6);
    S.testId = null;
    go('cause');
  }
}

function selectTestResult(next) {
  if (next.startsWith('cause:')) {
    S.causeId = next.slice(6);
    go('cause');
  } else if (next.startsWith('test:')) {
    S.testId = next.slice(5);
    go('test');
  } else if (next === 'danger') {
    go('danger');
  }
}

function toggleCheck(i) {
  const idx = S.checkedItems.indexOf(i);
  if (idx === -1) S.checkedItems.push(i);
  else S.checkedItems.splice(idx, 1);
  render();
}

function nextStage() {
  S.checkedItems = [];
  go('complete');
}

function jumpToStage(i) {
  S.stageIndex = i;
  S.checkedItems = [];
  go('route');
}

function goNextStageFromComplete() {
  S.stageIndex++;
  saveRehabRecord();
  go('route');
}

function reset() {
  Object.assign(S, {
    screen: 'home', painSiteId: null, painIntensity: null,
    movementId: null, questionId: null, testId: null, causeId: null,
    stageIndex: 0, checkedItems: [], questionDepth: 0, isRedFlagDanger: false
  });
  localStorage.removeItem('rehab_progress');
  render();
}

/* ── 시작 ── */
render();
init().catch(e => console.error('[init error]', e));
</script>
</body>
</html>
