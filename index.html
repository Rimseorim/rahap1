<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrossFit Rehab Guide</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
  <style>
    :root {
      --navy:       #2C2C2C;
      --navy-light: #444444;
      --accent:     #4A7FC1;
      --bg:         #F5F6FA;
      --card:       #FFFFFF;
      --text:       #1A1A2E;
      --text-sub:   #6B7280;
      --border:     #D1D5DB;
      --danger:     #DC2626;
      --danger-bg:  #FEF2F2;
      --success:    #16A34A;
      --choice-sel: #EEF2FF;
      --t1: 22px; --w1: 700;
      --t2: 17px; --w2: 600;
      --t3: 15px; --w3: 400;
      --t4: 13px; --w4: 400;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; justify-content: center;
    }
    .app { width: 100%; max-width: 480px; min-height: 100vh; display: flex; flex-direction: column; }

    /* Progress */
    .progress-wrap {
      position: sticky; top: 0; z-index: 10;
      background: var(--card); padding: 14px 20px 10px;
      border-bottom: 1px solid var(--border);
    }
    .progress-label { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .progress-label span { font-size: var(--t4); font-weight: var(--w4); color: var(--text-sub); }
    .progress-label span:last-child { font-weight: 600; color: var(--navy-light); }
    .progress-track { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--navy-light); border-radius: 99px; transition: width 0.3s ease; }

    /* Screen */
    .screen { flex: 1; padding: 24px 20px 32px; display: flex; flex-direction: column; gap: 16px; }

    /* Typography helpers */
    .t1 { font-size: var(--t1); font-weight: var(--w1); line-height: 1.4; }
    .t2 { font-size: var(--t2); font-weight: var(--w2); line-height: 1.5; }
    .t3 { font-size: var(--t3); font-weight: var(--w3); line-height: 1.6; color: var(--text-sub); }
    .t4 { font-size: var(--t4); font-weight: var(--w4); color: var(--text-sub); }

    /* Card */
    .card { background: var(--card); border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); padding: 20px; }

    /* Choices */
    .choices { display: flex; flex-direction: column; gap: 10px; }
    .choice-btn {
      width: 100%; min-height: 56px; padding: 14px 16px;
      border-radius: 10px; border: 1.5px solid var(--border);
      background: var(--card); font-family: inherit;
      font-size: var(--t2); font-weight: var(--w2); color: var(--text);
      text-align: left; cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; gap: 12px;
    }
    .choice-btn:hover { border-color: var(--accent); background: var(--choice-sel); }
    .choice-btn .sub { font-size: var(--t4); color: var(--text-sub); display: block; margin-top: 2px; }

    /* Buttons */
    .btn-primary {
      width: 100%; height: 54px; border-radius: 10px; border: none;
      background: var(--navy); color: white; font-family: inherit;
      font-size: var(--t2); font-weight: var(--w2); cursor: pointer;
      transition: background 0.15s; margin-top: auto;
    }
    .btn-primary:hover { background: var(--navy-light); }
    .btn-back-circle {
      width: 38px; height: 38px; flex-shrink: 0;
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 18px; color: var(--navy);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .btn-back-circle:hover { background: var(--choice-sel); }
    .btn-danger {
      width: 100%; height: 54px; border-radius: 10px;
      border: 2px solid var(--danger); background: var(--danger);
      color: white; font-family: inherit; font-size: var(--t2); font-weight: var(--w2); cursor: pointer;
    }

    /* Stage Indicator */
    .stage-wrap { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; }
    .stage-item {
      flex-shrink: 0; padding: 5px 12px; border-radius: 99px;
      font-size: var(--t4); font-weight: 600;
      border: 1.5px solid var(--border); color: var(--text-sub); background: var(--card);
    }
    .stage-item.active { background: var(--navy); color: white; border-color: var(--navy); }
    .stage-item.done  { background: #DCFCE7; color: var(--success); border-color: var(--success); }

    /* Exercise Card */
    .exercise-card {
      background: var(--card); border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      padding: 18px 20px; display: flex; flex-direction: column; gap: 8px;
    }
    .exercise-card h3 { font-size: var(--t2); font-weight: var(--w2); }
    .why-label { font-size: var(--t4); font-weight: 600; color: var(--accent); letter-spacing: 0.04em; }
    .why-text  { font-size: var(--t3); line-height: 1.6; color: var(--text-sub); }
    .cue-text  { font-size: var(--t4); color: var(--navy); background: var(--choice-sel); border-radius: 6px; padding: 6px 10px; }
    .sets-text { font-size: var(--t4); font-weight: 600; color: var(--navy); }

    /* Cause Tag */
    .cause-tag {
      display: inline-block; background: var(--choice-sel); color: var(--navy-light);
      border-radius: 6px; padding: 4px 10px;
      font-size: var(--t4); font-weight: 600;
    }

    /* Danger */
    .danger-alert {
      background: var(--danger-bg); border: 2px solid var(--danger);
      border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 10px;
    }
    .danger-alert h2 { font-size: var(--t2); font-weight: var(--w2); color: var(--danger); }
    .danger-alert p  { font-size: var(--t3); line-height: 1.6; }

    /* Home */
    .home-hero { background: var(--navy); border-radius: 16px; padding: 28px 24px; color: white; }
    .home-hero .badge {
      display: inline-block; background: rgba(255,255,255,0.15);
      border-radius: 99px; padding: 4px 12px;
      font-size: var(--t4); font-weight: 600; margin-bottom: 14px;
    }
    .home-hero h1 { font-size: var(--t1); font-weight: var(--w1); line-height: 1.4; margin-bottom: 10px; }
    .home-hero p  { font-size: var(--t3); line-height: 1.6; color: rgba(255,255,255,0.75); }
    .info-row { display: flex; align-items: center; gap: 12px; font-size: var(--t3); }
    .info-row .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--navy-light); flex-shrink: 0; }

    /* Complete */
    .complete-icon {
      width: 64px; height: 64px; background: #DCFCE7; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 8px;
    }
    .complete-wrap { text-align: center; padding: 12px 0; }

    /* Pain Intensity */
    .intensity-grid {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
    }
    .intensity-btn {
      aspect-ratio: 1; border-radius: 10px; border: 2px solid var(--border);
      background: var(--card); font-family: inherit;
      font-size: var(--t2); font-weight: var(--w2); cursor: pointer;
      transition: all 0.15s; color: var(--text);
    }
    .intensity-btn.low          { border-color: #16A34A; color: #16A34A; }
    .intensity-btn.mid          { border-color: #D97706; color: #D97706; }
    .intensity-btn.high         { border-color: #DC2626; color: #DC2626; }
    .intensity-btn.low.selected  { background: #16A34A; color: white; }
    .intensity-btn.mid.selected  { background: #D97706; color: white; }
    .intensity-btn.high.selected { background: #DC2626; color: white; }
    .intensity-desc {
      text-align: center; padding: 12px;
      font-size: var(--t3); font-weight: 600; border-radius: 10px;
      transition: all 0.2s;
    }

    /* Scroll top on nav */
    html { scroll-behavior: smooth; }
  </style>
</head>
<body>
<div class="app" id="app">
  <div id="progress-bar" style="display:none" class="progress-wrap">
    <div class="progress-label">
      <span id="pb-label"></span>
      <div style="display:flex;align-items:center;gap:10px">
        <span id="pb-pct"></span>
        <button class="btn-back-circle" id="pb-back" onclick="goBack()">←</button>
      </div>
    </div>
    <div class="progress-track"><div class="progress-fill" id="pb-fill"></div></div>
  </div>
  <div class="screen" id="main-screen"></div>
</div>

<script>
/* ── 진행 저장 ── */
function saveProgress() {
  if (S.screen !== 'home') localStorage.setItem('rehab_progress', JSON.stringify(S));
}
function loadProgress() {
  try { const s = localStorage.getItem('rehab_progress'); return s ? JSON.parse(s) : null; }
  catch(e) { return null; }
}
async function resumeProgress() {
  const saved = loadProgress();
  if (!saved) return;
  if (saved.movementId && !DATA) {
    DATA = await fetch(`data/movements/${saved.movementId}.json`).then(r => r.json());
  }
  Object.assign(S, saved);
  render();
}

/* ── 상태 ── */
const S = {
  screen: 'home',
  painSiteId: null,
  painIntensity: null,
  movementId: null,
  questionId: null,
  testId: null,
  causeId: null,
  stageIndex: 0,
  questionDepth: 0,
  isRedFlagDanger: false,
};

/* ── 데이터 ── */
let DATA = null;
let MANIFEST = null;

async function init() {
  MANIFEST = await fetch('data/movements/manifest.json').then(r => r.json());
  const saved = loadProgress();
  if (saved && saved.movementId) {
    DATA = await fetch(`data/movements/${saved.movementId}.json`).then(r => r.json());
    Object.assign(S, saved);
  }
  render();
}


/* ── 헬퍼 ── */
const el = id => document.getElementById(id);
const find = (arr, id) => arr && arr.find(x => x.id === id);

function getMovement()  { return DATA; }
function getPainSite()  { return find(DATA.pain_sites, S.painSiteId); }
function getQuestion()  { return find(getPainSite().questions, S.questionId); }
function getTest()      { return find(getPainSite().tests, S.testId); }
function getCause()     { return find(getPainSite().causes, S.causeId); }

// manifest 기반 — 전체 종목의 pain_site 수집
function getAllPainSites() {
  const map = {};
  MANIFEST.forEach(m => m.pain_sites.forEach(ps => {
    if (!map[ps.id]) map[ps.id] = { id: ps.id, name: ps.name };
  }));
  return Object.values(map);
}

// manifest 기반 — 선택한 부위를 가진 종목만
function getMovementsForSite() {
  return MANIFEST.filter(m => m.pain_sites.some(p => p.id === S.painSiteId));
}

const INTENSITY_DESC = {
  1:'거의 없음', 2:'거의 없음', 3:'약함',
  4:'약함', 5:'보통', 6:'보통',
  7:'심함', 8:'심함', 9:'매우 심함', 10:'매우 심함'
};

/* ── 진행률 ── */
const PROGRESS = {
  home: 0, pain_site: 10, red_flag: 20, pain_intensity: 30, movement: 40,
  question: 55, test: 70, cause: 82, route: 92, complete: 100, danger: 50
};
const LABEL = {
  pain_site: '통증 부위', red_flag: '위험 신호 확인', pain_intensity: '통증 강도', movement: '동작 선택',
  question: '챕터1 · 감별 질문', test: '챕터2 · 직접 테스트',
  cause: '원인 확정', route: '재활 루트', complete: '완료', danger: '주의'
};

function updateProgress(screen) {
  const bar = el('progress-bar');
  if (screen === 'home') { bar.style.display = 'none'; return; }
  bar.style.display = 'block';
  let pct, label;
  if ((screen === 'route' || screen === 'complete') && S.causeId) {
    const total = getCause().route.stages.length;
    const base  = PROGRESS['cause'] || 82;
    const idx   = screen === 'complete' ? S.stageIndex + 1 : S.stageIndex;
    pct   = Math.round(base + (idx / total) * (100 - base));
    label = LABEL[screen] || '';
  } else {
    pct   = PROGRESS[screen] || 50;
    label = LABEL[screen] || '';
  }
  el('pb-label').textContent = label;
  el('pb-pct').textContent = pct + '%';
  el('pb-fill').style.width = pct + '%';
}

/* ── 렌더 ── */
function render() {
  updateProgress(S.screen);
  window.scrollTo(0, 0);
  const screens = { home, pain_site, red_flag, pain_intensity, movement, question, test, cause, route, danger, complete };
  el('main-screen').innerHTML = (screens[S.screen] || home)();
}

/* ── 화면별 HTML 생성 ── */

function home() {
  const saved = loadProgress();
  const hasProgress = saved && saved.screen && saved.screen !== 'home';
  return `
    <div class="home-hero">
      <div class="badge">물리치료사 설계</div>
      <h1>통증 원인부터<br>먼저 찾습니다</h1>
      <p>같은 무릎 통증도 원인이 다르면<br>재활도 달라야 합니다.</p>
    </div>
    <div class="card" style="display:flex;flex-direction:column;gap:10px">
      <div class="info-row"><div class="dot"></div>5분 안에 원인 감별 완료</div>
      <div class="info-row"><div class="dot"></div>박스에서 스마트폰으로</div>
      <div class="info-row"><div class="dot"></div>스쿼트 3종 · 원인별 재활 루트</div>
    </div>
    ${hasProgress ? `<button class="btn-primary" onclick="resumeProgress()">이어서 하기</button>` : ''}
    <button class="btn-primary" style="${hasProgress ? 'background:var(--text-sub);' : ''}" onclick="go('pain_site')">처음부터 시작</button>
    <p style="text-align:center;font-size:var(--t4);color:var(--text-sub);line-height:1.6;padding:0 8px">이 앱은 재활 보조 도구이며<br>전문가 진단을 대체하지 않습니다</p>`;
}

const PAIN_ICONS = { knee: '🦵', 'lower-back': '🦴', ankle: '🦶', shoulder: '💪', wrist: '🤝' };

function pain_site() {
  const sites = getAllPainSites();
  const btns = sites.map(p => `
    <button class="choice-btn" onclick="selectPainSite('${p.id}')">
      <span style="font-size:20px">${PAIN_ICONS[p.id] || '●'}</span>
      <span>${p.name}</span>
    </button>`).join('');
  return `
    <div>
      <h1 class="t1">어디가 아픈가요?</h1>
      <p class="t3" style="margin-top:8px">가장 통증이 심한 부위 하나를 선택하세요.</p>
    </div>
    <div class="choices">${btns}</div>`;
}

function red_flag() {
  const flags = [
    { text: '관절이 눈에 띄게 부어있어요', sub: '운동 후뿐 아니라 지금도 부어있는 경우' },
    { text: '만지면 열감이 느껴져요', sub: '다른 쪽 관절과 비교했을 때 확실히 따뜻함' },
    { text: '자다가 통증에 깬 적 있어요', sub: '야간 통증 · 안정 시에도 지속되는 통증' },
    { text: '관절이 걸리거나 갑자기 힘이 빠져요', sub: '잠김(locking) · 순간 탈력(giving way)' },
    { text: '최근 넘어지거나 강하게 부딪혔어요', sub: '낙상 · 충돌 · 외상 후 통증' },
  ];
  const btns = flags.map(f => `
    <button class="choice-btn" style="border-color:var(--danger);color:var(--danger)" onclick="triggerRedFlagDanger()">
      <span style="color:var(--danger);font-weight:700;font-size:18px">!</span>
      <span>${f.text}<span class="sub">${f.sub}</span></span>
    </button>`).join('');
  return `
    <div>
      <h1 class="t1">먼저 확인하세요</h1>
      <p class="t3" style="margin-top:8px">아래 증상 중 하나라도 해당되면 자가 재활 전에 병원을 먼저 방문해야 합니다.</p>
    </div>
    <div class="choices">${btns}</div>
    <button class="btn-primary" onclick="go('pain_intensity')">해당 없음 · 다음으로</button>`;
}

function pain_intensity() {
  const sel = S.painIntensity;
  const desc = sel ? INTENSITY_DESC[sel] : null;
  const isHigh = sel >= 9;

  const nums = Array.from({length:10}, (_,i) => {
    const n = i + 1;
    const cls = n <= 3 ? 'low' : n <= 6 ? 'mid' : 'high';
    const active = sel === n ? 'selected' : '';
    return `<button class="intensity-btn ${cls} ${active}" onclick="selectIntensity(${n})">${n}</button>`;
  }).join('');

  const descColor = !sel ? '' : sel <= 3 ? '#16A34A' : sel <= 6 ? '#D97706' : '#DC2626';
  const descBg    = !sel ? '' : sel <= 3 ? '#F0FDF4' : sel <= 6 ? '#FFFBEB' : '#FEF2F2';

  return `
    <div>
      <h1 class="t1">지금 통증이<br>얼마나 심한가요?</h1>
      <p class="t3" style="margin-top:8px">운동 중 가장 심할 때 기준으로 선택하세요.</p>
    </div>
    <div class="card" style="gap:16px;display:flex;flex-direction:column">
      <div style="display:flex;justify-content:space-between;font-size:var(--t4);color:var(--text-sub)">
        <span>1 · 통증 없음</span><span>10 · 극심한 통증</span>
      </div>
      <div class="intensity-grid">${nums}</div>
      ${sel ? `
        <div class="intensity-desc" style="color:${descColor};background:${descBg}">
          ${sel}점 · ${desc}
          ${isHigh ? '<br><span style="font-size:var(--t4)">병원 진료를 먼저 고려해보세요</span>' : ''}
        </div>` : '<div style="height:44px"></div>'}
    </div>
    <button class="btn-primary" ${sel ? '' : 'disabled'} onclick="go('movement')">다음</button>`;
}

const MOVEMENT_ICONS = { 'back-squat': '🏋️', 'front-squat': '🏋️', 'overhead-squat': '🙌' };
const MOVEMENT_DESC  = { 'back-squat': 'Back Squat', 'front-squat': 'Front Squat', 'overhead-squat': 'Overhead Squat' };

function movement() {
  const mvs = getMovementsForSite();
  const btns = mvs.map(m => `
    <button class="choice-btn" onclick="selectMovement('${m.id}')">
      <span style="font-size:20px">${MOVEMENT_ICONS[m.id] || '🏋️'}</span>
      <span>${m.name}<span class="sub">${MOVEMENT_DESC[m.id] || ''}</span></span>
    </button>`).join('');
  return `
    <div>
      <h1 class="t1">어떤 동작에서<br>통증이 나타나나요?</h1>
    </div>
    <div class="choices">${btns}</div>`;
}

function question() {
  const q = getQuestion();
  const btns = q.choices.map(c => `
    <button class="choice-btn" onclick="selectChoice('${c.next}')">
      ${c.text}
    </button>`).join('');
  return `
    <div>
      <h1 class="t1">${q.text}</h1>
      ${q.sub ? `<p class="t3" style="margin-top:8px">${q.sub}</p>` : ''}
    </div>
    <div class="choices">${btns}</div>`;
}

function test() {
  const t = getTest();
  const steps = t.steps.map((s, i) => `
    <div style="display:flex;gap:12px;align-items:flex-start">
      <span style="flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--navy);color:white;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center">${i+1}</span>
      <span style="font-size:var(--t3);line-height:1.6;color:var(--text)">${s}</span>
    </div>`).join('');

  return `
    <div>
      <div style="display:inline-block;background:var(--navy);color:white;border-radius:99px;padding:4px 12px;font-size:var(--t4);font-weight:600;margin-bottom:12px">챕터2 · 직접 테스트</div>
      <h1 class="t1">${t.name}</h1>
      <p class="t3" style="margin-top:6px">${t.purpose}</p>
    </div>
    <div class="card" style="display:flex;flex-direction:column;gap:14px">
      ${steps}
      ${t.note ? `<p style="font-size:var(--t4);color:var(--accent);border-top:1px solid var(--border);padding-top:10px;margin-top:2px">● ${t.note}</p>` : ''}
    </div>
    <p class="t4" style="text-align:center;font-weight:600">결과를 선택하세요</p>
    <div class="choices">
      <button class="choice-btn" style="border-color:var(--success);color:var(--success)" onclick="selectTestResult('${t.pass_next}')">
        <span style="font-size:18px">✓</span>
        <span>${t.pass_text}</span>
      </button>
      <button class="choice-btn" style="border-color:var(--danger);color:var(--danger)" onclick="selectTestResult('${t.fail_next}')">
        <span style="font-size:18px">✗</span>
        <span>${t.fail_text}</span>
      </button>
    </div>
    <p style="text-align:center;font-size:var(--t4);color:var(--text-sub)">이 테스트는 원인의 가능성을 확인하는 것이며 의료 진단이 아닙니다</p>`;
}

function cause() {
  const c = getCause();
  return `
    <div>
      <h1 class="t1">원인을 찾았습니다</h1>
    </div>
    <div class="card" style="display:flex;flex-direction:column;gap:10px">
      <span class="cause-tag">${c.label} · ${c.tag}</span>
      <h2 class="t2">${c.name}</h2>
      <p class="t3">${c.description}</p>
      ${c.priority_note ? `<p style="font-size:var(--t4);color:var(--accent);font-weight:600">${c.priority_note}</p>` : ''}
    </div>
    <p style="font-size:var(--t4);color:var(--text-sub);text-align:center;padding:0 4px">이 앱은 재활 보조 도구이며 전문가 진단을 대체하지 않습니다</p>
    <button class="btn-primary" onclick="go('route')">재활 루트 보기</button>`;
}

function route() {
  const c  = getCause();
  const mv = getMovement();
  const ps = getPainSite();
  const stages = c.route.stages;
  const stage  = stages[S.stageIndex];
  const isLast = S.stageIndex === stages.length - 1;

  const stageIndicator = stages.map((st, i) => {
    const cls = i < S.stageIndex ? 'done' : i === S.stageIndex ? 'active' : '';
    const clickable = i <= S.stageIndex;
    return clickable
      ? `<button class="stage-item ${cls}" onclick="jumpToStage(${i})" style="cursor:pointer;font-family:inherit">${i + 1} ${st.name}</button>`
      : `<div class="stage-item ${cls}">${i + 1} ${st.name}</div>`;
  }).join('');

  const exercises = stage.exercises.map(ex => {
    const howSteps = (ex.how || []).map((s, i) => `
      <div style="display:flex;gap:10px;align-items:flex-start;margin-top:4px">
        <span style="flex-shrink:0;width:20px;height:20px;border-radius:50%;background:var(--accent);color:white;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center">${i+1}</span>
        <span style="font-size:var(--t4);line-height:1.6;color:var(--text)">${s}</span>
      </div>`).join('');
    return `
    <div class="exercise-card">
      <h3>${ex.name}</h3>
      <span class="sets-text">${ex.sets}</span>
      <span class="why-label" style="margin-top:4px">어떻게</span>
      ${howSteps}
      ${ex.cue ? `<div class="cue-text" style="margin-top:4px">● ${ex.cue}</div>` : ''}
      <details style="margin-top:6px">
        <summary style="font-size:var(--t4);color:var(--text-sub);cursor:pointer;list-style:none">▸ 왜 이 운동인가</summary>
        <p class="why-text" style="margin-top:6px">${ex.why}</p>
      </details>
    </div>`;
  }).join('');

  return `
    <div>
      <h1 class="t1">${c.label} · ${mv.name} ${ps.name}</h1>
      <p class="t3" style="margin-top:6px">${c.name}</p>
    </div>
    <div>
      <p class="t4" style="margin-bottom:8px;font-weight:600">현재 단계</p>
      <div class="stage-wrap">${stageIndicator}</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;padding:4px 0">
      <span style="font-size:var(--t2);font-weight:var(--w2)">${stage.name} 단계</span>
      ${stage.duration ? `<span style="font-size:var(--t4);color:var(--text-sub);background:var(--border);border-radius:99px;padding:2px 10px">약 ${stage.duration}</span>` : ''}
    </div>
    ${exercises}
    <button class="btn-primary" onclick="${isLast ? "go('complete')" : 'nextStage()'}">
      ${isLast ? '루트 완료' : '이 단계 완료'}
    </button>`;
}

function danger() {
  let title, reason, action;
  if (S.isRedFlagDanger) {
    title  = '지금 바로 운동을 멈추세요';
    reason = '선택하신 증상은 자가 재활 전 전문의 진단이 필요한 신호입니다. 부기·열감·야간 통증·관절 잠김·외상 후 통증은 연골, 인대, 골 손상을 동반할 수 있어 재활 운동을 먼저 진행하면 증상이 악화될 수 있습니다.';
    action = '정형외과 또는 스포츠의학과를 방문하세요. 증상 발생 시점, 부위, 해당 동작을 메모해 가면 진단에 도움이 됩니다.';
  } else {
    const d = getPainSite().danger;
    title  = d.title;
    reason = d.reason;
    action = d.action;
  }
  return `
    <div style="background:var(--danger-bg);margin:-24px -20px 0;padding:24px 20px;flex:none">
      <h1 class="t1" style="color:var(--danger)">${title}</h1>
    </div>
    <div class="danger-alert">
      <h2>병원 진료가 필요합니다</h2>
      <p>${reason}</p>
      <p style="font-size:var(--t4);color:var(--text-sub)">${action}</p>
    </div>
    <div class="card" style="text-align:center;display:flex;flex-direction:column;gap:6px">
      <p style="font-size:var(--t3);color:var(--text-sub)">증상이 안정되고 <b>안정 시 통증이 없어지면</b> 앱으로 돌아와 다시 감별해보세요.</p>
      <p style="font-size:var(--t4);color:var(--text-sub)">재활 루트는 전문가 진료 후 병행할 수 있습니다.</p>
    </div>
    <button class="btn-danger" onclick="reset()">처음으로 돌아가기</button>`;
}

function complete() {
  const c = getCause();
  const stages = c.route.stages;
  const isAllDone = S.stageIndex >= stages.length - 1;

  const stageIndicator = stages.map((st, i) => {
    const cls = i <= S.stageIndex ? 'done' : i === S.stageIndex + 1 ? 'active' : '';
    const clickable = i <= S.stageIndex;
    return clickable
      ? `<button class="stage-item ${cls}" onclick="jumpToStage(${i})" style="cursor:pointer;font-family:inherit">${i + 1} ${st.name}</button>`
      : `<div class="stage-item ${cls}">${i + 1} ${st.name}</div>`;
  }).join('');

  const nextStage = stages[S.stageIndex + 1];
  return `
    <div style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:16px">
      <div class="complete-wrap">
        <div class="complete-icon">✓</div>
        <h1 class="t1">${S.stageIndex + 1}단계 완료!</h1>
        <p class="t3" style="margin-top:8px">
          ${isAllDone
            ? '모든 단계를 마쳤습니다. 꾸준히 유지하세요.'
            : `${stages[S.stageIndex].name} 단계를 마쳤습니다.`}
        </p>
      </div>
      <div class="stage-wrap" style="justify-content:center">${stageIndicator}</div>
      ${nextStage ? `
        <div class="card" style="display:flex;flex-direction:column;gap:6px">
          <p class="t4" style="text-align:center">다음 단계</p>
          <p class="t2" style="text-align:center">${S.stageIndex + 2}단계 · ${nextStage.name}</p>
          ${stages[S.stageIndex].duration ? `<p style="font-size:var(--t4);color:var(--text-sub);text-align:center;border-top:1px solid var(--border);padding-top:8px;margin-top:2px"><b>${stages[S.stageIndex].name} 단계</b>를 <b>${stages[S.stageIndex].duration}</b> 동안 반복한 뒤 넘어가세요.</p>` : ''}
        </div>` : ''}
    </div>
    ${nextStage
      ? `<button class="btn-primary" onclick="goNextStageFromComplete()">다음 단계 시작</button>
         <button class="btn-primary" style="background:var(--text-sub);margin-top:8px" onclick="go('route')">이 단계 운동 다시 보기</button>`
      : ''}
    <button class="btn-primary" style="background:var(--text-sub);margin-top:8px" onclick="reset()">처음으로 돌아가기</button>`;
}

/* ── 액션 ── */
const BACK_MAP = {
  pain_site: 'home', red_flag: 'pain_site', pain_intensity: 'red_flag', movement: 'pain_intensity',
  question: 'movement', test: 'question',
  cause: null, // dynamic: test or question
  route: 'cause', complete: 'route', danger: 'home'
};
function goBack() {
  let dest = BACK_MAP[S.screen];
  if (S.screen === 'cause') dest = S.testId ? 'test' : 'question';
  if (dest) go(dest);
}

function go(screen) {
  S.screen = screen;
  saveProgress();
  render();
}

function selectPainSite(id) {
  S.painSiteId   = id;
  S.movementId   = null;
  S.questionId   = null;
  S.causeId      = null;
  S.stageIndex   = 0;
  S.questionDepth = 0;
  go('red_flag');
}

function selectIntensity(n) {
  S.painIntensity = n;
  render();  // 강도만 다시 그림 (화면 전환 X)
}

async function selectMovement(id) {
  DATA = await fetch(`data/movements/${id}.json`).then(r => r.json());
  S.movementId   = id;
  S.questionId   = getPainSite().entry_question;
  S.questionDepth = 0;
  go('question');
}

function triggerRedFlagDanger() {
  S.isRedFlagDanger = true;
  go('danger');
}

function selectChoice(next) {
  S.questionDepth++;
  if (next === 'danger') {
    go('danger');
  } else if (next.startsWith('q:')) {
    S.questionId = next.slice(2);
    go('question');
  } else if (next.startsWith('test:')) {
    S.testId = next.slice(5);
    go('test');
  } else if (next.startsWith('cause:')) {
    S.causeId = next.slice(6);
    go('cause');
  }
}

function selectTestResult(next) {
  if (next.startsWith('cause:')) {
    S.causeId = next.slice(6);
    go('cause');
  } else if (next.startsWith('test:')) {
    S.testId = next.slice(5);
    go('test');
  } else if (next === 'danger') {
    go('danger');
  }
}

function nextStage() {
  go('complete');
}

function jumpToStage(i) {
  S.stageIndex = i;
  go('route');
}

function goNextStageFromComplete() {
  S.stageIndex++;
  go('route');
}

function reset() {
  Object.assign(S, {
    screen: 'home', painSiteId: null, painIntensity: null,
    movementId: null, questionId: null, testId: null, causeId: null,
    stageIndex: 0, questionDepth: 0, isRedFlagDanger: false
  });
  localStorage.removeItem('rehab_progress');
  render();
}

/* ── 시작 ── */
init();
</script>
</body>
</html>
